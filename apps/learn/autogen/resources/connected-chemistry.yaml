title: Connected Chemistry Curriculum
fullName: Connected Chemistry - Exploring Chemistry through Agent-Based Modeling
shortName: Connected Chemistry
description: |
  A comprehensive NetLogo-based curriculum for teaching chemistry concepts through agent-based modeling, covering topics from gas laws to molecular interactions.
longDescription: |
  **Connected Chemistry** is an innovative curriculum that uses NetLogo agent-based models to help students visualize and understand fundamental chemistry concepts.

  This curriculum includes over 15 interactive NetLogo models that allow students to explore:
  - Gas laws and molecular motion
  - Phase changes and states of matter
  - Chemical reactions and equilibrium
  - Molecular interactions and bonding
  - Diffusion and osmosis

  Each module includes detailed lesson plans, student worksheets, assessment materials, and teacher guides. The curriculum is designed to be flexible and can be used in middle school through undergraduate chemistry courses.

  Students engage with models to test hypotheses, collect data, and develop deeper understanding of particulate-level phenomena that are otherwise invisible. The curriculum aligns with Next Generation Science Standards (NGSS) and has been extensively field-tested in classrooms.

  All NetLogo models are freely available and can be customized to meet specific classroom needs.
