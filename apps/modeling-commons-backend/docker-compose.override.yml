# Development overrides (auto-loaded by docker-compose)
# Run: docker-compose up
# For production: docker-compose -f docker-compose.yml up

services:
  app:
    build:
      context: ../..
      dockerfile: apps/modeling-commons-backend/Dockerfile
      target: development
    environment:
      NODE_ENV: development
    volumes:
      # Mount source code for live reload
      - ./src:/app/src
      - ./package.json:/app/package.json
      # node_modules should be in container, not mounted
      - /app/node_modules
    ports:
      - "3000:3000"
    command: >
      node
      --import ./src/instrumentation.ts
      --watch src/index.ts
    # Remove dependency on healthy postgres for faster dev startup
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped
