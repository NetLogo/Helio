# Development services only
# Usage: docker-compose -f docker-compose.dev.yml up
# Run the app locally: npm run dev

services:
  postgres:
    image: postgres:18
    ports:
      - 5432:5432
    env_file:
      - path: ./.env
        required: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - /tmp/modeling-commons-postgres-data:/var/lib/postgresql
