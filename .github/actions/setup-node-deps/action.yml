name: Setup Node.js and Dependencies
description: Sets up Node.js 24 with yarn cache and installs dependencies

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: "yarn"

    - name: Install dependencies
      shell: bash
      env:
        HELIO_SKIP_CHECKS: "1"
        NUXT_TELEMETRY_DISABLED: "1"
      run: yarn run init
