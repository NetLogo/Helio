  - id: hubnet-send-override-hubnet-send-override
    key: hubnet-send-override
    name: hubnet-send-override
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#hubnet-send-override
    description: >+
      Evaluates *reporter* for the agent or agentset indicated then
       sends the values to the client to "override" the value of *variable-name* only on *client-name*. This is used to
       change the appearance of agents in the client view, hence, only
       built-in variables that affect the appearance of the agent may be
       selected. For example, you can override the color variable of a
       turtle:

      ```

      ask turtles [ hubnet-send-override client-name self "color" [ red ] ]

      ```


      In this example assume that there is a turtles-own variable
       client-name which is associated with a logged in client, and all
       the turtles are blue. This code makes the turtle associated with
       each client appear red in his or her own view but not on anyone
       else's or on the server.

      See also: [[hubnet-clear-overrides|hubnet-clear-override]]

    examples:
      - hubnet-send-override *client-name agent-or-set variable-name*
      - "[ *reporter* ]"
    isFromExtension: false
    isConstant: false
    metadata:
      id: hubnet-send-override
      entry_categories:
        - title: HubNet
          id: hubnetgroup
      data:
        syntax:
          - name: hubnet-send-override
            since: "4.1"
        description: >+
          Evaluates *reporter* for the agent or agentset indicated then
           sends the values to the client to "override" the value of *variable-name* only on *client-name*. This is used to
           change the appearance of agents in the client view, hence, only
           built-in variables that affect the appearance of the agent may be
           selected. For example, you can override the color variable of a
           turtle:

          ```

          ask turtles [ hubnet-send-override client-name self "color" [ red ] ]

          ```


          In this example assume that there is a turtles-own variable
           client-name which is associated with a logged in client, and all
           the turtles are blue. This code makes the turtle associated with
           each client appear red in his or her own view but not on anyone
           else's or on the server.

          See also: [[hubnet-clear-overrides|hubnet-clear-override]]

        examples:
          - code: hubnet-send-override *client-name agent-or-set variable-name*
          - code: "[ *reporter* ]"
