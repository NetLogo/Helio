  - id: ask-ask
    key: ask
    name: ask
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#ask
    description: |+
      The specified agent or agentset runs the given commands. Because
       agentset members are always read in a random order, when ask is
       used with an agentset each agent will take its turn in a random
       order. See [Agentsets](/programming#agentsets)for more information.

      ```
      ask turtles [ fd 1 ]
        ;; all turtles move forward one step
      ask patches [ set pcolor red ]
        ;; all patches turn red
      ask turtle 4 [ rt 90 ]
        ;; only the turtle with id 4 turns right
      ```

      Note: only the observer can ask all turtles or all patches. This
       prevents you from inadvertently having all turtles ask all turtles
       or all patches ask all patches, which is a common mistake to make
       if you're not careful about which agents will run the code you
       are writing.

      Note: Only the agents that are in the agentset *at the time the
       ask begins* run the commands.

    examples:
      - ask *agentset* [*commands*]
      - ask *agent* [*commands*]
    isFromExtension: false
    isConstant: false
    metadata:
      id: ask
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: ask
            since: "1.0"
        description: |+
          The specified agent or agentset runs the given commands. Because
           agentset members are always read in a random order, when ask is
           used with an agentset each agent will take its turn in a random
           order. See [Agentsets](/programming#agentsets)for more information.

          ```
          ask turtles [ fd 1 ]
            ;; all turtles move forward one step
          ask patches [ set pcolor red ]
            ;; all patches turn red
          ask turtle 4 [ rt 90 ]
            ;; only the turtle with id 4 turns right
          ```

          Note: only the observer can ask all turtles or all patches. This
           prevents you from inadvertently having all turtles ask all turtles
           or all patches ask all patches, which is a common mistake to make
           if you're not careful about which agents will run the code you
           are writing.

          Note: Only the agents that are in the agentset *at the time the
           ask begins* run the commands.

        examples:
          - code: ask *agentset* [*commands*]
          - code: ask *agent* [*commands*]
  - id: ask-concurrent-ask-concurrent
    key: ask-concurrent
    name: ask-concurrent
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#ask-concurrent
    description: >+
      This primitive exists only for backwards compatibility. We
       don't recommend using it new models.

      The agents in the given agentset run the given commands, using a
       turn-taking mechanism to produce simulated concurrency. See the [Ask-Concurrent](/programming#ask-concurrent) section of the Programming Guide for details on how this works.

      Note: Only the agents that are in the agentset *at the time the
       ask begins* run the commands.

      See also [[without-interruption|without-interruption]].

    examples:
      - ask-concurrent *agentset* [*commands*]
    isFromExtension: false
    isConstant: false
    metadata:
      id: ask-concurrent
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: ask-concurrent
            since: "4.0"
        description: >+
          This primitive exists only for backwards compatibility. We
           don't recommend using it new models.

          The agents in the given agentset run the given commands, using a
