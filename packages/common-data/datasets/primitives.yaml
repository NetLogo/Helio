        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - centrality
      fullName: nw:betweenness-centrality
      description: >
        
        To calculate the [betweenness
        centrality](https://en.wikipedia.org/wiki/Betweenness_centrality) of a
        turtle, you take every other possible pairs of turtles and, for each
        pair, you calculate the proportion of shortest paths between members of
        the pair that passes through the current turtle. The betweenness
        centrality of a turtle is the sum of these.


        As of now, link weights are not taken into account.
  - id: nw-eigenvector-centrality
    key: nw:eigenvector-centrality
    name: nw:eigenvector-centrality
    alternateNames:
      - eigenvector-centrality
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/eigenvector-centrality.html
    metadata:
      name: eigenvector-centrality
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - centrality
      fullName: nw:eigenvector-centrality
      description: |
        
        The [Eigenvector centrality](https://en.wikipedia.org/wiki/Centrality#Eigenvector_centrality) of a node can be thought of as the amount of influence a node has on a network. In practice, turtles that are connected to a lot of other turtles that are themselves well-connected (and so on) get a higher Eigenvector centrality score.

        In this implementation, the eigenvector centrality is normalized such that the highest eigenvector centrality a node can have is 1. This implementation is designed to agree with Gephi's implementation out to at least 3 decimal places. If you discover that it disagrees with Gephi on a particular network, please [report it](https://github.com/NetLogo/NW-Extension/issues/new).

        The primitive respects link direction, even in mixed-directed networks. This is the one place where it should disagree with Gephi; Gephi refuses to treat directed links as directed in mixed-networks.

        As of now, link weights are not taken into account.
  - id: nw-page-rank
    key: nw:page-rank
    name: nw:page-rank
    alternateNames:
      - page-rank
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/page-rank.html
    metadata:
      name: page-rank
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - centrality
      fullName: nw:page-rank
      description: >
        
        The [page rank](https://en.wikipedia.org/wiki/PageRank) of a node can be
        thought of as the proportion of time that an agent walking forever at
        random on the network would spend at this node. The agent has an equal
        chance of taking any of a nodes edges, and will jump around the network
        completely randomly 15% of the time. In practice, like with eigenvector
        centrality, turtles that are connected to a lot of other turtles that
        are themselves well-connected (and so on) get a higher page rank.


        Page rank is one of the several algorithms that search engines use to
        determine the importance of a website.


        The sum of all page rank values should be approximately one. Unlike
        eigenvector centrality, page rank is defined for all networks, no matter
        the connectivity. Currently, it treats all links as undirected links.


        As of now, link weights are not taken into account.
  - id: nw-closeness-centrality
    key: nw:closeness-centrality
    name: nw:closeness-centrality
    alternateNames:
      - closeness-centrality
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/closeness-centrality.html
    metadata:
      name: closeness-centrality
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - centrality
      fullName: nw:closeness-centrality
      description: |
        
        The [closeness centrality](https://en.wikipedia.org/wiki/Centrality#Closeness_centrality) of a turtle is defined as the inverse of the average of it's distances to all other turtles. (Some people use the sum of distances instead of the average, but the extension uses the average.)

        Note that this primitive reports the _intra-component_ closeness of a turtle, that is, it takes into account only the distances to the turtles that are part of the same [component](https://en.wikipedia.org/wiki/Connected_component_%28graph_theory%29) as the current turtle, since distance to turtles in other components is undefined. The closeness centrality of an isolated turtle is defined to be zero.
  - id: nw-weighted-closeness-centrality
    key: nw:weighted-closeness-centrality
    name: nw:weighted-closeness-centrality
    alternateNames:
      - weighted-closeness-centrality
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/weighted-closeness-centrality.html
    metadata:
      name: weighted-closeness-centrality
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - - type:
                kind: Symbol
              kind: DescribedType
              explicitName: link-weight-variable
        isInfix: false
      tags:
        - centrality
      fullName: nw:weighted-closeness-centrality
      description: >
        
        This is identical to
        [`nw:closeness-centrality`](/nw/closeness-centrality), except that
        weights provided by the given variable are treated as the distances of
        links.
  - id: nw-clustering-coefficient
    key: nw:clustering-coefficient
    name: nw:clustering-coefficient
    alternateNames:
      - clustering-coefficient
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/clustering-coefficient.html
    metadata:
      name: clustering-coefficient
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - clustering
      fullName: nw:clustering-coefficient
      description: |
        
        Reports the [local clustering coefficient](https://en.wikipedia.org/wiki/Clustering_coefficient#Local_clustering_coefficient) of the turtle. The clustering coefficient of a node measures how connected its neighbors are. It is defined as the number of links between the node's neighbors divided by the total number of possible links between its neighbors.

        `nw:clustering-coefficient` takes the directedness of links into account. A directed link counts as a single link whereas an undirected link counts as two links (one going one-way, one going the other).

        The [global clustering coefficient](https://en.wikipedia.org/wiki/Clustering_coefficient#Global_clustering_coefficient) measures how much nodes tend to cluster together in the network in general. It is defined based on the types of triplets in the network. A triplet consists of a central node and two of its neighbors. If its neighbors are also connected, it's a closed triplet. If its neighbors are not connected, it's an open triplet. The global clustering coefficient is simply the number of closed triplets in a network divided by the total number of triplets. It can be calculated from the local clustering coefficient quite easily with the following code

        ```NetLogo
        to-report global-clustering-coefficient
          let closed-triplets sum [ nw:clustering-coefficient * count my-links * (count my-links - 1) ] of turtles
          let triplets sum [ count my-links * (count my-links - 1) ] of turtles
          report closed-triplets / triplets
        end
        ```

        Note that the above will only work with the default context, and may need to tweaked if you've set the turtles or links in the network to something other than `turtles` and `links`.

        The average local clustering coefficient is another popular method for measuring the amount of clustering in the network as a whole. It may be calculated with

        ```NetLogo
        mean [ nw:clustering-coefficient ] of turtles
        ```
  - id: nw-modularity
    key: nw:modularity
    name: nw:modularity
    alternateNames:
      - modularity
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/modularity.html
    metadata:
      name: modularity
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - clustering
      fullName: nw:modularity
      description: >
        
        [Modularity](https://en.wikipedia.org/wiki/Modularity_(networks)) is a
        measurement of community structure in the network. It is defined based
        on the number of in-community links versus the number of
        between-community links. This primitive takes as input a list of
        agentsets, where each of the agentsets is one the communities that
        you're separating the network into.


        This measurement works on undirected, directed, and mixed-directedness
        networks. In the case of mixed-directedness, undirected links are
        treated essentially the same as two opposing directed links. It does not
        take weight into account.


        Example:


        ```NetLogo

        nw:modularity (list (turtles with [ color = blue ]) (turtles with [
        color = red ]))

        ```
  - id: nw-bicomponent-clusters
    key: nw:bicomponent-clusters
    name: nw:bicomponent-clusters
    alternateNames:
      - bicomponent-clusters
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/bicomponent-clusters.html
    metadata:
      name: bicomponent-clusters
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - clusterer
      fullName: nw:bicomponent-clusters
      description: >
        
        Reports the list of [bicomponent
        clusters](https://en.wikipedia.org/wiki/Biconnected_component) in the
        current network context. A bicomponent (also known as a maximal
        biconnected subgraph) is a part of a network that cannot be disconnected
        by removing only one node (i.e. you need to remove at least two to
        disconnect it). The result is reported as a list of agentsets, in random
        order. Note that one turtle can be a member of more than one bicomponent
        at once.
  - id: nw-weak-component-clusters
    key: nw:weak-component-clusters
    name: nw:weak-component-clusters
    alternateNames:
      - weak-component-clusters
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/weak-component-clusters.html
    metadata:
      name: weak-component-clusters
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - clusterer
      fullName: nw:weak-component-clusters
      description: |
        
        Reports the list of "weakly" [connected components](https://en.wikipedia.org/wiki/Connected_component_%28graph_theory%29) in the current network context. A weakly connected component is simply a group of nodes where there is a path from each node to every other node. A "strongly" connected component would be one where there is a _directed_ path from each node to every other. The extension does not support the identification of strongly connected components at the moment.

        The result is reported as a list of agentsets, in random order. Note that one turtle _cannot_ be a member of more than one weakly connected component at once.
  - id: nw-louvain-communities
    key: nw:louvain-communities
    name: nw:louvain-communities
    alternateNames:
      - louvain-communities
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/louvain-communities.html
    metadata:
      name: louvain-communities
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - clusterer
      fullName: nw:louvain-communities
      description: >
        
        Detects community structure present in the network. It does this by
        maximizing [[modularity|/nw/modularity]] using the [Louvain
        method](https://en.wikipedia.org/wiki/Louvain_Modularity). The
        communities are reported as a list of turtle-sets.


        Often you'll want to tell turtles about the community that they are in.
        You can do this like so:


        ```NetLogo

        turtles-own [ community ]


        ...


        foreach nw:louvain-communities [ [comm] ->
          ask comm [ set community comm ]
        ]

        ```


        You can give each community its own color with something like this:


        ```NetLogo

        let communities nw:louvain-communities

        let colors sublist 0 (length communities) base-colors

        (foreach communities colors [ [community col] ->
          ask community [ set color col ]
        ])

        ```
  - id: nw-maximal-cliques
    key: nw:maximal-cliques
    name: nw:maximal-cliques
    alternateNames:
      - maximal-cliques
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/maximal-cliques.html
    metadata:
      name: maximal-cliques
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - clusterer
      fullName: nw:maximal-cliques
      description: |
        
        A [clique](https://en.wikipedia.org/wiki/Clique_%28graph_theory%29) is a subset of a network in which every node has a direct link to every other node. A maximal clique is a clique that is not, itself, contained in a bigger clique.

        The result is reported as a list of agentsets, in random order. Note that one turtle can be a member of more than one maximal clique at once.

        The primitive uses the [Bron–Kerbosch algorithm](https://en.wikipedia.org/wiki/Bron%E2%80%93Kerbosch_algorithm) and only works with undirected links.
  - id: nw-biggest-maximal-cliques
    key: nw:biggest-maximal-cliques
    name: nw:biggest-maximal-cliques
    alternateNames:
      - biggest-maximal-cliques
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/biggest-maximal-cliques.html
    metadata:
      name: biggest-maximal-cliques
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - clusterer
      fullName: nw:biggest-maximal-cliques
      description: |
        
        The biggest maximal cliques are, as the name implies, the biggest [cliques](https://en.wikipedia.org/wiki/Clique_%28graph_theory%29) in the current context. Often, more than one clique are tied for the title of biggest clique, so the result is reported as a list of agentsets, in random order. If you want only one clique, use `one-of nw:biggest-maximal-cliques`.

        The primitive uses the [Bron–Kerbosch algorithm](https://en.wikipedia.org/wiki/Bron%E2%80%93Kerbosch_algorithm) and only works with undirected links.
  - id: nw-generate-preferential-attachment
    key: nw:generate-preferential-attachment
    name: nw:generate-preferential-attachment
    alternateNames:
      - generate-preferential-attachment
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/generate-preferential-attachment.html
    metadata:
      name: generate-preferential-attachment
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtle-breed
            - type:
                kind: Agentset
                of: Link
              kind: DescribedType
              explicitName: link-breed
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: num-nodes
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: min-degree
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - generator
      fullName: nw:generate-preferential-attachment
      description: |+
        
        Generates a new network using a version of the [Barabási–Albert](https://en.wikipedia.org/wiki/Barab%C3%A1si%E2%80%93Albert_model) algorithm. This network will have the property of being "scale free": the distribution of degrees (i.e. the number of links for each turtle) should follow a power law.

        Generation works as follows turtles are added, one by one, each forming `min-degree` links to a previously added turtles, until `num-nodes` is reached.
        The more links a turtle already has, the greater the probability that new turtles form links with it when they are added.

        If you specify an `optional-command-block`, it is executed for each turtle in the newly created network. For example:

        ```NetLogo
        nw:generate-preferential-attachment turtles links 100 1 [ set color red ]
        ```

  - id: nw-generate-random
    key: nw:generate-random
    name: nw:generate-random
    alternateNames:
      - generate-random
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/generate-random.html
    metadata:
      name: generate-random
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtle-breed
            - type:
                kind: Agentset
                of: Link
              kind: DescribedType
              explicitName: link-breed
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: num-nodes
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: connection-probability
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - generator
      fullName: nw:generate-random
      description: |
        
        Generates a new random network of _num-nodes_ turtles in which each one has a  _connection-probability_ (between 0 and 1) of being connected to each other turtles. The algorithm uses the _G(n, p)_ variant of the [Erdős–Rényi model](https://en.wikipedia.org/wiki/Erd%C5%91s%E2%80%93R%C3%A9nyi_model).

        The algorithm is O(n²) for directed networks and O(n²/2) for undirected networks, so generating more than a couple thousand nodes will likely take a very long time.

        If you specify an _optional-command-block_, it is executed for each turtle in the newly created network. For example:

        ```NetLogo
        nw:generate-random turtles links 100 0.5 [ set color red ]
        ```
  - id: nw-generate-watts-strogatz
    key: nw:generate-watts-strogatz
    name: nw:generate-watts-strogatz
    alternateNames:
      - generate-watts-strogatz
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/generate-watts-strogatz.html
    metadata:
      name: generate-watts-strogatz
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtle-breed
            - type:
                kind: Agentset
                of: Link
              kind: DescribedType
              explicitName: link-breed
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: num-nodes
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: neighborhood-size
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: rewire-probability
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - generator
      fullName: nw:generate-watts-strogatz
      description: >
        
        Generates a new [Watts-Strogatz small-world
        network](https://en.wikipedia.org/wiki/Watts_and_Strogatz_model).


        The algorithm begins by creating a ring of nodes, where each node is
        connected to `neighborhood-size` nodes on either side. Then, each link
        is rewired with probability `rewire-prob`.


        If you specify an _optional-command-block_, it is executed for each
        turtle in the newly created network. Furthermore, the turtles are
        generated in the order they appear as in `create-ordered-turtles`. So,
        in order to lay the ring out as a ring, you can do something like:


        ```NetLogo

        nw:generate-watts-strogatz turtles links 50 2 0.1 [ fd 10 ]

        ```
  - id: nw-generate-small-world
    key: nw:generate-small-world
    name: nw:generate-small-world
    alternateNames:
      - generate-small-world
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/generate-small-world.html
    metadata:
      name: generate-small-world
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtle-breed
            - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: link-breed
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: row-count
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: column-count
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: clustering-exponent
            - type:
                kind: NetLogoBoolean
              kind: DescribedType
              explicitName: is-toroidal
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - generator
      fullName: nw:generate-small-world
      description: |
        
        Generates a new [small-world network](https://en.wikipedia.org/wiki/Small-world_network) using the [Kleinberg Model](https://en.wikipedia.org/wiki/Small_world_routing#The_Kleinberg_Model). Note that [`nw:generate-watts-strogatz`](/nw/generate-watts-strogatz) generates a more traditional small-world network.

        The algorithm proceeds by generating a lattice of the given number of rows and columns (the lattice will wrap around itself if _is-toroidal_ is `true`). The "small world effect" is created by adding additional links between the nodes in the lattice. The higher the _clustering-exponent_, the more the algorithm will favor already close-by nodes when adding new links. A clustering exponent of `2.0` is typically used.

        If you specify an _optional-command-block_, it is executed for each turtle in the newly created network. For example:

        ```NetLogo
        nw:generate-small-world turtles links 10 10 2.0 false [ set color red ]
        ```

        The turtles are generated in the order that they appear in the lattice. So, for instance, to generate a kleinberg lattice accross the entire world, and lay it out accordingly, try the following:

        ```NetLogo
        nw:generate-small-world turtles links world-width world-height 2.0 false
        (foreach (sort turtles) (sort patches) [ [t p] -> ask t [ move-to p ] ])
        ```
  - id: nw-generate-lattice-2d
    key: nw:generate-lattice-2d
    name: nw:generate-lattice-2d
    alternateNames:
      - generate-lattice-2d
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/generate-lattice-2d.html
    metadata:
      name: generate-lattice-2d
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtle-breed
            - type:
                kind: Agentset
                of: Link
              kind: DescribedType
              explicitName: link-breed
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: row-count
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: column-count
            - type:
                kind: NetLogoBoolean
              kind: DescribedType
              explicitName: is-toroidal
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - generator
      fullName: nw:generate-lattice-2d
      description: >
        
        Generates a new 2D [lattice
        network](https://en.wikipedia.org/wiki/Lattice_graph) (basically, a
        grid) of _row-count_ rows and _column-count_ columns. The grid will wrap
        around itself if _is-toroidal_ is `true`.


        If you specify an _optional-command-block_, it is executed for each
        turtle in the newly created network. For example:


        ```NetLogo

        nw:generate-lattice-2d turtles links 10 10 false [ set color red ]

        ```


        The turtles are generated in the order that they appear in the lattice.
        So, for instance, to generate a lattice accross the entire world, and
        lay it out accordingly, try the following:


        ```NetLogo

        nw:generate-lattice-2d turtles links world-width world-height false

        (foreach (sort turtles) (sort patches) [ [t p] -> ask t [ move-to p ] ])

        ```
  - id: nw-generate-ring
    key: nw:generate-ring
    name: nw:generate-ring
    alternateNames:
      - generate-ring
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/generate-ring.html
    metadata:
      name: generate-ring
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtle-breed
            - type:
                kind: Agentset
                of: Link
              kind: DescribedType
              explicitName: link-breed
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: num-nodes
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - generator
      fullName: nw:generate-ring
      description: >
        
        Generates a [ring network](https://en.wikipedia.org/wiki/Ring_network)
        of _num-nodes_ turtles, in which each turtle is connected to exactly two
        other turtles.


        The number of nodes must be at least three.


        If you specify an _optional-command-block_, it is executed for each
        turtle in the newly created network. For example:


        ```NetLogo

        nw:generate-ring turtles links 100 [ set color red ]

        ```
  - id: nw-generate-star
    key: nw:generate-star
    name: nw:generate-star
    alternateNames:
      - generate-star
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/generate-star.html
    metadata:
      name: generate-star
      extensionName: nw
      primitiveType:
        kind: command
