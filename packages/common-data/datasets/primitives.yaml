  - id: patches-own-patches-own
    key: patches-own
    name: patches-own
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#patches-own
    description: >+
      This keyword, like the globals, breed, &lt;breed&gt;-own,
       and turtles-own keywords, can only be used at the beginning of a
       program, before any function definitions. It defines the variables
       that all patches can use.

      All patches will then have the given variables and be able to use
       them.

      All patch variables can also be directly accessed by any turtle
       standing on the patch.

      See also [[globals|globals]], [[turtles-own|turtles-own]],
      [[breed|breed]], [[<breeds>-own|turtles-own]].

    examples:
      - patches-own [*var1* ...]
    isFromExtension: false
    isConstant: false
    metadata:
      id: patches-own
      entry_categories:
        - title: Patch-related
          id: patchgroup
        - title: Keyword
          id: keywords
      data:
        syntax:
          - name: patches-own
        description: >+
