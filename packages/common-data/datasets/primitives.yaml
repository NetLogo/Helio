  - id: turtles-own-turtles-own
    key: turtles-own
    name: turtles-own
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#turtles-own
    description: >+
      The turtles-own keyword, like the globals, breed, &lt;breeds&gt;-own, and
      patches-own keywords, can only be
       used at the beginning of a program, before any function
       definitions. It defines the variables belonging to each turtle.

      If you specify a breed instead of "turtles", only turtles
       of that breed have the listed variables. (More than one turtle
       breed may list the same variable.)

      ```

      breed [cats cat ]

      breed [dogs dog]

      breed [hamsters hamster]

      turtles-own [eyes legs]   ;; applies to all breeds

      cats-own [fur kittens]

      hamsters-own [fur cage]

      dogs-own [hair puppies]

      ```


      See also [[globals|globals]], [[patches-own|patches-own]],
      [[breed|breed]], [[<breeds>-own|turtles-own]].

    examples:
      - turtles-own [*var1* ...]
      - <breeds>-own [*var1* ...]
    isFromExtension: false
    isConstant: false
    metadata:
      id: turtles-own
      entry_categories:
        - title: Turtle-related
          id: turtlegroup
        - title: Keyword
          id: keywords
      data:
        syntax:
          - name: turtles-own
        description: >+
          The turtles-own keyword, like the globals, breed, &lt;breeds&gt;-own,
          and patches-own keywords, can only be
           used at the beginning of a program, before any function
           definitions. It defines the variables belonging to each turtle.

          If you specify a breed instead of "turtles", only turtles
