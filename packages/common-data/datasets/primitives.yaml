  - id: set-topology-set-topology
    key: set-topology
    name: set-topology
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#set-topology
    description: |+
      Sets the wrapping behavior of the world, such that X coordinates wrap
       if the first argument was *true* and Y coordinates wrap if the
       second argument was *true*.

      Equivalent to adjusting the "World wraps horizontally" and "World wraps
       vertically" checkboxes in the "Model Settings" window.

      ```
      set-topology true true
      ;; wrapping in both directions (torus)
      set-topology true false
      ;; wrapping only in the X direction (vertical cylinder)
      set-topology false true
      ;; wrapping only in the Y direction (horizontal cylinder)
      set-topology false false
      ;; no wrapping (box)
      ```

    examples:
      - set-topology *wraps-in-x? wraps-in-y?*
    isFromExtension: false
    isConstant: false
    metadata:
      id: set-topology
      data:
        syntax:
          - name: set-topology
            since: "7.0"
        description: >+
          Sets the wrapping behavior of the world, such that X coordinates wrap
           if the first argument was *true* and Y coordinates wrap if the
           second argument was *true*.

          Equivalent to adjusting the "World wraps horizontally" and "World
          wraps
           vertically" checkboxes in the "Model Settings" window.

          ```

          set-topology true true

          ;; wrapping in both directions (torus)

          set-topology true false

          ;; wrapping only in the X direction (vertical cylinder)

          set-topology false true

          ;; wrapping only in the Y direction (horizontal cylinder)

          set-topology false false

          ;; no wrapping (box)

          ```

        examples:
          - code: set-topology *wraps-in-x? wraps-in-y?*
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
  - id: setxy-setxy
    key: setxy
    name: setxy
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#setxy
    description: >+
      The turtle sets its x-coordinate to *x* and its y-coordinate
       to *y*.

      Equivalent to `set xcor x set ycor y`, except it happens in
       one time step instead of two.

      If *x* or *y* is outside the world, NetLogo will throw a
       runtime error, unless wrapping is turned on in the relevant
       dimensions. For example, with wrapping turned on in both dimensions
       and the default world size where `min-pxcor = -16`, `max-pxcor = 16`, `min-pycor = -16` and `max-pycor
       = 16`, asking a turtle to `setxy 17 17` will move it to
       the center of patch (-16, -16).

      ```

      setxy 0 0

      ;; turtle moves to the middle of the center patch

      setxy random-xcor random-ycor

      ;; turtle moves to a random point

      setxy random-pxcor random-pycor

      ;; turtle moves to the center of a random patch

      ```


      See also [[move-to|move-to]].

    examples:
      - setxy *x y*
    isFromExtension: false
    isConstant: false
    metadata:
      id: setxy
      entry_categories:
        - title: Turtle-related
          id: turtlegroup
      data:
        syntax:
          - name: setxy
            since: "1.0"
        description: >+
          The turtle sets its x-coordinate to *x* and its y-coordinate
           to *y*.

          Equivalent to `set xcor x set ycor y`, except it happens in
           one time step instead of two.

          If *x* or *y* is outside the world, NetLogo will throw a
           runtime error, unless wrapping is turned on in the relevant
           dimensions. For example, with wrapping turned on in both dimensions
           and the default world size where `min-pxcor = -16`, `max-pxcor = 16`, `min-pycor = -16` and `max-pycor
           = 16`, asking a turtle to `setxy 17 17` will move it to
           the center of patch (-16, -16).

          ```

          setxy 0 0

          ;; turtle moves to the middle of the center patch

          setxy random-xcor random-ycor

          ;; turtle moves to a random point

          setxy random-pxcor random-pycor

          ;; turtle moves to the center of a random patch

          ```


          See also [[move-to|move-to]].

        examples:
          - code: setxy *x y*
      icons:
        - alt: Turtle Command
          url: images/turtle.png
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
  - id: shade-of-shade-of?
    key: shade-of
    name: shade-of?
    source: netlogo
