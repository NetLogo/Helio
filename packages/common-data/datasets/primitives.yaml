        Creates a new data frame in R with the given variable name.  The columns
        will have the names given.  If the value for a column is a list, those
        will be the values for that column.  If the value is a non-list, it will
        be used as the single item in that column.  You can add additional
        column names and values by surrounding the command in parenthesis.


        ```

        clear-all

        sr:setup

        let l1 [10 20 30 40]

        let l2 [false true false false]

        let l3 ["orange" "green" "blue" "purple"]

        (sr:set-data-frame "df1" "score" l1 "enabled" l2 "color" l3)

        sr:run "print(typeof(df1))"

        ;; [1] "list"

        sr:run "print(is.data.frame(df1))"

        ;; [1] TRUE

        sr:run "print(df1)"

        ;;   score enabled  color

        ;; 1    10   FALSE orange

        ;; 2    20    TRUE  green

        ;; 3    30   FALSE   blue

        ;; 4    40   FALSE purple

        ```
