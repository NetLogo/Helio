  - id: turtles-on-turtles-on
    key: turtles-on
    name: turtles-on
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#turtles-on
    description: |+
      Reports an agentset containing all the turtles that are on the
       given patch or patches, or standing on the same patch as the given
       turtle or turtles.

      ```
      ask turtles [
        if not any? turtles-on patch-ahead 1
          [ fd 1 ]
      ]
      ask turtles [
        if not any? turtles-on neighbors [
          die-of-loneliness
        ]
      ]
      ```

      If the name of a breed is substituted for "turtles", then
       only turtles of that breed are included.

    examples:
      - turtles-on *turtle or patch*
      - turtles-on *turtleset or agentset*
      - <breeds>-on *turtle or patch*
      - <breeds>-on *turtleset or patchset*
    isFromExtension: false
    isConstant: false
    metadata:
      id: turtles-on
      entry_categories:
        - title: Turtle-related
          id: turtlegroup
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: turtles-on
            since: "2.0"
        description: |+
          Reports an agentset containing all the turtles that are on the
           given patch or patches, or standing on the same patch as the given
           turtle or turtles.

          ```
          ask turtles [
            if not any? turtles-on patch-ahead 1
              [ fd 1 ]
          ]
          ask turtles [
            if not any? turtles-on neighbors [
              die-of-loneliness
            ]
          ]
          ```

          If the name of a breed is substituted for "turtles", then
           only turtles of that breed are included.

