          id: commands-and-reporters
          subcategory:
            title: Turtle-related primitives
            id: turtle-related-primitives
        - title: Commands and Reporters
          id: commands-and-reporters
          subcategory:
            title: Patch-related primitives
            id: patch-related-primitives
      data:
        syntax:
          - name: distancexyz
            since: "4.1"
          - name: distancexyz-nowrap
            since: "4.1"
        description: >
