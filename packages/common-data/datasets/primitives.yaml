  - id: remove-remove
    key: remove
    name: remove
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#remove
    description: |+
      For a list, reports a copy of *list* with all instances of *item* removed.

      For strings, reports a copy of *string2* with all the
       appearances of *string1* as a substring removed.

      ```
      set mylist [2 7 4 7 "Bob"]
      set mylist remove 7 mylist
      ;; mylist is now [2 4 "Bob"]
      show remove "to" "phototonic"
      => "phonic"
      ```

    examples:
      - remove *item* *list*
      - remove *string1* *string2*
    isFromExtension: false
    isConstant: false
    metadata:
