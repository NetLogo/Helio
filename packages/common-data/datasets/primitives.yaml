  - id: ticks-ticks
    key: ticks
    name: ticks
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#ticks
    description: >+
      Reports the current value of the tick counter. The result is always
       a number and never negative.

      If the tick counter has not been started yet with `reset-ticks`, an error
      results.


      Most models use the `tick` command to advance the tick
       counter, in which case `ticks` will always report an
       integer. If the `tick-advance` command is used, then `ticks` may report a floating point number.

