        This will not affect the on-off state of the output ports.

        So, for example, if a motor is already connected to an output port and
        running, changing its power will change its speed.

        If the motor is not running, changing the power level will not turn it
        on; instead, it will affect the speed at which the motor starts when it
        is turned on with `output-port-on`.
