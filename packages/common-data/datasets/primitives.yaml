    name: stop-inspecting
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#stop-inspecting
    description: >+
      Closes the agent monitor for the given agent (turtle or patch or link).
       In the case that no agent monitor is open, `stop-inspecting` does
       nothing.

      ```

      stop-inspecting patch 2 4

      ;; the agent monitor for that patch closes

      ask sheep [ stop-inspecting self ]

      ;; close all agent monitors for sheep

      ask links [ stop-inspecting self ]

      ;; close all agent monitors for links

      ```


      See [[inspect|inspect]] and
      [[stop-inspecting-dead-agents|stop-inspecting-dead-agents]].

