  - id: timer-timer
    key: timer
    name: timer
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#timer
    description: >+
      Reports how many seconds have passed since the command
      [[reset-timer|reset-timer]] was last run (or since NetLogo
       started). The potential resolution of the clock is milliseconds.
       (Whether you get resolution that high in practice may vary from
       system to system, depending on the capabilities of the underlying
       Java Virtual Machine.)

      See also [[reset-timer|reset-timer]].


      Note that the timer is different from the tick counter. The timer
       measures elapsed real time in seconds; the tick counter measures
       elapsed model time in ticks.

    examples:
      - timer
    isFromExtension: false
    isConstant: false
    metadata:
      id: timer
      entry_categories:
        - title: Input/Output
          id: iogroup
      data:
        syntax:
          - name: timer
            since: "1.0"
        description: >+
          Reports how many seconds have passed since the command
          [[reset-timer|reset-timer]] was last run (or since NetLogo
           started). The potential resolution of the clock is milliseconds.
           (Whether you get resolution that high in practice may vary from
           system to system, depending on the capabilities of the underlying
           Java Virtual Machine.)

          See also [[reset-timer|reset-timer]].


          Note that the timer is different from the tick counter. The timer
           measures elapsed real time in seconds; the tick counter measures
           elapsed model time in ticks.

        examples:
          - code: timer
