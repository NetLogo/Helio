    sourceIcon: netlogo-netlogo-desktop
  - id: who-are-not-who-are-not
    key: who-are-not
    name: who-are-not
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#who-are-not
    description: >+
      Takes an agentset on the left and an agentset or an agent on the right.
      Reports
       a new agentset containing all agents from the left-hand agentset that are not in
       the right-hand agentset (or are not the right-hand agent).

      ```

      breed [frogs frog]

      breed [mice mouse]


      create-frogs 10

      create-mice 10

      create-turtles 10


      ; contains all the turtles who are not frogs

      ask turtles who-are-not frogs [
        forward 1
      ]```


      Another example:


      ```

      ask turtles [
        ; contains all the turtles this turtle is not linked to
        let targets (other turtles who-are-not link-neighbors)
        if count targets > 0 [
          create-link-with one-of targets
        ]
      ]```

    examples:
      - "*agentset* who-are-not *agentset*"
      - "*agentset* who-are-not *agent*"
    isFromExtension: false
    isConstant: false
    metadata:
      id: who-are-not
      entry_categories:
