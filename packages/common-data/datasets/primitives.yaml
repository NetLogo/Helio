  - id: sentence-sentence
    key: sentence
    name: sentence
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#sentence
    description: |+
      Makes a list out of the values. If any value is a list, its items
       are included in the result directly, rather than being included as
       a sublist. Examples make this clearer:

      ```
      show sentence 1 2
      => [1 2]
      show sentence [1 2] 3
      => [1 2 3]
      show sentence 1 [2 3]
      => [1 2 3]
      show sentence [1 2] [3 4]
      => [1 2 3 4]
      show sentence __WIKILINK_0__ __WIKILINK_1__
      => [[1 2] [3 4]]
      show (sentence [1 2] 3 [4 5] (3 + 3) 7)
      => [1 2 3 4 5 6 7]
      ```

    examples:
      - sentence *value1* *value2*
      - (sentence *value1* ...)
    isFromExtension: false
    isConstant: false
    metadata: &a51
