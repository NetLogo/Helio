  - id: file-print-file-print
    key: file-print
    name: file-print
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#file-print
    description: >+
      Prints *value* to an opened file, followed by a carriage
       return.

      This agent is *not* printed before the value, unlike
      [[file-show|file-show]].


      Note that this command is the file i/o equivalent of [[print|print]], and
      [[file-open|file-open]] needs to
       be called before this command can be used.

      See also [[file-show|file-show]], [[file-type|file-type]],
      [[file-write|file-write]],
       and [Output (/programming guide)](/programming#output).

    examples:
      - file-print *value*
    isFromExtension: false
    isConstant: false
    metadata:
      id: file-print
      entry_categories:
        - title: File
          id: fileiogroup
      data:
        syntax:
          - name: file-print
            since: "2.0"
        description: >+
