    name: clear-ticks
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#clear-ticks
    description: |+
      Clears the tick counter.

      Does not set the counter to zero. After this command runs, the tick
       counter has no value. Attempting to access or update it is an error
       until [[reset-ticks|reset-ticks]] is called. This is
       useful if you want to set the model to a "pre-setup" state with some
       forever buttons disabled.

      See also [[reset-ticks|reset-ticks]].

    examples:
      - clear-ticks
    isFromExtension: false
    isConstant: false
    metadata:
      id: clear-ticks
      entry_categories:
        - title: World
          id: worldgroup
      data:
        syntax:
