  - id: read-from-string-read-from-string
    key: read-from-string
    name: read-from-string
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#read-from-string
    description: >+
      Interprets the given string as if it had been typed in the Command
       Center, and reports the resulting value. The result may be a
       number, list, string, or boolean value, or the special value
       "nobody".

      Useful in conjunction with the [[user-input|user-input]]primitive for
      converting the user's input into usable form.


      ```

      show read-from-string "3" + read-from-string "5"

      => 8

      show length read-from-string "[1 2 3]"

      => 3

      crt read-from-string user-input "Make how many turtles?"

      ;; the number of turtles input by the user

      ;; are created

      ```


      Note: This primitive is not compatible with NetLogo Web. If you
       wish to read user input with the same code and the
       same behavior in both NetLogo and NetLogo Web, see [dialog:user-input](https://github.com/NetLogo/Dialog-Extension#readme).

    examples:
      - read-from-string *string*
    isFromExtension: false
    isConstant: false
