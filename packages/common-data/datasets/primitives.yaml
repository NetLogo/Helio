        examples:
          - code: file-read
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
  - id: file-read-characters-file-read-characters
    key: file-read-characters
    name: file-read-characters
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#file-read-characters
    description: >+
      Reports the given *number* of characters from an opened file
       as a string. If there are fewer than that many characters left, it
       will report all of the remaining characters.

      Note that it will return every character including newlines and
       spaces.

      Also note that the [[file-open|file-open]] command must
       be called before this reporter can be used, and there must be data
       remaining in the file. Use the reporter [[file-at-end?|file-at-end]] to determine if you are at the end
       of the file.

      ```

      file-open "my-file.txt"

      print file-read-characters 5

      ;; Current line in file is "Hello World"

      => Hello

      ```


      See also [[file-open|file-open]].

    examples:
      - file-read-characters *number*
    isFromExtension: false
    isConstant: false
    metadata:
      id: file-read-characters
      entry_categories:
        - title: File
          id: fileiogroup
      data:
        syntax:
          - name: file-read-characters
            since: "2.0"
        description: >+
