          cats-own [fur kittens]

          hamsters-own [fur cage]

          dogs-own [hair puppies]

          ```


          See also [[globals|globals]], [[patches-own|patches-own]],
          [[breed|breed]], [[<breeds>-own|turtles-own]].

        examples:
          - code: turtles-own [*var1* ...]
          - code: <breeds>-own [*var1* ...]
