  - id: pitch-pitch
    key: pitch
    name: pitch
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#pitch
    description: >+
      This is a built-in turtle variable. Pitch is the angle between the "nose"
      of the turtle and the
       xy-plane. Heading and pitch together define the forward vector of the turtle or the direction that the
       turtle is facing.

      This is a number greater than or equal to 0 and less than 360. 0 is
      parallel to the xy-plane, 90 is parallel
       to the z-axis. While you can set pitch we recommend that you use the primitives to turn the turtle.
       Depending on the position more than one relative angle (heading, pitch and roll) may change at once.

      Example:


      ```

      ;; assume roll and heading are 0

      set pitch 45      ;; turtle is now north and up

      set heading heading + 10 ;; same effect as "tilt-up 10"


      ```

      See also [[heading|heading]], [[roll|3d#roll]], [[tilt-up|tilt-up]],
      [[tilt-down|3d#tilt-cmds]], [[right|3d#right]], [[left|3d#left]]

    examples:
      - pitch
    isFromExtension: false
    isConstant: false
    metadata:
      id: pitch
      entry_categories:
        - title: Built-In Variables
          id: built-in-variables
          subcategory:
            title: Turtles
            id: turtles
      data:
        syntax:
          - name: pitch
        description: >+
          This is a built-in turtle variable. Pitch is the angle between the
          "nose" of the turtle and the
           xy-plane. Heading and pitch together define the forward vector of the turtle or the direction that the
           turtle is facing.

          This is a number greater than or equal to 0 and less than 360. 0 is
          parallel to the xy-plane, 90 is parallel
           to the z-axis. While you can set pitch we recommend that you use the primitives to turn the turtle.
           Depending on the position more than one relative angle (heading, pitch and roll) may change at once.

          Example:


