  - id: setxyz-setxyz
    key: setxyz
    name: setxyz
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#setxyz
    description: >+
      3D version of [[setxy|setxy]].


      The agent, a turtle or the observer, sets its x-coordinate to *x*, its
      y-coordinate to *y* and its z-coordinate to *z*. When the observer uses
      `setxyz` it remains facing the same point so the heading, pitch, and roll,
      may also change.


      For turtles equivalent to `set xcor x set ycor y set zcor z`, except it
      happens in one time step
       instead of three.

      ```

      setxyz 0 0 0

      ;; agent moves to the middle of the center patch


      ```

      See also [[face|face]]

    examples:
      - setxyz *x y z*
    isFromExtension: false
    isConstant: false
    metadata:
      id: setxyz
      entry_categories:
        - title: Commands and Reporters
          id: commands-and-reporters
          subcategory:
            title: Turtle-related primitives
            id: turtle-related-primitives
        - title: Commands and Reporters
          id: commands-and-reporters
          subcategory:
            title: Observer movement primitives
            id: observer-movement-primitives
      data:
        syntax:
          - name: setxyz
            since: "4.1"
        description: >+
          3D version of [[setxy|setxy]].


          The agent, a turtle or the observer, sets its x-coordinate to *x*, its
          y-coordinate to *y* and its z-coordinate to *z*. When the observer
          uses `setxyz` it remains facing the same point so the heading, pitch,
          and roll, may also change.


