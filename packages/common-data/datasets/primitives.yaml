          set pitch 45      ;; turtle is now north and up

          set heading heading + 10 ;; same effect as "tilt-up 10"


          ```

          See also [[heading|heading]], [[roll|3d#roll]], [[tilt-up|tilt-up]],
          [[tilt-down|3d#tilt-cmds]], [[right|3d#right]], [[left|3d#left]]

        examples:
          - code: pitch
      icons:
        - alt: Turtle Command
          url: images/turtle.png
  - id: pzcor-pzcor
    key: pzcor
    name: pzcor
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#pzcor
    description: >+
      This is a built-in patch variable. It holds the z coordinate of the patch.
      It is always an integer. You
       cannot set this variable, because patches don't move.

      pzcor is greater than or equal to min-pzcor and less than or equal to
      max-pzcor.


      All patch variables can be directly accessed by any turtle standing on the
      patch.


      See also [[pxcor, pycor|pcor]], [[zcor|3d#zcor]].

    examples:
      - pzcor
    isFromExtension: false
    isConstant: false
    metadata:
      id: pzcor
      entry_categories:
        - title: Built-In Variables
          id: built-in-variables
          subcategory:
            title: Patches
            id: patches
      data:
        syntax:
          - name: pzcor
        description: >+
          This is a built-in patch variable. It holds the z coordinate of the
          patch. It is always an integer. You
           cannot set this variable, because patches don't move.

          pzcor is greater than or equal to min-pzcor and less than or equal to
          max-pzcor.


          All patch variables can be directly accessed by any turtle standing on
          the patch.


          See also [[pxcor, pycor|pcor]], [[zcor|3d#zcor]].

        examples:
