  - id: auto-plot-status-auto-plot-off
    key: auto-plot-status
    name: auto-plot-off
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#auto-plot-status
    description: >+
      These pairs of commands are used to control the NetLogo feature of
       auto-plotting in the current plot. Auto-plotting will automatically
       update the x and y axes of the plot whenever the current pen
       exceeds these boundaries when adding a new point with `plot`or `plotxy`. When using `histogram` to plot
       values, only the y axis will automatically update its ranges, the x
       axis will be unchanged.
       Each plot has an auto-plotting settings called *Auto xcale x-axis?* and *Auto scale y-axis?* in the user
       interface that determines if the plot will enable auto-plotting when
       the model starts. Auto-plotting is useful when wanting to show all
       plotted values in the current plot, regardless of the current plot ranges.

      These commands will produce a runtime error if the current plot has not
      been set.


      See also [[plot|plot]], [[plotxy|plotxy]], and [[histogram|histogram]],
      and also the [Plots section of the Interface Tab
      guide](/interfacetab#plots).

    examples:
      - auto-plot-off
      - auto-plot-x-off
      - auto-plot-y-off
      - auto-plot-on
      - auto-plot-x-on
      - auto-plot-y-on
    isFromExtension: false
    isConstant: false
    metadata: &a6
      id: auto-plot-status
      entry_categories:
        - title: Plotting
          id: plottinggroup
      data:
        syntax:
          - name: auto-plot-off
            since: "1.0"
          - name: auto-plot-x-off
            since: "7.0"
          - name: auto-plot-y-off
            since: "7.0"
          - name: auto-plot-on
            since: "1.0"
          - name: auto-plot-x-on
            since: "7.0"
          - name: auto-plot-y-on
            since: "7.0"
        description: >+
          These pairs of commands are used to control the NetLogo feature of
