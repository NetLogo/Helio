  - id: item-item
    key: item
    name: item
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#item
    description: |+
      On lists, reports the value of the item in the given list with the
       given index.

      On strings, reports the character in the given string at the given
       index.

      Note that the indices begin from 0, not 1. (The first item is item
       0, the second item is item 1, and so on.)

      If *index* is fractional, it will be rounded down to
       the nearest integer (4.5 becomes 4, 10.9 becomes 10).

      ```
      ;; suppose mylist is [2 4 6 8 10]
      show item 2 mylist
      => 6
      show item 3 "my-shoe"
      => "s"
      ```

    examples:
      - item *index list*
      - item *index string*
    isFromExtension: false
    isConstant: false
    metadata:
      id: item
      entry_categories:
        - title: String
          id: stringgroup
      data:
        syntax:
          - name: item
            since: "1.0"
        description: |+
          On lists, reports the value of the item in the given list with the
           given index.

          On strings, reports the character in the given string at the given
           index.

          Note that the indices begin from 0, not 1. (The first item is item
           0, the second item is item 1, and so on.)

          If *index* is fractional, it will be rounded down to
           the nearest integer (4.5 becomes 4, 10.9 becomes 10).

          ```
          ;; suppose mylist is [2 4 6 8 10]
          show item 2 mylist
          => 6
          show item 3 "my-shoe"
          => "s"
          ```

        examples:
          - code: item *index list*
          - code: item *index string*
