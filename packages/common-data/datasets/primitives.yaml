        examples:
          - code: position *item* *list*
          - code: position *string1* *string2*
  - id: precision-precision
    key: precision
    name: precision
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#precision
    description: |+
      Reports *number* rounded to *places* decimal places.

      If *places* is negative, the rounding takes place to the left
       of the decimal point.

      ```
      show precision 1.23456789 3
      => 1.235
      show precision 3834 -3
      => 4000
      ```

      See also [[round|round]], [[ceiling|ceiling]], [[floor|floor]].

    examples:
      - precision *number places*
    isFromExtension: false
    isConstant: false
    metadata:
      id: precision
      entry_categories:
        - title: Mathematical
          id: mathematicalgroup
      data:
