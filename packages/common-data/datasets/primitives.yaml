      description: >
        
        Reports the current status of an active video.

        Note that after calling `vid:movie-open` or `vid:movie-select` the
        status will be set to "stopped",

        while after calling `vid:camera-open` or `vid:camera-select` the status
        will be "playing".


        Example:


        ```NetLogo

        vid:status     ; => "inactive"


        vid:movie-open "foobar.mp4"

        vid:status      ; => "stopped"


        vid:movie-start

        vid:status       ; => "playing"

        ```
  - id: vid-capture-image
    key: vid:capture-image
    name: vid:capture-image
    alternateNames:
      - capture-image
    source: vid
    isFromExtension: true
    url: https://docs.netlogo.org/vid/capture-image.html
    metadata:
      name: capture-image
      extensionName: vid
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: width
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: height
        isInfix: false
      tags: []
      fullName: vid:capture-image
      description: >
        
        Captures an image from the currently selected active source.


        If width and height are not specified, the image is captured at the
        current source resolution.


        Example:


        ```NetLogo

        extensions [ vid bitmap ]


        to capture
          ; capture an image if a video source is open,
          ; have the user select a camera if no video source found
          carefully [
            ; when camera open, take an image
            let image vid:capture-image ; returns image suitable for use with bitmap extension
            bitmap:copy-to-drawing image 0 0
          ] [
            if error-message = "Extension exception: vid: no selected source" [
              vid:camera-select
              vid:start
              let image vid:capture-image
              bitmap:copy-to-drawing image 0 0
            ]
          ]
        end

        ```


        If you want to capture images at a different resolution, simply replace
        `vid:capture-image` with, e.g., `(vid:capture-image 640 480)`.



        Errors:


        * Message `"vid: no selected source"`: There is no currently selected
        video source. Select a source with `vid:movie-open`, `vid:movie-select`,
        `vid:camera-open`, or `vid:camera-select`.

        * Message `"vid: invalid dimensions"`: The selected dimensions are
        invalid (one of the dimensions is zero or negative).
  - id: vid-set-time
