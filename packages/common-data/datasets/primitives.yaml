  - id: zcor-zcor
    key: zcor
    name: zcor
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#zcor
    description: >+
      This is a built-in turtle variable. It holds the current z coordinate of
      the turtle. This is a floating
       point number, not an integer. You can set this variable to change the turtle's location.

      This variable is always greater than or equal to (- screen-edge-z) and
      strictly less than screen-edge-z.


      See also [[setxy|3d#setxyz]], [[xcor|xcor]], [[ycor|ycor]],
      [[pxcor|pcor]], [[pycor|pcor]], [[pzcor|3d#pzcor]]

    examples:
      - zcor
    isFromExtension: false
    isConstant: false
    metadata:
