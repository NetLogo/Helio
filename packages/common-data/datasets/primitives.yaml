  - id: untie-untie
    key: untie
    name: untie
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#untie
    description: >+
      Unties *end2* from *end1* (sets [[tie-mode|tie-mode]] to "none") if they
      were
       previously tied together. If the link is an undirected link, then
       it will untie *end1* from *end2* as well. It does **not** remove the link between the two turtles.

      See also [[tie|tie]]


      See the [Tie](/programming#tie) section of the
       Programming Guide for more details.

    examples:
      - untie
    isFromExtension: false
    isConstant: false
