            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - generator
      fullName: nw:generate-star
      description: >
        
        Generates a [star network](https://en.wikipedia.org/wiki/Star_graph) in
        which there is one central turtle and every other turtle is connected
        only to this central node. The number of turtles can be as low as one,
        but it won't look much like a star.


        If you specify an _optional-command-block_, it is executed for each
        turtle in the newly created network. For example:


        ```NetLogo

        nw:generate-star turtles links 100 [ set color red ]

        ```
  - id: nw-generate-wheel
    key: nw:generate-wheel
    name: nw:generate-wheel
    alternateNames:
      - generate-wheel
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/generate-wheel.html
    metadata:
      name: generate-wheel
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtle-breed
            - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: link-breed
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: num-nodes
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - generator
      fullName: nw:generate-wheel
      description: >
        
        Variants:


        - `nw:generate-wheel-inward`

        - `nw:generate-wheel-outward`


        Generates a [wheel network](https://en.wikipedia.org/wiki/Wheel_graph),
        which is basically a [ring
        network](https://en.wikipedia.org/wiki/Ring_network) with an additional
        "central" turtle that is connected to every other turtle.


        The number of nodes must be at least four.


        The `nw:generate-wheel` only works with undirected link breeds. The
        `nw:generate-wheel-inward` and `nw:generate-wheel-outward` versions only
        work with directed _link-breed_. The `inward` and `outward` part of the
        primitive names refer to the direction that the "spokes" of the wheel
        point to relative to the central turtle.


        If you specify an _optional-command-block_, it is executed for each
        turtle in the newly created network. For example:


        ```NetLogo

        nw:generate-wheel turtles links 100 [ set color red ]

        ```
  - id: nw-save-matrix
    key: nw:save-matrix
    name: nw:save-matrix
    alternateNames:
      - save-matrix
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/save-matrix.html
    metadata:
      name: save-matrix
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: file-name
        isInfix: false
      tags:
        - io
      fullName: nw:save-matrix
      description: >
        
        Saves the current network, as defined by `nw:set-context`, to
        _file-name_, as a text file, in the form of a simple connection matrix.


        Here is, for example, a undirected ring network with four nodes:

            0.00 1.00 0.00 1.00
            1.00 0.00 1.00 0.00
            0.00 1.00 0.00 1.00
            1.00 0.00 1.00 0.00

        And here is the directed version:

            0.00 1.00 0.00 0.00
            0.00 0.00 1.00 0.00
            0.00 0.00 0.00 1.00
            1.00 0.00 0.00 0.00

        At the moment, `nw:save-matrix` does not support link weights. Every
        link is represented as a "1.00" in the connection matrix. This will
        change in a future version of the extension.
  - id: nw-load-matrix
    key: nw:load-matrix
    name: nw:load-matrix
    alternateNames:
      - load-matrix
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/load-matrix.html
    metadata:
      name: load-matrix
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: file-name
            - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtle-breed
            - type:
                kind: Agentset
                of: Link
              kind: DescribedType
              explicitName: link-breed
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - io
      fullName: nw:load-matrix
      description: >
        
        Generates a new network according to the connection matrix saved in
        _file-name_, using _turtle-breed_ and _link-breed_ to create the new
        turtles and links.


        At the moment, `nw:load-matrix` does not support link weights.


        Please be aware that the breeds used to load the matrix may be different
        from those that you used when you saved it.


        For example:


        ```NetLogo

        extensions [ nw ]

        directed-link-breed [ dirlinks dirlink ]

        to go
          clear-all
          crt 5 [ create-dirlinks-to other turtles ]
          nw:set-context turtles dirlinks
          nw:save-matrix "matrix.txt"
          clear-all
          nw:load-matrix "matrix.txt" turtles links
          layout-circle turtles 10
        end

        ```


        ..._will_ give you back **undirected** links, even if you saved directed
        links into the matrix.


        If you specify an _optional-command-block_, it is executed for each
        turtle in the newly created network. For example:


        ```NetLogo

        nw:load-matrix "matrix.txt" turtles links [ set color red ]

        ```
  - id: nw-save-graphml
    key: nw:save-graphml
    name: nw:save-graphml
    alternateNames:
      - save-graphml
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/save-graphml.html
    metadata:
      name: save-graphml
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: file-name
        isInfix: false
      tags:
        - io
      fullName: nw:save-graphml
      description: >
        
        You can save the current graph to GraphML. The following NetLogo code:


        ```NetLogo

        extensions [ nw ]


        breed [ bankers banker ]

        bankers-own [ bank-name ]

        breed [ clients client ]

        clients-own [ hometown ]


        undirected-link-breed [ friendships friendship ]


        directed-link-breed [ accounts account ]

        accounts-own [ amount ]


        to go
          clear-all
          create-bankers 1 [
            set bank-name "The Bank"
          ]
          create-clients 1 [
            set hometown "Turtle City"
            create-friendship-with banker 0
            create-account-to banker 0 [
              set amount 9999.99
            ]
          ]
          nw:set-context turtles links
          nw:save-graphml "example.graphml"
        end

        ```


        Will produce the following GraphML file:


        ```XML

        <?xml version="1.0" encoding="UTF-8"?>

        <graphml xmlns="http://graphml.graphdrawing.org/xmlns/graphml"

        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation="http://graphml.graphdrawing.org/xmlns/graphml">

        <key id="PEN-MODE" for="node" attr.name="PEN-MODE" attr.type="string"/>

        <key id="YCOR" for="node" attr.name="YCOR" attr.type="double"/>

        <key id="PEN-SIZE" for="node" attr.name="PEN-SIZE" attr.type="double"/>

        <key id="LABEL" for="node" attr.name="LABEL" attr.type="string"/>

        <key id="SHAPE" for="node" attr.name="SHAPE" attr.type="string"/>

        <key id="BREED" for="node" attr.name="BREED" attr.type="string"/>

        <key id="WHO" for="node" attr.name="WHO" attr.type="double"/>

        <key id="HIDDEN?" for="node" attr.name="HIDDEN?" attr.type="boolean"/>

        <key id="LABEL-COLOR" for="node" attr.name="LABEL-COLOR"
        attr.type="double"/>

        <key id="HEADING" for="node" attr.name="HEADING" attr.type="double"/>

        <key id="BANK-NAME" for="node" attr.name="BANK-NAME"
        attr.type="string"/>

        <key id="HOMETOWN" for="node" attr.name="HOMETOWN" attr.type="string"/>

        <key id="COLOR" for="node" attr.name="COLOR" attr.type="double"/>

        <key id="XCOR" for="node" attr.name="XCOR" attr.type="double"/>

        <key id="SIZE" for="node" attr.name="SIZE" attr.type="double"/>

        <key id="END1" for="edge" attr.name="END1" attr.type="string"/>

        <key id="TIE-MODE" for="edge" attr.name="TIE-MODE" attr.type="string"/>

        <key id="END2" for="edge" attr.name="END2" attr.type="string"/>

        <key id="LABEL-COLOR" for="edge" attr.name="LABEL-COLOR"
        attr.type="double"/>

        <key id="THICKNESS" for="edge" attr.name="THICKNESS"
        attr.type="double"/>

        <key id="LABEL" for="edge" attr.name="LABEL" attr.type="string"/>

        <key id="SHAPE" for="edge" attr.name="SHAPE" attr.type="string"/>

        <key id="BREED" for="edge" attr.name="BREED" attr.type="string"/>

        <key id="COLOR" for="edge" attr.name="COLOR" attr.type="double"/>

        <key id="AMOUNT" for="edge" attr.name="AMOUNT" attr.type="double"/>

        <key id="HIDDEN?" for="edge" attr.name="HIDDEN?" attr.type="boolean"/>

        <graph edgedefault="undirected">

        <node id="client 1">

        <data key="PEN-MODE">up</data>

        <data key="YCOR">0</data>

        <data key="PEN-SIZE">1</data>

        <data key="LABEL"></data>

        <data key="SHAPE">default</data>

        <data key="BREED">clients</data>

        <data key="WHO">1</data>

        <data key="HIDDEN?">false</data>

        <data key="LABEL-COLOR">9.9</data>

        <data key="HEADING">356</data>

        <data key="HOMETOWN">Turtle City</data>

        <data key="COLOR">115</data>

        <data key="XCOR">0</data>

        <data key="SIZE">1</data>

        </node>

        <node id="banker 0">

        <data key="PEN-MODE">up</data>

        <data key="YCOR">0</data>

        <data key="PEN-SIZE">1</data>

        <data key="LABEL"></data>

        <data key="SHAPE">default</data>

        <data key="BREED">bankers</data>

        <data key="WHO">0</data>

        <data key="HIDDEN?">false</data>

        <data key="LABEL-COLOR">9.9</data>

        <data key="HEADING">32</data>

        <data key="BANK-NAME">The Bank</data>

        <data key="COLOR">85</data>

        <data key="XCOR">0</data>

        <data key="SIZE">1</data>

        </node>

        <edge source="client 1" target="banker 0">

        <data key="END1">(client 1)</data>

        <data key="TIE-MODE">none</data>

        <data key="END2">(banker 0)</data>

        <data key="LABEL-COLOR">9.9</data>

        <data key="THICKNESS">0</data>

        <data key="LABEL"></data>

        <data key="SHAPE">default</data>

        <data key="BREED">accounts</data>

        <data key="COLOR">5</data>

        <data key="AMOUNT">9999.99</data>

        <data key="HIDDEN?">false</data>

        </edge>

        <edge source="banker 0" target="client 1">

        <data key="END1">(banker 0)</data>

        <data key="TIE-MODE">none</data>

        <data key="END2">(client 1)</data>

        <data key="LABEL-COLOR">9.9</data>

        <data key="THICKNESS">0</data>

        <data key="LABEL"></data>

        <data key="SHAPE">default</data>

        <data key="BREED">friendships</data>

        <data key="COLOR">5</data>

        <data key="HIDDEN?">false</data>

        </edge>

        </graph>

        </graphml>

        ```


        A few things to notice:


        - The breed is stored as data field, both for nodes and edges.  Note
        that the breed is stored in its plural form.

        - The data includes both NetLogo's internal variables and the variables
        that were defined as either `breeds-own`, `turtles-own`,
        `linkbreeds-own` or `links-own`.

        - Each key gets an `attr.type` based on the actual types of the values
        contained in the agent variables. The three possible types are
        `"string"`, `"double"` and `"boolean"`. To determine the attribute type
        of a particular agent variable, the extension will look at the first
        agent in the graph. To see which agent is first, you can look at the
        result of `nw:get-context`. Note that variables containing other types
        of values, such as turtles, patches, lists, etc., will be stored as
        strings.

        - This example only has a directed link, and you will notice the `<graph
        edgedefault="directed">` element. If we had only undirected links, we
        would have `<graph edgedefault="undirected">`. What if we try to mix
        both kinds of link? At the moment, the extension will save such a
        "mixed" graph as if it were an undirected graph (see [this
        issue](https://github.com/NetLogo/NW-Extension/issues/58) for more
        details). The order of the `source` and `target` will be respected,
        however, so if you know which breeds represent directed links, you can
        figure it out _a posteriori_.
  - id: nw-load-graphml
    key: nw:load-graphml
    name: nw:load-graphml
    alternateNames:
      - load-graphml
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/load-graphml.html
    metadata:
      name: load-graphml
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: file-name
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - io
      fullName: nw:load-graphml
      description: >
        
        Loading a GraphML file into NetLogo with the network extension should be
        as simple as calling `nw:load-graphml "example.graphml"`, but there is a
        bit of preparation involved.


        The key idea is that `nw:load-graphml` will try to assign the attribute
        values defined in the GraphML file to NetLogo agent variables of the
        same names (this is *not* case sensitive). The first one it tries to set
        is `breed` if it is there, so the turtle or link will get the right
        breed and, hence, the right breed variables.  The load expects the
        *plural form* of the breed for a turtle or link, it will not recognize
        the singular form.


        One special case is the `who` number, which is ignored by the importer
        if it is present as a GraphML attribute: NetLogo does not allow you to
        modify this number once a turtle is created and, besides, there could
        already be an existing turtle with that number.


        The simplest case to handle is when the original GraphML file has been
        saved from NetLogo by using `nw:save-graphml`. In this case, all you
        should have to do is to make sure that you have the same breed and
        variables definition as when you saved the file and you should get back
        your original graph. For example, if you want to load the file from the
        `nw:save-graphml` example above, you should have the following
        definitions:


        ```NetLogo

        breed [ bankers banker ]

        bankers-own [ bank-name ]

        breed [ clients client ]

        clients-own [ hometown ]


        undirected-link-breed [ friendships friendship ]


        directed-link-breed [ accounts account ]

        accounts-own [ amount ]

        ```


        Loading a graph that was saved from a different program than NetLogo is
        quite possible as well, but it may take a bit of tinkering to get all
        the attribute-variable match up right. If you encounter major problems,
        please do not hesitate to [open an
        issue](https://github.com/NetLogo/NW-Extension/issues/new).


        The extension will try to assign the type defined by `attr.type` to each
        variable that it loads. If it's unable to convert it to that type, it
        will load it as a string. If `attr.type` is not defined, or is set to an
        unknown value, the extension will first try to load the value as a
        double, then try it as a boolean, and finally fall back on a string.


        If you specify an _optional-command-block_, it is executed for each
        turtle in the newly created network. For example:


        ```NetLogo

        nw:load-graphml "example.graphml" [ set color red ]

        ```


        Note that this command block can be used to build a list or an agentset
        containing the newly created nodes:


        ```NetLogo

        let node-list []

        nw:load-graphml "example.graphml" [
          set node-list lput self node-list
        ]

        let node-set turtle-set node-list

        ```
  - id: nw-load
    key: nw:load
    name: nw:load
    alternateNames:
      - load
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/load.html
    metadata:
      name: load
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: file-name
            - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: default-turtle-breed
            - type:
                kind: Agentset
                of: Link
              kind: DescribedType
              explicitName: default-link-breed
            - type:
                kind: OptionalType
              kind: DescribedType
              explicitName: optional-command-block
        isInfix: false
      tags:
        - io
      fullName: nw:load
      description: >
        
        Filetype specific variants:


        - `nw:load`

        - `nw:load-dl`

        - `nw:load-gdf`

        - `nw:load-gexf`

        - `nw:load-gml`

        - `nw:load-vna`


        Import the given file into NetLogo. Like `nw:load-graphml`, the importer
        will do its best to match node and edge attributes in the file with
        turtle and link variables in NetLogo. If `breed` is specified for nodes
        and edges in the file and exists in NetLogo, it will be used. Otherwise,
        the default turtle and link breeds are used.


        Limitations:


        - Multigraphs are not supported in importing. Even if the file format
        supports it (and many don't), only the first link will be used on
        import. This is due to a limitation in the parsing libraries NW uses.
        `nw:load-graphml` does support multigraphs with the normal NetLogo
        limitation that two turtles can share more than one link only if all the
        links are of different breeds.


        `nw:load` determines the file-type of given file based on the extension
        and calls the corresponding `load-*` primitive on it. Note that GraphML
        must be imported with `nw:load-graphml`.
  - id: nw-save
    key: nw:save
    name: nw:save
    alternateNames:
      - save
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/save.html
    metadata:
      name: save
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: file-name
        isInfix: false
      tags:
        - io
      fullName: nw:save
      description: >
        
        Filetype specific variants:


        - `nw:save-dl`

        - `nw:save-gdf`

        - `nw:save-gexf`

        - `nw:save-gml`

        - `nw:save-vna`


        Export the network context in the given format to the given file. Turtle
        and link attributes will be exported to formats that support node and
        edge properties.


        Limitations:


        - `x` and `y` (not `xcor` and `ycor`) can only be numbers. `x` and `y`
        are commonly used in formats pertaining to position and behind the
        scenes NW uses Gephi's libraries for exporting. Furthermore, `x` and `y`
        will be added even if they didn't exist in the model. Again, this is
        because NW uses Gephi's libraries which assume that nodes have positions
        stored in `x` and `y`. If you wish to export to Gephi specifically, we
        recommend creating `x` and `y` turtles variables and setting them to
        `xcor` and `ycor` before export.

        - Color will be exported in a standard RGB format. This should hopefully
        increase compatibility with other programs.

        - Turtle and link variables that contain values of different types will
        be stored as strings. Unfortunately, most network formats require that
        node and attributes have a single type.

        - Many programs use `label` to store the id of nodes. Thus, if you're
        having trouble importing data exported from NetLogo into another
        program, you might try setting turtles' labels to their `who` number.

        - Multigraphs are not supported. Thus, two turtles can share at most one
        link. `nw:save-graphml` does support multigraphs, so use that if turtles
        can have more than one type of link connecting them.


        `nw:save` determines the file-type of the given file based on the
        extension and calls the corresponding `save-*` primitive on it. Note
        that GraphML must be exported with `nw:save-graphml`.
  - id: palette-alpha-of
    key: palette:alpha-of
    name: palette:alpha-of
    alternateNames:
      - alpha-of
    source: palette
    isFromExtension: true
    url: https://docs.netlogo.org/palette/alpha-of.html
    metadata:
      name: alpha-of
      extensionName: palette
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - - type:
                kind: CustomType
                name: list || number
              kind: DescribedType
              explicitName: color
        isInfix: false
      tags: []
      fullName: palette:alpha-of
      description: >
        
        Reports a value in the range 0 to 255 representing the alpha of the
        given NL, RGB or RGBA *color*. The alpha value of an NL or RGB color is
        255.


        Example:

        ```

        show palette:alpha-of red ;; 255

        show palette:alpha-of [3 14 159 26] ;; 26

        ```
  - id: palette-with-alpha
    key: palette:with-alpha
    name: palette:with-alpha
    alternateNames:
      - with-alpha
    source: palette
    isFromExtension: true
    url: https://docs.netlogo.org/palette/with-alpha.html
    metadata:
      name: with-alpha
      extensionName: palette
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - - type:
                kind: CustomType
                name: list || number
              kind: DescribedType
              explicitName: color
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: number
        isInfix: true
      tags: []
      fullName: palette:with-alpha
      description: >
        
        Reports an RGBA color with alpha component equal to *number* and the RGB
        content of *color*. An error message results if alpha is not in the
        range from 0 to 255.


        Example:

        ```

        show [12 34 55 6] palette:with-alpha 99 ;; [12 34 55 99]

        ```
  - id: palette-alpha
    key: palette:alpha
    name: palette:alpha
    alternateNames:
      - alpha
    source: palette
    isFromExtension: true
    url: https://docs.netlogo.org/palette/alpha.html
    metadata:
      name: alpha
      extensionName: palette
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - []
        isInfix: false
      tags: []
      fullName: palette:alpha
      description: >
        
        Get the alpha value of the color of the agent. The alpha value of an NL
        or RGB color is 255.


        Example:

        ```

        show [palette:alpha] of turtles

        ```
  - id: palette-set-alpha
    key: palette:set-alpha
    name: palette:set-alpha
    alternateNames:
      - set-alpha
    source: palette
    isFromExtension: true
    url: https://docs.netlogo.org/palette/set-alpha.html
    metadata:
      name: set-alpha
      extensionName: palette
      primitiveType:
        kind: command
