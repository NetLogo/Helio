  - id: patch-at-patch-at
    key: patch-at
    name: patch-at
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#patch-at
    description: >+
      Reports the patch at (dx, dy) from the caller, that is, the patch
       containing the point dx east and dy patches north of this agent.

      Reports nobody if there is no such patch because that point is
       beyond a non-wrapping world boundary.

      ```

      ask patch-at 1 -1 [ set pcolor green ]

      ;; if caller is a turtle or patch, turns the

      ;;   patch just southeast of the caller green

      ```


      See also [[patch|patch]], [[patch-ahead|patch-ahead]],
      [[patch-left-and-ahead|patch-lr-and-ahead]],
      [[patch-right-and-ahead|patch-lr-and-ahead]],
      [[patch-at-heading-and-distance|patch-at-heading-and-distance]].

    examples:
      - patch-at *dx* *dy*
    isFromExtension: false
    isConstant: false
