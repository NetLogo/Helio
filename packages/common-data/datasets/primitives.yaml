  - id: import-drawing-import-drawing
    key: import-drawing
    name: import-drawing
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#import-drawing
    description: >+
      Reads an image file into the drawing, scaling it to the size of the
       world, while retaining the original aspect ratio of the image. The
       image is centered in the drawing. The old drawing is not cleared
       first.

      Agents cannot sense the drawing, so they cannot interact with or
       process images imported by import-drawing. If you need agents to
       sense an image, use [[import-pcolors|import-pcolors]] or [[import-pcolors-rgb|import-pcolors-rgb]].

      The following image file formats are supported: BMP, JPG, GIF, and
       PNG. If the image format supports transparency (alpha), that
       information will be imported as well.

      Note: This primitive is not compatible with NetLogo Web. If you
       wish to import a drawing with the same code and the
       same behavior in both NetLogo and NetLogo Web, see [import-a\:drawing](https://github.com/NetLogo/ImportA-Extension#readme).

    examples:
      - import-drawing *filename*
    isFromExtension: false
    isConstant: false
    metadata:
      id: import-drawing
      entry_categories:
        - title: Input/Output
          id: iogroup
        - title: World
          id: worldgroup
      data:
        syntax:
          - name: import-drawing
            since: "3.0"
