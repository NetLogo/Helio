  - id: word-word
    key: word
    name: word
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#word
    description: |+
      Concatenates the inputs together and reports the result as a
       string.

      ```
      show word "tur" "tle"
      => "turtle"
      word "a" 6
      => "a6"
      set directory "c:\foo\fish\"
      show word directory "bar.txt"
      => "c:foofishbar.txt"
      show word [1 54 8] "fishy"
      => "[1 54 8]fishy"
      show (word 3)
      => "3"
      show (word "a" "b" "c" 1 23)
      => "abc123"
      ```

    examples:
      - word *value1* *value2*
      - (word *value1* ...)
    isFromExtension: false
    isConstant: false
    metadata:
      id: word
      entry_categories:
        - title: String
          id: stringgroup
      data:
        syntax:
          - name: word
            since: "1.0"
        description: |+
          Concatenates the inputs together and reports the result as a
           string.

          ```
          show word "tur" "tle"
          => "turtle"
          word "a" 6
          => "a6"
          set directory "c:\foo\fish\"
          show word directory "bar.txt"
          => "c:foofishbar.txt"
          show word [1 54 8] "fishy"
          => "[1 54 8]fishy"
          show (word 3)
          => "3"
          show (word "a" "b" "c" 1 23)
          => "abc123"
          ```

        examples:
          - code: word *value1* *value2*
          - code: (word *value1* ...)
