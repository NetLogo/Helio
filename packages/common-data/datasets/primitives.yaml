  - id: zoom-zoom
    key: zoom
    name: zoom
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#zoom
    description: >+
      Move the observer toward the point it is facing, *number* steps. The
      observer will never move beyond
       the point it is facing so if *number* is greater than the distance to that point it will only move as
       far as the point it is facing.

    examples:
      - zoom *number*
    isFromExtension: false
    isConstant: false
    metadata:
