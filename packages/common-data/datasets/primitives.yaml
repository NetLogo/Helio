  - id: standard-deviation-standard-deviation
    key: standard-deviation
    name: standard-deviation
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#standard-deviation
    description: |+
      Reports the sample standard deviation of a *list* of numbers.
       Ignores other types of items.

      (Note that this estimates the standard deviation for a *sample*, rather than for a whole *population*, using
       Bessel's correction.)

      ```
      show standard-deviation [1 2 3 4 5 6]
      => 1.8708286933869707
      show standard-deviation [energy] of turtles
      ;; prints the standard deviation of the variable "energy"
      ;; from all the turtles
      ```

      See [this FAQ question](/faq#why-is-the-number-value-in-my-monitor-widget-changing-even-though-nothing-is-happening-in-my-model) for information on possible issues using *standard-deviation* with *agentsets*

    examples:
      - standard-deviation *list*
    isFromExtension: false
    isConstant: false
    metadata:
      id: standard-deviation
      entry_categories:
        - title: Mathematical
          id: mathematicalgroup
      data:
        syntax:
