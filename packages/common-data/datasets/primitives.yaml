  - id: csv-to-file
    key: csv:to-file
    name: csv:to-file
    alternateNames:
      - to-file
    source: csv
    isFromExtension: true
    url: https://docs.netlogo.org/csv/to-file.html
    metadata:
      name: to-file
      extensionName: csv
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: csv-file
            - type:
                kind: NetLogoList
              kind: UnnamedType
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: csv-file
            - type:
                kind: NetLogoList
              kind: UnnamedType
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: delimiter
        isInfix: false
      tags:
        - writing
      fullName: csv:to-file
      description: |
        
        Writes the given list of lists to a new CSV file. For example:

        ```NetLogo
        observer> csv:to-file "myfile.csv" [[1 "two" 3] [4 5]]
        ```

        will result in a file `myfile.csv` containing:

            1,two,3
            4,5
  - id: gis-set-transformation
    key: gis:set-transformation
    name: gis:set-transformation
    alternateNames:
      - set-transformation
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/set-transformation.html
    metadata:
      name: set-transformation
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: gis-envelope
            - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: netlogo-envelope
        isInfix: false
      tags:
        - coord
      fullName: gis:set-transformation
      description: >
        
        Defines a mapping between GIS coordinates and NetLogo coordinates.

        The *gis-envelope* and *netlogo-envelope* parameters must

        each be four-element lists consisting of:


        ```

        [minimum-x maximum-x minimum-y maximum-y]

        ```


        The scale of the transformation will be equal to the minimum of the

        scale necessary to make the mapping between the ranges of x values

        and the scale necessary to make the mapping between the ranges of y

        values. The GIS space will be centered in NetLogo space.


        For example, the following two lists would map all of geographic

        (latitude and longitude) space in degrees to NetLogo world space,

        regardless of the current dimensions of the NetLogo world:


        ```

        (list -180 180 -90 90)

        (list min-pxcor max-pxcor min-pycor max-pycor)

        ```


        However, if you're setting the envelope of the NetLogo world,

        you should probably be using
        [[set-world-envelope|/gis/set-world-envelope]].
  - id: gis-set-transformation-ds
    key: gis:set-transformation-ds
    name: gis:set-transformation-ds
    alternateNames:
      - set-transformation-ds
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/set-transformation-ds.html
    metadata:
      name: set-transformation-ds
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: gis-envelope
            - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: netlogo-envelope
        isInfix: false
      tags:
        - coord
      fullName: gis:set-transformation-ds
      description: >
        
        Does the same thing as <a
        href="/gis/set-transformation">gis:set-transformation</a> above, except
        that

        it allows the scale for mapping the range of x values to be

        different than the scale for y values. The "-ds" on the

        end stands for "different scales". Using different scales

        will cause distortion of the shape of GIS features, and so it is

        generally not recommended, but it may be useful for some models.


        Here is an example of the difference between
        [[gis:set-transformation|/gis/set-transformation]] and
        [[gis:set-transformation-ds|/gis/set-transformation-ds]]:


        <table width="80%" border="1" rules="cols" style="border-collaps:
        separate; border-spacing: 4px; text-align: center; margin: 0 auto;">

        <tr>
          <td style="padding: 8px">
            <img alt="" src="images/set-transformation.png" width="200">
          <td style="padding: 8px">
            <img alt="" src="images/set-transformation-ds.png" width="200">
          <tr>
          <td style="padding: 8px">
            Using <a href="/gis/set-transformation">set-transformation</a>,
            the scale along the x and y axis is the same, preserving the
            round shape of the Earth in this Orthographic projection.
          <td style="padding: 8px">
            Using <a href="/gis/set-transformation-ds">set-transformation-ds</a>, the
            scale along the x axis is stretched so that the earth covers
            the entire NetLogo View, which in this case distorts the shape
            of the Earth.
        </table>
  - id: gis-set-world-envelope
    key: gis:set-world-envelope
    name: gis:set-world-envelope
    alternateNames:
      - set-world-envelope
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/set-world-envelope.html
    metadata:
      name: set-world-envelope
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: gis-envelope
        isInfix: false
      tags:
        - coord
      fullName: gis:set-world-envelope
      description: >
        
        A shorthand for setting the transformation by mapping the envelope

        of the NetLogo world to the given envelope in GIS space, while

        keeping the scales along the x and y axis the same. It is

        equivalent to:


        ```

        set-transformation gis-envelope (list min-pxcor max-pxcor min-pycor
        max-pycor)

        ```


        This primitive is supplied because most of the time you'll want

        to set the envelope of the entire NetLogo world, rather than just a

        part of it.
  - id: gis-set-world-envelope-ds
    key: gis:set-world-envelope-ds
    name: gis:set-world-envelope-ds
    alternateNames:
      - set-world-envelope-ds
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/set-world-envelope-ds.html
    metadata:
      name: set-world-envelope-ds
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: gis-envelope
        isInfix: false
      tags:
        - coord
      fullName: gis:set-world-envelope-ds
      description: >
        
        A shorthand for setting the transformation by mapping the envelope

        of the NetLogo world to the given envelope in GIS space, using

        different scales along the x and y axis if necessary. It is

        equivalent to:


        ```

        set-transformation-ds gis-envelope (list min-pxcor max-pxcor min-pycor
        max-pycor)

        ```


        See the [pictures](#transformation-example) above for

        the difference between using equal scales for x and y coordinates

        and using different scales.
  - id: gis-world-envelope
    key: gis:world-envelope
