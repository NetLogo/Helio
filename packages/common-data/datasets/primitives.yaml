  - id: pen-switch-status-pen-down
    key: pen-switch-status
    name: pen-down
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#pen-switch-status
    description: |+
      The turtle changes modes between drawing lines, removing lines or
       neither. The lines will always be displayed on top of the patches
