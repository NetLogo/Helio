  - id: clear-plot-clear-plot
    key: clear-plot
    name: clear-plot
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#clear-plot
    description: >+
      In the current plot only, resets all plot pens, deletes all
       temporary plot pens, resets the plot to its default values (for x
       range, y range, etc.), and resets all permanent plot pens to their
       default values. The default values for the plot and for the
       permanent plot pens are set in the plot Edit dialog, which is
       displayed when you edit the plot. If there are no plot pens after
       deleting all temporary pens, that is to say if there are no
       permanent plot pens, a default plot pen will be created with the
       following initial settings:

      * Pen: down

      * Color: black

      * Mode: 0 (line mode)

      * Name: "default"

      * Interval: 1


      See also [[clear-all-plots|clear-all-plots]].


      This command will produce a runtime error if the current plot has not been
      set.

    examples:
      - clear-plot
    isFromExtension: false
    isConstant: false
    metadata:
      id: clear-plot
      entry_categories:
        - title: Plotting
          id: plottinggroup
      data:
        syntax:
          - name: clear-plot
        description: >+
          In the current plot only, resets all plot pens, deletes all
           temporary plot pens, resets the plot to its default values (for x
           range, y range, etc.), and resets all permanent plot pens to their
           default values. The default values for the plot and for the
           permanent plot pens are set in the plot Edit dialog, which is
           displayed when you edit the plot. If there are no plot pens after
           deleting all temporary pens, that is to say if there are no
           permanent plot pens, a default plot pen will be created with the
           following initial settings:

          * Pen: down

          * Color: black

          * Mode: 0 (line mode)

          * Name: "default"

          * Interval: 1


          See also [[clear-all-plots|clear-all-plots]].


          This command will produce a runtime error if the current plot has not
          been set.

        examples:
          - code: clear-plot
  - id: clear-ticks-clear-ticks
