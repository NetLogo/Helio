  - id: hatch-hatch
    key: hatch
    name: hatch
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#hatch
    description: >+
      This turtle creates *number* new turtles. Each new turtle
       inherits of all its variables, including its location, from its
       parent. (Exceptions: each new turtle will have a new `who`number, and it may be of a different breed than its parent if the `hatch-<breeds>` form is used.)

      The new turtles then run *commands*. You can use the commands
       to give the new turtles different colors, headings, locations, or
       whatever. (The new turtles are created all at once, then run one at
       a time, in random order.)

      If the hatch-&lt;breeds&gt; form is used, the new turtles
       are created as members of the given breed. Otherwise, the new
       turtles are the same breed as their parent.

      ```

      hatch 1 [ lt 45 fd 1 ]

      ;; this turtle creates one new turtle,

      ;; and the child turns and moves away

      hatch-sheep 1 [ set color black ]

      ;; this turtle creates a new turtle

      ;; of the sheep breed

      ```


      See also [[create-turtles|create-turtles]], [[sprout|sprout]].

    examples:
      - hatch *number* [ *commands* ]
      - hatch-<breeds> *number* [ *commands* ]
    isFromExtension: false
    isConstant: false
    metadata:
      id: hatch
      entry_categories:
        - title: Turtle-related
          id: turtlegroup
      data:
        syntax:
          - name: hatch
            since: "1.0"
        description: >+
          This turtle creates *number* new turtles. Each new turtle
           inherits of all its variables, including its location, from its
           parent. (Exceptions: each new turtle will have a new `who`number, and it may be of a different breed than its parent if the `hatch-<breeds>` form is used.)

          The new turtles then run *commands*. You can use the commands
           to give the new turtles different colors, headings, locations, or
           whatever. (The new turtles are created all at once, then run one at
           a time, in random order.)

          If the hatch-&lt;breeds&gt; form is used, the new turtles
           are created as members of the given breed. Otherwise, the new
           turtles are the same breed as their parent.

          ```

          hatch 1 [ lt 45 fd 1 ]

          ;; this turtle creates one new turtle,

          ;; and the child turns and moves away

          hatch-sheep 1 [ set color black ]

          ;; this turtle creates a new turtle

          ;; of the sheep breed

          ```


          See also [[create-turtles|create-turtles]], [[sprout|sprout]].

        examples:
          - code: hatch *number* [ *commands* ]
          - code: hatch-<breeds> *number* [ *commands* ]
      icons:
        - alt: Turtle Command
          url: images/turtle.png
  - id: heading-heading
    key: heading
    name: heading
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#heading
    description: |+
      This is a built-in turtle variable. It indicates the direction the
       turtle is facing. This is a number greater than or equal to 0 and
       less than 360. 0 is north, 90 is east, and so on. You can set this
       variable to make a turtle turn.

      See also [[right|right]], [[left|left]], [[dx|dxy]], [[dy|dxy]].

      Example:

      ```
      set heading 45      ;; turtle is now facing northeast
      set heading heading + 10 ;; same effect as "rt 10"
      ```

    examples:
      - heading
    isFromExtension: false
    isConstant: false
    metadata:
      id: heading
      entry_categories:
        - title: Built-in Variables
          id: variables
          subcategory:
            title: Turtle Variable
            id: turtle-variables
      data:
        syntax:
          - name: heading
        description: |+
          This is a built-in turtle variable. It indicates the direction the
           turtle is facing. This is a number greater than or equal to 0 and
           less than 360. 0 is north, 90 is east, and so on. You can set this
           variable to make a turtle turn.

          See also [[right|right]], [[left|left]], [[dx|dxy]], [[dy|dxy]].

          Example:

          ```
