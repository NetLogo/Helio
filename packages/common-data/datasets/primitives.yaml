      syntax:
        args:
          - - type:
                kind: NetLogoNumber
              kind: UnnamedType
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: path
          - - type:
                kind: NetLogoNumber
              kind: UnnamedType
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: path
            - type:
                kind: CommandType
              kind: UnnamedType
        isInfix: false
      tags:
        - opening-closing
      fullName: ls:create-interactive-models
      description: >
        
        Like `ls:create-models`, creates the specified number of instances of
        the given model. Unlike `ls:create-models`,
        `ls:create-interactive-models` creates models that are visible by
        default, and have all widgets. You should use this primitive if you plan
        on having only a handful of instances of the given model, and would like
        to be able to interact with the instances through their interfaces
        during runtime.


        Child model RNGs are seeded from the parent models RNG when they are
        created.

        Thus, if you seed the parent's model RNG before child model before child
        models are created, the simulation as a whole will be reproducible.

        Use the `ls:random-seed` primitive to seed the model system's RNGs after
        child models have been created.
  - id: ls-close
    key: ls:close
