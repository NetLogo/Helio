  - id: includes-__includes
    key: includes
    name: __includes
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#includes
    description: >+
      Causes external NetLogo source files (with the `.nls`suffix) to be
      included in this model. Included files may contain
       breed, variable, and procedure definitions. `__includes` can
       only be used once per file.

      The file names must be strings, for example:


      ```

      __includes [ "utils.nls" ]

      ```


      Or, for multiple files:


      ```

      __includes [ "utils1.nls" "utils2.nls" ]

      ```

    examples:
      - __includes [ *filename* ... ]
    isFromExtension: false
    isConstant: false
    metadata:
      id: includes
      entry_categories:
        - title: Keyword
          id: keywords
      data:
        syntax:
          - name: __includes
            since: "4.0"
        description: >+
          Causes external NetLogo source files (with the `.nls`suffix) to be
          included in this model. Included files may contain
           breed, variable, and procedure definitions. `__includes` can
           only be used once per file.

          The file names must be strings, for example:


          ```

          __includes [ "utils.nls" ]

          ```


          Or, for multiple files:


          ```

          __includes [ "utils1.nls" "utils2.nls" ]

          ```

        examples:
          - code: __includes [ *filename* ... ]
  - id: in-radius-in-radius
    key: in-radius
    name: in-radius
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#in-radius
    description: |+
      Reports an agentset that includes only those agents from the
       original agentset whose distance from the caller is less than or
       equal to *number*. (This can include the agent itself.)

      The distance to or a from a patch is measured from the center of
       the patch.

      ```
      ask turtles
        [ ask patches in-radius 3
            [ set pcolor red ] ]
      ;; each turtle makes a red "splotch" around itself
      ```

    examples:
      - "*agentset* in-radius *number*"
    isFromExtension: false
    isConstant: false
    metadata:
      id: in-radius
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: in-radius
            since: "1.0"
        description: |+
