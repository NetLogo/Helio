  - id: random-float-random-float
    key: random-float
    name: random-float
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#random-float
    description: |+
      If *number* is positive, reports a random floating point
       number greater than or equal to 0 but strictly less than *number*.

      If *number* is negative, reports a random floating point
       number less than or equal to 0, but strictly greater than *number*.

      If *number* is zero, the result is always 0.

      ```
      show random-float 3
