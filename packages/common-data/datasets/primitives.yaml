  - id: patches-own-patches-own
    key: patches-own
    name: patches-own
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#patches-own
    description: >+
      This keyword, like the globals, breed, &lt;breed&gt;-own,
       and turtles-own keywords, can only be used at the beginning of a
       program, before any function definitions. It defines the variables
       that all patches can use.

      All patches will then have the given variables and be able to use
       them.

      All patch variables can also be directly accessed by any turtle
       standing on the patch.

      See also [[globals|globals]], [[turtles-own|turtles-own]],
      [[breed|breed]], [[<breeds>-own|turtles-own]].

    examples:
      - patches-own [*var1* ...]
    isFromExtension: false
    isConstant: false
    metadata:
      id: patches-own
      entry_categories:
        - title: Patch-related
          id: patchgroup
        - title: Keyword
          id: keywords
      data:
        syntax:
          - name: patches-own
        description: >+
          This keyword, like the globals, breed, &lt;breed&gt;-own,
           and turtles-own keywords, can only be used at the beginning of a
           program, before any function definitions. It defines the variables
           that all patches can use.

          All patches will then have the given variables and be able to use
           them.

          All patch variables can also be directly accessed by any turtle
           standing on the patch.

          See also [[globals|globals]], [[turtles-own|turtles-own]],
          [[breed|breed]], [[<breeds>-own|turtles-own]].

        examples:
          - code: patches-own [*var1* ...]
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
  - id: pcolor-pcolor
    key: pcolor
    name: pcolor
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#pcolor
    description: |+
      This is a built-in patch variable. It holds the color of the patch.
       You can set this variable to make the patch change color.

      All patch variables can be directly accessed by any turtle standing
       on the patch. Color can be represented either as a NetLogo color (a
       single number) or an RGB color (a list of 3 numbers). See details
       in the [Colors section](/programming#colors) of the
       Programming Guide. If you give an RGBA color with 4 numbers the
       transparency value will be ignored (except in NetLogo 3D).

      See also [[color|color]].

    examples:
      - pcolor
    isFromExtension: false
    isConstant: false
    metadata:
      id: pcolor
      entry_categories:
        - title: Color
          id: colorgroup
        - title: Built-in Variables
          id: variables
          subcategory:
            title: Patch Variable
            id: patch-variables
      data:
        syntax:
          - name: pcolor
        description: |+
          This is a built-in patch variable. It holds the color of the patch.
           You can set this variable to make the patch change color.

