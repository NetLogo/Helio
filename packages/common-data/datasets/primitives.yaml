  - id: tick-advance-tick-advance
    key: tick-advance
    name: tick-advance
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#tick-advance
    description: >+
      Advances the tick counter by *number*. The input may be an
       integer or a floating point number. (Some models divide ticks more
       finely than by ones.) The input may not be negative.

      When using [tick-based view
       updates](/programming#view-updates), the view is normally updated every 1.0 ticks, so using `tick-advance` with a number less then 1.0 may not always
       trigger an update. If you want to make sure that the view is
       updated, you can use the `display` command.

      If the tick counter has not been started yet with `reset-ticks`, an error
      results.


      Does not update plots.


      See also [[tick|tick]], [[ticks|ticks]], [[reset-ticks|reset-ticks]],
      [[clear-ticks|clear-ticks]].

    examples:
      - tick-advance *number*
    isFromExtension: false
    isConstant: false
    metadata:
      id: tick-advance
      entry_categories:
        - title: World
          id: worldgroup
