  - id: breedvar-breed
    key: breedvar
    name: breed
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#breedvar
    description: >+
      This is a built-in turtle and link variable. It holds the agentset
       of all turtles or links of the same breed as this turtle or link.
       (For turtles or links that do not have any particular breed, this
       is the [[turtles|turtles]] agentset of all turtles or
       the [[links|links]] agentset of all links respectively.)

      You can set this variable to change a turtle or link's breed.
       (When a turtle changes breeds, its shape is reset to the default
       shape for that breed. See [[set-default-shape|set-default-shape]].)

      See also [[breed|breed]], [[directed-link-breed|directed-link-breed]],
      [[undirected-link-breed|undirected-link-breed]]


      Example:


      ```

      breed [cats cat]

      breed [dogs dog]

      ;; turtle code:

      if breed = cats [ show "meow!" ]

      set breed dogs

      show "woof!"

      ```



      ```

      directed-link-breed [ roads road ]

      ;; link code

      if breed = roads [ set color gray ]

      ```

    examples:
      - breed
    isFromExtension: false
    isConstant: false
    metadata:
