  - id: all-all?
    key: all
    name: all?
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#all
    description: |+
      Reports true if all of the agents in the agentset report true for
       the given reporter. Otherwise reports false as soon as a
       counterexample is found.

      If the agentset is empty, reports true.

      The reporter must report a boolean value for every agent (either
       true or false), otherwise an error occurs.

      ```
      if all? turtles [color = red]
        [ show "every turtle is red!" ]
      ```

      See also [[any?|any]].

    examples:
      - all? *agentset* [*reporter*]
    isFromExtension: false
    isConstant: false
    metadata:
      id: all
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: all?
            since: "4.0"
        description: |+
          Reports true if all of the agents in the agentset report true for
           the given reporter. Otherwise reports false as soon as a
           counterexample is found.

          If the agentset is empty, reports true.

          The reporter must report a boolean value for every agent (either
           true or false), otherwise an error occurs.

          ```
          if all? turtles [color = red]
            [ show "every turtle is red!" ]
          ```

          See also [[any?|any]].

        examples:
          - code: all? *agentset* [*reporter*]
  - id: and-and
    key: and
    name: and
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#and
    description: >+
      Reports true if both *boolean1* and *boolean2* are
       true. Otherwise reports false.

      Note that if *boolean1* is false, then *boolean2* will not be run (since
      it can't affect the
       result). See [the programming guide for more information on
       logical operator precedence](/programming#commands-and-reporters).

      ```

      if (pxcor > 0) and (pycor > 0)
        [ set pcolor blue ]  ;; the upper-right quadrant of
                             ;; patches turn blue
      ```

    examples:
      - "*boolean1* and *boolean2*"
    isFromExtension: false
    isConstant: false
    metadata:
      id: and
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
      data:
        syntax:
          - name: and
            since: "1.0"
        description: >+
          Reports true if both *boolean1* and *boolean2* are
           true. Otherwise reports false.

          Note that if *boolean1* is false, then *boolean2* will not be run
          (since it can't affect the
           result). See [the programming guide for more information on
           logical operator precedence](/programming#commands-and-reporters).

          ```

          if (pxcor > 0) and (pycor > 0)
            [ set pcolor blue ]  ;; the upper-right quadrant of
                                 ;; patches turn blue
          ```

        examples:
          - code: "*boolean1* and *boolean2*"
  - id: any-any?
    key: any
    name: any?
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#any
    description: |+
      Reports true if the given agentset is non-empty, false otherwise.

      Equivalent to "count *agentset* &gt; 0", but more
       efficient (and arguably more readable).

      ```
      if any? turtles with [color = red]
        [ show "at least one turtle is red!" ]
      ```

      Note: nobody is not an agentset. You only get nobody back in
       situations where you were expecting a single agent, not a whole
       agentset. If any? gets nobody as input, an error results.

      See also [[all?|all]], [[nobody|nobody]].

    examples:
      - any? *agentset*
    isFromExtension: false
    isConstant: false
    metadata:
      id: any
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: any?
            since: "2.0"
        description: |+
          Reports true if the given agentset is non-empty, false otherwise.

          Equivalent to "count *agentset* &gt; 0", but more
           efficient (and arguably more readable).

          ```
