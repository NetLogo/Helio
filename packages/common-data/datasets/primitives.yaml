  - id: to-report-to-report
    key: to-report
    name: to-report
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#to-report
    description: |+
      Used to begin a reporter procedure.

      The body of the procedure should use `report` to report a
       value for the procedure. See [[report|report]].

      ```
      to-report average [a b]
        report (a + b) / 2
      end

      to-report absolute-value [number]
        ifelse number >= 0
          [ report number ]
          [ report (- number) ]
      end

      to-report first-turtle?
        report who = 0  ;; reports true or false
      end
      ```

    examples:
      - to-report *procedure-name*
      - to-report *procedure-name* [*input1* ...]
    isFromExtension: false
    isConstant: false
    metadata:
      id: to-report
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
        - title: Keyword
          id: keywords
      data:
        syntax:
          - name: to-report
        description: |+
          Used to begin a reporter procedure.

          The body of the procedure should use `report` to report a
           value for the procedure. See [[report|report]].

          ```
          to-report average [a b]
            report (a + b) / 2
          end

          to-report absolute-value [number]
            ifelse number >= 0
              [ report number ]
              [ report (- number) ]
          end

          to-report first-turtle?
            report who = 0  ;; reports true or false
          end
          ```

        examples:
          - code: to-report *procedure-name*
          - code: to-report *procedure-name* [*input1* ...]
  - id: towards-towards
    key: towards
    name: towards
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#towards
    description: |+
      Reports the heading from this agent to the given agent.

      If wrapping is allowed by the topology and the wrapped distance
       (around the edges of the world) is shorter, towards will use the
       wrapped path.

      Note: asking for the heading from an agent to itself, or an agent
       on the same location, will cause a runtime error.

      ```
      set heading towards turtle 1
      ;; same as "face turtle 1"
      ```

      See also [[face|face]].

    examples:
      - towards *agent*
    isFromExtension: false
    isConstant: false
    metadata:
      id: towards
      entry_categories:
        - title: Turtle-related
          id: turtlegroup
