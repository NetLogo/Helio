  - id: set-plot-pen-mode-set-plot-pen-mode
    key: set-plot-pen-mode
    name: set-plot-pen-mode
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#set-plot-pen-mode
    description: >+
      Sets the mode the current plot pen draws in to *number*. The
       allowed plot pen modes are:

      * 0 (line mode) the plot pen draws a line connecting two points
       together.
      * 1 (bar mode): the plot pen draws a bar of width
       plot-pen-interval with the point plotted as the upper (or lower, if
       you are plotting a negative number) left corner of the bar.
      * 2 (point mode): the plot pen draws a point at the point
       plotted. Points are not connected.

      The default mode for new pens is 0 (line mode).


      This command will produce a runtime error if either the current plot or
      the current
       pen has not been set.

    examples:
      - set-plot-pen-mode *number*
    isFromExtension: false
    isConstant: false
    metadata:
      id: set-plot-pen-mode
      entry_categories:
        - title: Plotting
          id: plottinggroup
      data:
        syntax:
          - name: set-plot-pen-mode
            since: "1.0"
        description: >+
          Sets the mode the current plot pen draws in to *number*. The
           allowed plot pen modes are:

          * 0 (line mode) the plot pen draws a line connecting two points
           together.
          * 1 (bar mode): the plot pen draws a bar of width
           plot-pen-interval with the point plotted as the upper (or lower, if
           you are plotting a negative number) left corner of the bar.
          * 2 (point mode): the plot pen draws a point at the point
           plotted. Points are not connected.

          The default mode for new pens is 0 (line mode).


          This command will produce a runtime error if either the current plot
          or the current
           pen has not been set.

        examples:
          - code: set-plot-pen-mode *number*
