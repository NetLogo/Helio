  - id: arrow-->
    key: arrow
    name: ->
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#arrow
    description: >+
      Creates and reports an anonymous procedure - a command or reporter
       - depending on the input. Within *commands* or *reporter* the listed *args* may be used just as you would use `let` or procedure variables.
       The variable names in *args* have the same restrictions
       as variable names of commands and reporters. In addition, they must not match the name of
       any let or procedure variable in their procedure.

      Anonymous procedures are commonly used with the primitives
      [[foreach|foreach]], [[map|map]], [[reduce|reduce]], [[filter|filter]],
      [[sort-by|sort-by]], and [[n-values|n-values]]. See
       those entries for example usage.

      See the [Anonymous Procedures section](/programming#anonymous-procedures)
      of the
       Programming Guide for details.

    examples:
      - "[ [*args*] -> *commands* ]"
      - "[ [*args*] -> *reporter* ]"
    isFromExtension: false
    isConstant: false
    metadata:
      id: arrow
      entry_categories:
        - title: Anonymous Procedures
          id: anonproceduresgroup
