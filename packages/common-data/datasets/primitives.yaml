        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: r-variable-name
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: column-name
            - type:
                kind: CustomType
                name: list or anything
              kind: UnnamedType
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: variable-name
