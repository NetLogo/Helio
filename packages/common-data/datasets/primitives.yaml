        examples:
          - code: any? *agentset*
  - id: approximate-hsb-approximate-hsb
    key: approximate-hsb
    name: approximate-hsb
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#approximate-hsb
    description: >+
      Reports a number in the range 0 to 140, not including 140 itself,
       that represents the given color, specified in the HSB spectrum, in
       NetLogo's color space.

      The first value (hue) should be in the range of 0 to 360, the second
       and third (saturation and brightness) in the range between 0 and 100.

      The color reported may be only an approximation, since the NetLogo
       color space does not include all possible colors.

      ```

      show approximate-hsb 0 0 0

      => 0  ;; (black)

      show approximate-hsb 180 57.143 76.863

      => 85 ;; (cyan)

      ```


      See also [[extract-hsb|extract-hsb]], [[approximate-rgb|approximate-rgb]],
      [[extract-rgb|extract-rgb]].

    examples:
      - approximate-hsb *hue saturation brightness*
    isFromExtension: false
    isConstant: false
    metadata:
      id: approximate-hsb
      entry_categories:
        - title: Color
          id: colorgroup
      data:
        syntax:
          - name: approximate-hsb
            since: "4.0"
        description: >+
          Reports a number in the range 0 to 140, not including 140 itself,
           that represents the given color, specified in the HSB spectrum, in
           NetLogo's color space.

          The first value (hue) should be in the range of 0 to 360, the second
           and third (saturation and brightness) in the range between 0 and 100.

          The color reported may be only an approximation, since the NetLogo
           color space does not include all possible colors.

          ```

          show approximate-hsb 0 0 0

          => 0  ;; (black)

          show approximate-hsb 180 57.143 76.863

          => 85 ;; (cyan)

          ```


          See also [[extract-hsb|extract-hsb]],
          [[approximate-rgb|approximate-rgb]], [[extract-rgb|extract-rgb]].

        examples:
          - code: approximate-hsb *hue saturation brightness*
  - id: approximate-rgb-approximate-rgb
    key: approximate-rgb
    name: approximate-rgb
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#approximate-rgb
    description: >+
      Reports a number in the range 0 to 140, not including 140 itself,
       that represents the given color, specified in the RGB spectrum, in
       NetLogo's color space.

      All three inputs should be in the range 0 to 255.


      The color reported may be only an approximation, since the NetLogo
       color space does not include all possible colors.

      ```

      show approximate-rgb 0 0 0

      => 0  ;; black

      show approximate-rgb 0 255 255

      => 85.2 ;; cyan

      ```


      See also [[extract-rgb|extract-rgb]], [[approximate-hsb|approximate-hsb]],
      and [[extract-hsb|extract-hsb]].

    examples:
      - approximate-rgb *red green blue*
    isFromExtension: false
    isConstant: false
    metadata:
      id: approximate-rgb
      entry_categories:
        - title: Color
          id: colorgroup
      data:
        syntax:
          - name: approximate-rgb
            since: "4.0"
        description: >+
