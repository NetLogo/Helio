  - id: to-report-to-report
    key: to-report
    name: to-report
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#to-report
    description: |+
      Used to begin a reporter procedure.

      The body of the procedure should use `report` to report a
       value for the procedure. See [[report|report]].

      ```
      to-report average [a b]
        report (a + b) / 2
      end

      to-report absolute-value [number]
        ifelse number >= 0
          [ report number ]
          [ report (- number) ]
      end

      to-report first-turtle?
        report who = 0  ;; reports true or false
      end
      ```

    examples:
      - to-report *procedure-name*
      - to-report *procedure-name* [*input1* ...]
    isFromExtension: false
    isConstant: false
    metadata:
      id: to-report
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
        - title: Keyword
          id: keywords
      data:
        syntax:
          - name: to-report
        description: |+
          Used to begin a reporter procedure.

          The body of the procedure should use `report` to report a
           value for the procedure. See [[report|report]].

          ```
          to-report average [a b]
            report (a + b) / 2
          end

          to-report absolute-value [number]
            ifelse number >= 0
              [ report number ]
              [ report (- number) ]
          end

          to-report first-turtle?
            report who = 0  ;; reports true or false
          end
          ```

