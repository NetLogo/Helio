  - id: plot-plot
    key: plot
    name: plot
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#plot
    description: >+
      Increments the x-value of the plot pen by plot-pen-interval, then
       plots a point at the updated x-value and a y-value of *number*. (The first time the command is used on a plot, the
       point plotted has an x-value of 0.)

      This command will produce a runtime error if the current plot has not been
      set.

    examples:
      - plot *number*
    isFromExtension: false
    isConstant: false
    metadata:
      id: plot
      entry_categories:
