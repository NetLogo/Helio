  - id: file-read-file-read
    key: file-read
    name: file-read
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#file-read
    description: >+
      This reporter will read in the next constant from the opened file
       and interpret it as if it had been typed in the Command Center. It
       reports the resulting value. The result may be a number, list,
       string, boolean, or the special value nobody.

      Whitespace separates the constants. Each call to file-read will
       skip past both leading and trailing whitespace.

      Note that strings need to have quotes around them. Use the command
      [[file-write|file-write]] to have quotes included.


      Also note that the [[file-open|file-open]] command must
       be called before this reporter can be used, and there must be data
       remaining in the file. Use the reporter [[file-at-end?|file-at-end]] to determine if you are at the end
       of the file.

      ```

      file-open "my-file.data"

      print file-read + 5

      ;; Next value is the number 1

      => 6

      print length file-read

      ;; Next value is the list [1 2 3 4]

      => 4

      ```


      Note: This primitive is not compatible with NetLogo Web. If you
       wish to read the contents of a file with the same code and the
       same behavior in both NetLogo and NetLogo Web, see [fetch:user-file-async](https://github.com/NetLogo/Fetch-Extension#readme).

      See also [[file-open|file-open]] and [[file-write|file-write]].

    examples:
      - file-read
    isFromExtension: false
    isConstant: false
    metadata:
      id: file-read
      entry_categories:
        - title: File
          id: fileiogroup
      data:
        syntax:
