  - id: write-write
    key: write
    name: write
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#write
    description: >+
      This command will output *value*, which can be a number,
       string, list, boolean, or nobody to the Command Center, *not*followed by a carriage return (unlike [[print|print]]and [[show|show]]).

      This agent is *not* printed before the value, unlike [[show|show]]. Its
      output also includes quotes around strings
       and is prepended with a space.

      ```

      write "hello world"

      =>  "hello world"

      ```


      See also [[print|print]], [[show|show]], [[type|type]],
      [[output-write|output-cmds]],
       and [Output (/programming guide)](/programming#output).

