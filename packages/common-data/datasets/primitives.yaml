          ```
          ask link 0 1 [ set color green ]
          ;; unbreeded link connecting turtle 0 and turtle 1 will turn green
          ask directed-link 0 1 [ set color red ]
          ;; directed link connecting turtle 0 and turtle 1 will turn red
          ```

