  - id: random-seed-random-seed
    key: random-seed
    name: random-seed
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#random-seed
    description: >+
      Sets the seed of the pseudo-random number generator to the integer
       part of *number*. The seed must be in the range -2147483648 to
       2147483647; note that this is smaller than the full range of
       integers supported by NetLogo (-9007199254740992 to
       9007199254740992).

      See the [Random Numbers](/programming#random-numbers)section of the
      Programming Guide for more details.


      ```

      random-seed 47822

      show random 100

      => 50

      show random 100

      => 35

      random-seed 47822

      show random 100

      => 50

      show random 100

      => 35

      ```


      See also the [[new-seed|new-seed]] reporter that generates
       proper random seed values.

    examples:
      - random-seed *number*
    isFromExtension: false
    isConstant: false
    metadata:
      id: random-seed
      entry_categories:
        - title: Mathematical
          id: mathematicalgroup
      data:
