  - id: set-plot-background-color-set-plot-background-color
    key: set-plot-background-color
    name: set-plot-background-color
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#set-plot-background-color
    description: >+
      Sets the background color of the current plot.
       The color may be specified as a number or a list.
       See the [Colors](/programming#colors) section of the programming guide for more details.
       This change is temporary and is not saved with the model. When the
       plot is cleared, the background color will revert to white.

      **Note:** Plot backgrounds do not support transparency.
       If a list is used to set the color, the alpha component will be ignored.

      This command will produce a runtime error if the current plot has not been
      set.

    examples:
      - set-plot-background-color *color*
    isFromExtension: false
    isConstant: false
    metadata:
      id: set-plot-background-color
      entry_categories:
        - title: Plotting
          id: plottinggroup
      data:
        syntax:
          - name: set-plot-background-color
            since: 6.0.2
        description: >+
          Sets the background color of the current plot.
           The color may be specified as a number or a list.
           See the [Colors](/programming#colors) section of the programming guide for more details.
           This change is temporary and is not saved with the model. When the
           plot is cleared, the background color will revert to white.

          **Note:** Plot backgrounds do not support transparency.
           If a list is used to set the color, the alpha component will be ignored.

          This command will produce a runtime error if the current plot has not
          been set.

