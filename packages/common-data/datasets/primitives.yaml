  - id: mod-mod
    key: mod
    name: mod
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#mod
    description: |+
      Reports *number1* modulo *number2*: that is, the
       residue of *number1* (mod *number2*). mod is is
       equivalent to the following NetLogo code:

      ```
                number1 - (floor (number1 / number2)) * number2
      ```

      Note that mod is "infix", that is, it comes between its
       two inputs.

      ```
      show 62 mod 5
      => 2
      show -8 mod 3
      => 1
      ```

      See also [[remainder|remainder]]. mod and remainder
       behave the same for positive numbers, but differently for
       negative numbers.

    examples:
      - "*number1* mod *number2*"
    isFromExtension: false
    isConstant: false
    metadata:
      id: mod
      entry_categories:
        - title: Mathematical
          id: mathematicalgroup
      data:
        syntax:
          - name: mod
            since: "1.0"
        description: |+
          Reports *number1* modulo *number2*: that is, the
           residue of *number1* (mod *number2*). mod is is
           equivalent to the following NetLogo code:

          ```
                    number1 - (floor (number1 / number2)) * number2
          ```

