  - id: loop-loop
    key: loop
    name: loop
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#loop
    description: >+
      Repeats the commands forever, or until the enclosing procedure
       exits through use of the [[stop|stop]] or [[report|report]] commands.

      ```

      to move-to-world-edge  ;; turtle procedure
        loop [
          if not can-move? 1 [ stop ]
          fd 1
        ]
      end

      ```


      In this example, `stop` exits not just the loop,
       but the entire procedure.

      Note: in many circumstances, it is more appropriate to use
       a forever button to repeat something indefinitely. See [Buttons](/programming#buttons) in the
       Programming Guide.

    examples:
      - loop [ *commands* ]
    isFromExtension: false
    isConstant: false
    metadata:
      id: loop
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
      data:
        syntax:
          - name: loop
            since: "1.0"
        description: >+
          Repeats the commands forever, or until the enclosing procedure
           exits through use of the [[stop|stop]] or [[report|report]] commands.

          ```

          to move-to-world-edge  ;; turtle procedure
            loop [
              if not can-move? 1 [ stop ]
              fd 1
            ]
          end

          ```


          In this example, `stop` exits not just the loop,
           but the entire procedure.

          Note: in many circumstances, it is more appropriate to use
           a forever button to repeat something indefinitely. See [Buttons](/programming#buttons) in the
           Programming Guide.

        examples:
          - code: loop [ *commands* ]
