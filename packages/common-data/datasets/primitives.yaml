  - id: file-read-line-file-read-line
    key: file-read-line
    name: file-read-line
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#file-read-line
    description: >+
      Reads the next line in the file and reports it as a string. It
       determines the end of the file by a carriage return, an end of file
       character or both in a row. It does not return the line terminator
       characters.

      Also note that the [[file-open|file-open]] command must
       be called before this reporter can be used, and there must be data
       remaining in the file. Use the reporter [[file-at-end?|file-at-end]] to determine if you are at the end
       of the file.

      ```

      file-open "my-file.txt"

      print file-read-line

      => Hello World

      ```


      See also [[file-open|file-open]].

    examples:
      - file-read-line
    isFromExtension: false
    isConstant: false
    metadata:
      id: file-read-line
      entry_categories:
        - title: File
          id: fileiogroup
      data:
        syntax:
          - name: file-read-line
            since: "2.0"
        description: >+
          Reads the next line in the file and reports it as a string. It
           determines the end of the file by a carriage return, an end of file
           character or both in a row. It does not return the line terminator
           characters.

          Also note that the [[file-open|file-open]] command must
           be called before this reporter can be used, and there must be data
           remaining in the file. Use the reporter [[file-at-end?|file-at-end]] to determine if you are at the end
           of the file.

          ```

          file-open "my-file.txt"

          print file-read-line

          => Hello World

          ```


          See also [[file-open|file-open]].

        examples:
          - code: file-read-line
