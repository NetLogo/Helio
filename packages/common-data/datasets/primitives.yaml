  - id: member-member?
    key: member
    name: member?
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#member
    description: >+
      For a list, reports true if the given value appears in the given
       list, otherwise reports false.

      For a string, reports true or false depending on whether *string1* appears
      anywhere inside *string2* as a
       substring.

      For an agentset, reports true if the given agent is appears in
       the given agentset, otherwise reports false.

      ```

      show member? 2 [1 2 3]

      => true

      show member? 4 [1 2 3]

      => false

      show member? "bat" "abate"

      => true

      show member? turtle 0 turtles

      => true

      show member? turtle 0 patches

      => false

      ```


      See also [[position|position]].

    examples:
      - member? *value list*
      - member? *string1 string2*
      - member? *agent agentset*
    isFromExtension: false
    isConstant: false
    metadata:
      id: member
      entry_categories:
