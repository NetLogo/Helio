  - id: n-of-n-of
    key: n-of
    name: n-of
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#n-of
    description: >+
      From an agentset, reports an agentset of size *size*randomly chosen from
      the input set, with no repeats.


      From a list, reports a list of size *size* randomly chosen
       from the input set, with no repeats. The items in the result
       appear in the same order that they appeared in the input list.
       (If you want them in random order, use shuffle on the result.)

      It is an error for *size* to be greater than the size of the
       input.

      If *size* is fractional, it will be rounded down to
       the nearest integer (4.5 becomes 4, 10.9 becomes 10).

      ```

      ask n-of 50 patches [ set pcolor green ]

      ;; 50 randomly chosen patches turn green

      ```


      See also [[one-of|one-of]] and [[up-to-n-of|up-to-n-of]],
       a version that does not error with a *size* greater than
       the size of the input.

    examples:
      - n-of *size* *agentset*
      - n-of *size* *list*
    isFromExtension: false
    isConstant: false
    metadata:
      id: n-of
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: n-of
            since: "3.1"
        description: >+
          From an agentset, reports an agentset of size *size*randomly chosen
          from the input set, with no repeats.


