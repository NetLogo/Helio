  - id: one-of-one-of
    key: one-of
    name: one-of
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#one-of
    description: |+
      From an agentset, reports a random agent. If the agentset is empty,
       reports [[nobody|nobody]].

      From a list, reports a random list item. It is an error for the
       list to be empty.

      ```
      ask one-of patches [ set pcolor green ]
      ;; a random patch turns green
      ask patches with [any? turtles-here]
        [ show one-of turtles-here ]
      ;; for each patch containing turtles, prints one of
      ;; those turtles

      ;; suppose mylist is [1 2 3 4 5 6]
      show one-of mylist
      ;; prints a value randomly chosen from the list
      ```

      See also [[n-of|n-of]], [[up-to-n-of|up-to-n-of]].

    examples:
      - one-of *agentset*
      - one-of *list*
    isFromExtension: false
    isConstant: false
    metadata:
      id: one-of
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: one-of
            since: "1.0"
        description: |+
          From an agentset, reports a random agent. If the agentset is empty,
           reports [[nobody|nobody]].

          From a list, reports a random list item. It is an error for the
           list to be empty.

          ```
          ask one-of patches [ set pcolor green ]
          ;; a random patch turns green
          ask patches with [any? turtles-here]
            [ show one-of turtles-here ]
          ;; for each patch containing turtles, prints one of
          ;; those turtles

          ;; suppose mylist is [1 2 3 4 5 6]
          show one-of mylist
          ;; prints a value randomly chosen from the list
          ```

          See also [[n-of|n-of]], [[up-to-n-of|up-to-n-of]].

        examples:
          - code: one-of *agentset*
          - code: one-of *list*
  - id: or-or
    key: or
    name: or
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#or
    description: >+
      Reports true if *boolean1* is true, *boolean2* is true, or both
       are true. Otherwise returns false if both *boolean*s are false.

      Note that if *boolean1* is true, then *boolean2* will not be run (since it
      can't affect the result).
       See [the programming guide for more information on logical
       operator precedence](/programming#commands-and-reporters).

      ```

      if (pxcor > 0) or (pycor > 0) [ set pcolor red ]

      ;; patches turn red except in lower-left quadrant

      ```

    examples:
      - "*boolean1* or *boolean2*"
    isFromExtension: false
    isConstant: false
    metadata:
      id: or
      entry_categories:
