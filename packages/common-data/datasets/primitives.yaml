  - id: back-back
    key: back
    name: back
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#back
    description: >+
      The turtle moves backward by *number* steps. (If *number*is negative, the
      turtle moves forward.)


      Turtles using this primitive can move a maximum of one unit per
       time increment. So `bk 0.5` and `bk 1` both take one
       unit of time, but `bk 3` takes three.

      If the turtle cannot move backward *number* steps because it
       is not permitted by the current topology the turtle will complete
       as many steps of 1 as it can and stop.

      See also [[forward|forward]], [[jump|jump]], [[can-move?|can-move]].

    examples:
      - back *number*
    isFromExtension: false
    isConstant: false
    metadata: &a7
      id: back
      entry_categories:
        - title: Turtle-related
          id: turtlegroup
      data:
        syntax:
          - name: back
            since: "1.0"
          - name: bk
            since: "1.0"
        description: >+
