  - id: all-all?
    key: all
    name: all?
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#all
    description: |+
      Reports true if all of the agents in the agentset report true for
       the given reporter. Otherwise reports false as soon as a
       counterexample is found.

      If the agentset is empty, reports true.

      The reporter must report a boolean value for every agent (either
       true or false), otherwise an error occurs.

      ```
      if all? turtles [color = red]
        [ show "every turtle is red!" ]
      ```

      See also [[any?|any]].

    examples:
      - all? *agentset* [*reporter*]
    isFromExtension: false
    isConstant: false
    metadata:
      id: all
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: all?
            since: "4.0"
        description: |+
          Reports true if all of the agents in the agentset report true for
           the given reporter. Otherwise reports false as soon as a
           counterexample is found.

          If the agentset is empty, reports true.

          The reporter must report a boolean value for every agent (either
           true or false), otherwise an error occurs.

          ```
          if all? turtles [color = red]
            [ show "every turtle is red!" ]
          ```

          See also [[any?|any]].

        examples:
          - code: all? *agentset* [*reporter*]
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
  - id: and-and
    key: and
    name: and
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#and
    description: >+
      Reports true if both *boolean1* and *boolean2* are
       true. Otherwise reports false.

      Note that if *boolean1* is false, then *boolean2* will not be run (since
      it can't affect the
       result). See [the programming guide for more information on
       logical operator precedence](/programming#commands-and-reporters).

      ```

      if (pxcor > 0) and (pycor > 0)
        [ set pcolor blue ]  ;; the upper-right quadrant of
                             ;; patches turn blue
      ```

    examples:
      - "*boolean1* and *boolean2*"
    isFromExtension: false
    isConstant: false
    metadata:
      id: and
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
      data:
        syntax:
          - name: and
            since: "1.0"
        description: >+
          Reports true if both *boolean1* and *boolean2* are
           true. Otherwise reports false.

          Note that if *boolean1* is false, then *boolean2* will not be run
          (since it can't affect the
           result). See [the programming guide for more information on
           logical operator precedence](/programming#commands-and-reporters).

          ```

          if (pxcor > 0) and (pycor > 0)
            [ set pcolor blue ]  ;; the upper-right quadrant of
                                 ;; patches turn blue
          ```

        examples:
          - code: "*boolean1* and *boolean2*"
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
  - id: any-any?
    key: any
    name: any?
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#any
    description: |+
      Reports true if the given agentset is non-empty, false otherwise.

      Equivalent to "count *agentset* &gt; 0", but more
       efficient (and arguably more readable).

      ```
      if any? turtles with [color = red]
        [ show "at least one turtle is red!" ]
      ```

      Note: nobody is not an agentset. You only get nobody back in
       situations where you were expecting a single agent, not a whole
       agentset. If any? gets nobody as input, an error results.

      See also [[all?|all]], [[nobody|nobody]].

    examples:
      - any? *agentset*
    isFromExtension: false
    isConstant: false
    metadata:
      id: any
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: any?
            since: "2.0"
        description: |+
          Reports true if the given agentset is non-empty, false otherwise.

          Equivalent to "count *agentset* &gt; 0", but more
           efficient (and arguably more readable).

          ```
          if any? turtles with [color = red]
            [ show "at least one turtle is red!" ]
          ```

          Note: nobody is not an agentset. You only get nobody back in
           situations where you were expecting a single agent, not a whole
           agentset. If any? gets nobody as input, an error results.

          See also [[all?|all]], [[nobody|nobody]].

        examples:
          - code: any? *agentset*
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
  - id: approximate-hsb-approximate-hsb
    key: approximate-hsb
    name: approximate-hsb
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#approximate-hsb
    description: >+
      Reports a number in the range 0 to 140, not including 140 itself,
       that represents the given color, specified in the HSB spectrum, in
       NetLogo's color space.

      The first value (hue) should be in the range of 0 to 360, the second
       and third (saturation and brightness) in the range between 0 and 100.

      The color reported may be only an approximation, since the NetLogo
       color space does not include all possible colors.

      ```

      show approximate-hsb 0 0 0

      => 0  ;; (black)

      show approximate-hsb 180 57.143 76.863

      => 85 ;; (cyan)

      ```


      See also [[extract-hsb|extract-hsb]], [[approximate-rgb|approximate-rgb]],
      [[extract-rgb|extract-rgb]].

    examples:
      - approximate-hsb *hue saturation brightness*
    isFromExtension: false
    isConstant: false
    metadata:
      id: approximate-hsb
      entry_categories:
        - title: Color
          id: colorgroup
      data:
        syntax:
          - name: approximate-hsb
            since: "4.0"
        description: >+
          Reports a number in the range 0 to 140, not including 140 itself,
           that represents the given color, specified in the HSB spectrum, in
           NetLogo's color space.

          The first value (hue) should be in the range of 0 to 360, the second
           and third (saturation and brightness) in the range between 0 and 100.

          The color reported may be only an approximation, since the NetLogo
           color space does not include all possible colors.

          ```

          show approximate-hsb 0 0 0

          => 0  ;; (black)

          show approximate-hsb 180 57.143 76.863

          => 85 ;; (cyan)

          ```


          See also [[extract-hsb|extract-hsb]],
          [[approximate-rgb|approximate-rgb]], [[extract-rgb|extract-rgb]].

        examples:
          - code: approximate-hsb *hue saturation brightness*
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
  - id: approximate-rgb-approximate-rgb
    key: approximate-rgb
    name: approximate-rgb
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#approximate-rgb
    description: >+
      Reports a number in the range 0 to 140, not including 140 itself,
       that represents the given color, specified in the RGB spectrum, in
       NetLogo's color space.

      All three inputs should be in the range 0 to 255.


      The color reported may be only an approximation, since the NetLogo
       color space does not include all possible colors.

      ```

      show approximate-rgb 0 0 0

      => 0  ;; black

      show approximate-rgb 0 255 255

      => 85.2 ;; cyan

      ```


      See also [[extract-rgb|extract-rgb]], [[approximate-hsb|approximate-hsb]],
      and [[extract-hsb|extract-hsb]].

    examples:
      - approximate-rgb *red green blue*
    isFromExtension: false
    isConstant: false
    metadata:
      id: approximate-rgb
      entry_categories:
        - title: Color
          id: colorgroup
      data:
        syntax:
          - name: approximate-rgb
            since: "4.0"
        description: >+
          Reports a number in the range 0 to 140, not including 140 itself,
           that represents the given color, specified in the RGB spectrum, in
           NetLogo's color space.

          All three inputs should be in the range 0 to 255.


          The color reported may be only an approximation, since the NetLogo
           color space does not include all possible colors.

          ```

          show approximate-rgb 0 0 0

          => 0  ;; black

          show approximate-rgb 0 255 255

          => 85.2 ;; cyan

          ```


          See also [[extract-rgb|extract-rgb]],
          [[approximate-hsb|approximate-hsb]], and [[extract-hsb|extract-hsb]].

        examples:
          - code: approximate-rgb *red green blue*
