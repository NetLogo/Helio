  - id: one-of-one-of
    key: one-of
    name: one-of
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#one-of
    description: |+
      From an agentset, reports a random agent. If the agentset is empty,
       reports [[nobody|nobody]].

      From a list, reports a random list item. It is an error for the
       list to be empty.

      ```
      ask one-of patches [ set pcolor green ]
      ;; a random patch turns green
      ask patches with [any? turtles-here]
        [ show one-of turtles-here ]
      ;; for each patch containing turtles, prints one of
      ;; those turtles

      ;; suppose mylist is [1 2 3 4 5 6]
      show one-of mylist
      ;; prints a value randomly chosen from the list
      ```

      See also [[n-of|n-of]], [[up-to-n-of|up-to-n-of]].

    examples:
      - one-of *agentset*
      - one-of *list*
    isFromExtension: false
    isConstant: false
    metadata:
      id: one-of
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: one-of
            since: "1.0"
        description: |+
          From an agentset, reports a random agent. If the agentset is empty,
           reports [[nobody|nobody]].

          From a list, reports a random list item. It is an error for the
           list to be empty.

          ```
          ask one-of patches [ set pcolor green ]
          ;; a random patch turns green
          ask patches with [any? turtles-here]
            [ show one-of turtles-here ]
          ;; for each patch containing turtles, prints one of
          ;; those turtles

          ;; suppose mylist is [1 2 3 4 5 6]
          show one-of mylist
          ;; prints a value randomly chosen from the list
          ```

          See also [[n-of|n-of]], [[up-to-n-of|up-to-n-of]].

        examples:
          - code: one-of *agentset*
          - code: one-of *list*
