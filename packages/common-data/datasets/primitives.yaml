  - id: min-pcor-min-pxcor
    key: min-pcor
    name: min-pxcor
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#min-pcor
    description: >+
      These reporters give the minimum x-coordinate and minimum
       y-coordinate, (respectively) for patches, which determines the
       size of the world.

      Unlike in older versions of NetLogo the origin does not have to
       be at the center of the world. However, the minimum x- and y-
       coordinates must be less than or equal to zero.

      Note: You can set the size of the world by editing the view or using
      [[resize-world|resize-world]].


      ```

      crt 100 [ setxy random-float min-pxcor
                      random-float min-pycor ]
      ;; distributes 100 turtles randomly in the

      ;; third quadrant

      ```


      See also [[max-pxcor|max-pcor]], [[max-pycor|max-pcor]],
      [[world-width|world-dim]], and [[world-height|world-dim]]

    examples:
      - min-pxcor
      - min-pycor
    isFromExtension: false
    isConstant: false
    metadata: &a28
      id: min-pcor
      entry_categories:
        - title: World
          id: worldgroup
      data:
        syntax:
          - name: min-pxcor
            since: "3.1"
          - name: min-pycor
            since: "3.1"
        description: >+
