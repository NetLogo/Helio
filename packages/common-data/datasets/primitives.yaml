  - id: filter-filter
    key: filter
    name: filter
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#filter
    description: >+
      Reports a list containing only those items of *list* for which
       the reporter reports true -- in other words, the items satisfying the
       given condition. *reporter* may be an anonymous reporter or the
       name of a reporter.

      ```

      show filter is-number? [1 "2" 3]

      => [1 3]

      show filter [ i -> i < 3 ] [1 3 2]

      => [1 2]

      show filter [ s -> first s != "t" ] ["hi" "there" "everyone"]

      => ["hi" "everyone"]

      ```


      See also [[map|map]], [[reduce|reduce]], [[-> (anonymous
      procedure)|arrow]].

    examples:
      - filter *reporter* *list*
    isFromExtension: false
    isConstant: false
    metadata:
      id: filter
      entry_categories:
        - title: Anonymous Procedures
          id: anonproceduresgroup
