  - id: insert-item-insert-item
    key: insert-item
    name: insert-item
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#insert-item
    description: >+
      On a list, inserts an item in that list. *index* is the index
       where the item will be inserted. The first item has an index of 0.
       (The 6th item in a list would have an index of 5.)

      Likewise for a string, but all characters in a multiple-character
      *string2*are inserted at *index*.


      ```

      show insert-item 2 [2 7 4 5] 15

      => [2 7 15 4 5]

      show insert-item 2 "cat" "re"

      => "caret"

      ```

    examples:
      - insert-item *index list value*
      - insert-item *index string1 string2*
    isFromExtension: false
    isConstant: false
    metadata:
      id: insert-item
      entry_categories:
        - title: String
          id: stringgroup
      data:
        syntax:
          - name: insert-item
            since: 6.0.2
        description: >+
          On a list, inserts an item in that list. *index* is the index
           where the item will be inserted. The first item has an index of 0.
           (The 6th item in a list would have an index of 5.)

          Likewise for a string, but all characters in a multiple-character
          *string2*are inserted at *index*.


          ```

          show insert-item 2 [2 7 4 5] 15

          => [2 7 15 4 5]

          show insert-item 2 "cat" "re"

          => "caret"

          ```

        examples:
          - code: insert-item *index list value*
          - code: insert-item *index string1 string2*
  - id: inspect-inspect
    key: inspect
    name: inspect
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#inspect
    description: >+
      Opens an agent monitor for the given agent (turtle or patch or link).


      ```

      inspect patch 2 4

      ;; an agent monitor opens for that patch

      inspect one-of sheep

      ;; an agent monitor opens for a random turtle from

      ;; the "sheep" breed

      inspect one-of links

      ;; an agent monitor opens for a random link

      ```


