  - id: file-delete-file-delete
    key: file-delete
    name: file-delete
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#file-delete
    description: >+
      Deletes the file specified as *string*


      *string* must be an existing file with writable permission by
       the user. Also, the file cannot be open. Use the command [[file-close|file-close]] to close an opened file before
       deletion.

      Note that the string can either be a file name or an absolute file
       path. If it is a file name, it looks in whatever the current
       directory is. This can be changed using the command [[set-current-directory|set-current-directory]]. It is defaulted
       to the model's directory.

    examples:
      - file-delete *string*
    isFromExtension: false
    isConstant: false
    metadata:
      id: file-delete
      entry_categories:
        - title: File
          id: fileiogroup
