      description: >
        
        Close down all child models (and, recursively, their child models).
        You'll often want to call this in your setup procedure.


        Note that `clear-all` does *not* close LevelSpace models.
  - id: ls-ask
    key: ls:ask
    name: ls:ask
    alternateNames:
      - ask
    source: ls
    isFromExtension: true
    url: https://docs.netlogo.org/ls/ask.html
    metadata:
      name: ask
      extensionName: ls
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: CustomType
                name: number/list
              kind: DescribedType
              explicitName: model-or-list-of-models
            - type:
                kind: CustomType
                name: code-block
              kind: DescribedType
              explicitName: command
            - type:
                kind: Repeatable
                of:
                  kind: WildcardType
              kind: DescribedType
              explicitName: argument
        isInfix: false
      tags:
        - interaction
      fullName: ls:ask
      description: >
        
        Ask the given child model or list of child models to run the given
        command. This is the primary of doing things with child models. For
        example:


        ```NetLogo

        ls:ask model-id [ create-turtles 5 ]

        ```


        You can also ask a list of models to all do the same thing:


        ```NetLogo

        ls:ask ls:models [ create-turtles 5 ]

        ```


        You may supply the command with arguments, just like you would with
        anonymous commands:


        ```NetLogo

        let turtle-id 0

        let speed 5

        (ls:ask model-id [ [t s] -> ask turtle t [ fd s ] ] turtle-id speed)

        ```


        Note that the commands cannot access variables in the parent model
        directly. You must either pass information in through arguments or using
        `ls:let`.
  - id: ls-of
    key: ls:of
    name: ls:of
    alternateNames:
      - of
    source: ls
    isFromExtension: true
    url: https://docs.netlogo.org/ls/of.html
    metadata:
      name: of
      extensionName: ls
      primitiveType:
        kind: reporter
        returns:
          kind: WildcardType
      syntax:
        args:
          - - type:
                kind: CustomType
                name: code-block
              kind: DescribedType
              explicitName: reporter
            - type:
                kind: CustomType
                name: number/list
              kind: DescribedType
              explicitName: model-or-list-of-models
        isInfix: true
      tags:
        - interaction
      fullName: ls:of
      description: >
        
        Run the given reporter in the given model and report the result.


        `ls:of` is designed to work like NetLogo's inbuilt `of`: If you send
        `ls:of` a `model-id`, it will report the value of the reporter from that
        model. If you send it a list of model-ids, it will report a list of
        values of the reporter string from all models. You cannot pass arguments
        to `ls:of`, but you can use `ls:let`.


        ```NetLogo

        [ count turtles ] ls:of model-id

        ```
  - id: ls-report
    key: ls:report
