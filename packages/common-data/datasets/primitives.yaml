  - id: sprout-sprout
    key: sprout
    name: sprout
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#sprout
    description: >+
      Creates *number* new turtles on the current patch. The new
       turtles have random integer headings and the color is randomly
       selected from the 14 primary colors. The turtles immediately run *commands*. This is useful for giving the new turtles
       different colors, headings, or whatever. (The new turtles are
       created all at once then run one at a time, in random order.)

      If the sprout-&lt;breeds&gt; form is used, the new turtles
       are created as members of the given breed.

      If *number* is fractional, it will be rounded down to
       the nearest integer (4.5 becomes 4, 10.9 becomes 10).

      ```

      sprout 5

      sprout-wolves 10

      sprout 1 [ set color red ]

      sprout-sheep 1 [ set color black ]

      ```


      See also [[create-turtles|create-turtles]], [[hatch|hatch]].

    examples:
      - sprout *number* [ *commands* ]
      - sprout-<breeds> *number* [ *commands* ]
    isFromExtension: false
    isConstant: false
    metadata:
      id: sprout
      entry_categories:
