  - id: pcolor-pcolor
    key: pcolor
    name: pcolor
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#pcolor
    description: |+
      This is a built-in patch variable. It holds the color of the patch.
       You can set this variable to make the patch change color.

      All patch variables can be directly accessed by any turtle standing
       on the patch. Color can be represented either as a NetLogo color (a
       single number) or an RGB color (a list of 3 numbers). See details
       in the [Colors section](/programming#colors) of the
       Programming Guide. If you give an RGBA color with 4 numbers the
       transparency value will be ignored (except in NetLogo 3D).

      See also [[color|color]].

    examples:
      - pcolor
    isFromExtension: false
    isConstant: false
    metadata:
      id: pcolor
      entry_categories:
        - title: Color
          id: colorgroup
        - title: Built-in Variables
          id: variables
          subcategory:
            title: Patch Variable
            id: patch-variables
