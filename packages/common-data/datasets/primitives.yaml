        returns:
          kind: NetLogoString
      syntax:
        args:
          - []
        isInfix: false
      tags: []
      fullName: py:python
      description: >
        
        Reports either the path to the latest version of Python configured in
        the `python.properties` file or, if that is blank, looks for a Python
        executable on your system's PATH.

        For Windows, there is an installation option for including Python on
        your PATH.

        For MacOS and Linux, it will likely already be on your PATH.

        The output of this reporter is meant to be used with `py:setup`, but you
        may also use it to see which Python installation this extension will use
        by default.


        For example, on MacOS with Homebrew installed Python 3:

        ```NetLogo

        observer> show py:python

        observer: "/usr/local/bin/python3"

        ```
