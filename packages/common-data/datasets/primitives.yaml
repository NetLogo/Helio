  - id: file-at-end-file-at-end?
    key: file-at-end
    name: file-at-end?
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#file-at-end
    description: >+
      Reports true when there are no more characters left to read in from
       the current file (that was opened previously with [[file-open|file-open]]). Otherwise, reports false.

      ```

      file-open "my-file.txt"

      print file-at-end?

      => false ;; Can still read in more characters

      print file-read-line

      => This is the last line in file

      print file-at-end?

      => true ;; We reached the end of the file

      ```


      See also [[file-open|file-open]], [[file-close-all|file-close-all]].

    examples:
      - file-at-end?
    isFromExtension: false
    isConstant: false
    metadata:
      id: file-at-end
      entry_categories:
        - title: File
          id: fileiogroup
      data:
        syntax:
          - name: file-at-end?
            since: "2.0"
        description: >+
          Reports true when there are no more characters left to read in from
           the current file (that was opened previously with [[file-open|file-open]]). Otherwise, reports false.

          ```

          file-open "my-file.txt"

          print file-at-end?

          => false ;; Can still read in more characters

          print file-read-line

          => This is the last line in file

          print file-at-end?

          => true ;; We reached the end of the file

          ```


          See also [[file-open|file-open]], [[file-close-all|file-close-all]].

        examples:
          - code: file-at-end?
