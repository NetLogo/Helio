      fullName: ls:with
      description: >
        
        Reports a new list of models containing only those models that report
        `true` when they run the reporter block.


        ```NetLogo

        ls:models ls:with [ count turtles > 100 ]

        ```
  - id: ls-let
    key: ls:let
    name: ls:let
    alternateNames:
      - let
    source: ls
    isFromExtension: true
    url: https://docs.netlogo.org/ls/let.html
    metadata:
      name: let
      extensionName: ls
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Symbol
              kind: DescribedType
              explicitName: variable-name
            - type:
                kind: WildcardType
              kind: DescribedType
              explicitName: value
        isInfix: false
      tags:
        - interaction
      fullName: ls:let
      description: >
        
        Creates a variable containing the given data that can be accessed by the
        child models.


        ```NetLogo

        ask turtles [
          ls:let my-color color
          ls:ask my-model [
            ask turtles [ set color my-color ]
          ]
        ]

        ```


        `ls:let` works quite similar to `let` in that the variable is only
        locally accessible:


        ```NetLogo

        ask turtles [
          ls:let my-color color
        ]

        ;; my-color is innaccessible here

        ```


        `ls:let` is very similar to `let`, except in a few cases.


        - `ls:let` will overwrite previous values in the variable


        If you do


        ```NetLogo

        ls:let my-var 5

        ls:let my-var 6

        ```


        `my-var` will be set equal to `6`. There is no `ls:set`.


        - `ls:let` supports variable shadowing


        If you do


        ```NetLogo

        ls:let my-var 5

        ask turtles [
          ls:let my-var 6
          ls:ask child-model [ show my-var ]
        ]

        ls:ask child-model [ show my-var ]

        ```


        `child-model` will show `6` and then `5`. This is known as [variable
        shadowing](https://en.wikipedia.org/wiki/Variable_shadowing).


        - The parent model cannot directly read the value of an ls variable


        For example, this does *not* work.


        ```NetLogo

        ls:let my-var 5

        show my-var

        ```


        This is intentional. ls variables are meant to be used for sharing data
        with child models. The parent model already has access to the data.


        Furthermore, changing the value of an ls let variable in a child model
        will not affect it in any other model. For example:


        ```NetLogo

        ls:let my-var 0

        ls:ask ls:models [
          set my-var my-var + 1
          show my-var
        ]

        ```


        All models will print `1`.
  - id: ls-assign
