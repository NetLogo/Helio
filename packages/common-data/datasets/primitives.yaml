                    let p min-one-of neighbors [patch-variable]  ;; or neighbors4
                    if [patch-variable] of p < patch-variable [
                    face p
                    move-to p
                    ]
          ```


          Note that the turtle always ends up on a patch center and has a
           heading that is a multiple of 45 (downhill) or 90 (downhill4).

          See also [[uphill|uphill]], [[uphill4|uphill]].

        examples:
          - code: downhill *patch-variable*
          - code: downhill4 *patch-variable*
      icons:
        - alt: Turtle Command
          url: images/turtle.png
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
