  - id: move-to-move-to
    key: move-to
    name: move-to
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#move-to
    description: |+
      The turtle sets its x and y coordinates to be the same as the
       given agent's.

      (If that agent is a patch, the effect is to move the turtle to
       the center of that patch.)

      ```
      move-to turtle 5
      ;; turtle moves to same point as turtle 5
      move-to one-of patches
      ;; turtle moves to the center of a random patch
      move-to max-one-of turtles [size]
      ;; turtle moves to same point as biggest turtle
      ```

      Note that the turtle's heading is unaltered. You may want to
       use the [[face|face]] command first to orient the
       turtle in the direction of motion.

      See also [[setxy|setxy]].

    examples:
      - move-to *agent*
    isFromExtension: false
    isConstant: false
    metadata:
      id: move-to
      entry_categories:
        - title: Turtle-related
          id: turtlegroup
      data:
        syntax:
          - name: move-to
            since: "4.0"
        description: |+
          The turtle sets its x and y coordinates to be the same as the
           given agent's.

          (If that agent is a patch, the effect is to move the turtle to
           the center of that patch.)

          ```
          move-to turtle 5
          ;; turtle moves to same point as turtle 5
          move-to one-of patches
          ;; turtle moves to the center of a random patch
          move-to max-one-of turtles [size]
          ;; turtle moves to same point as biggest turtle
          ```

          Note that the turtle's heading is unaltered. You may want to
           use the [[face|face]] command first to orient the
           turtle in the direction of motion.

          See also [[setxy|setxy]].

        examples:
          - code: move-to *agent*
      icons:
        - alt: Turtle Command
          url: images/turtle.png
  - id: my-links-my-<breeds>
    key: my-links
    name: my-<breeds>
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#my-links
    description: >-
      Reports an agentset of all links connected to the caller of
       the corresponding breed, regardless of directedness.
       Generally, you might consider using [[`my-out-links`|my-out-links]] instead
       of this primitive, as it works well for either directed or
       undirected networks (since it excludes directed, incoming
       links).

      ```

      crt 5

      ask turtle 0

      [
        create-links-with other turtles
        show my-links ;; prints the agentset containing all links
                      ;; (since all the links we created were with turtle 0 )
      ]

      ask turtle 1

      [
        show my-links ;; shows an agentset containing the link 0 1
      ]

      end

      ```


      If you only want the undirected links connected to a node, you
       can do `my-links with [ not is-directed-link? self ]`.
    examples:
      - my-<breeds>
      - my-links
    isFromExtension: false
    isConstant: false
    metadata: &a30
      id: my-links
      entry_categories:
        - title: Link-related
          id: linkgroup
      data:
        syntax:
          - name: my-<breeds>
          - name: my-links
            since: "4.0"
        description: >-
          Reports an agentset of all links connected to the caller of
           the corresponding breed, regardless of directedness.
           Generally, you might consider using [[`my-out-links`|my-out-links]] instead
           of this primitive, as it works well for either directed or
           undirected networks (since it excludes directed, incoming
           links).

          ```

          crt 5

          ask turtle 0

          [
            create-links-with other turtles
            show my-links ;; prints the agentset containing all links
                          ;; (since all the links we created were with turtle 0 )
          ]

          ask turtle 1

          [
            show my-links ;; shows an agentset containing the link 0 1
          ]

