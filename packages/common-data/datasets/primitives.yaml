  - id: mean-mean
    key: mean
    name: mean
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#mean
    description: |+
      Reports the statistical mean of the numeric items in the given
       list. Ignores non-numeric items. The mean is the average, i.e.,
       the sum of the items divided by the total number of items.

      In NetLogo 6.1.1 and earlier, mean would error when finding
       non-number values in the given list.

      ```
      show mean [xcor] of turtles
      ;; prints the average of all the turtles' x coordinates
      ```

      See [this FAQ question](/faq#why-is-the-number-value-in-my-monitor-widget-changing-even-though-nothing-is-happening-in-my-model) for information on possible issues using *mean* with *agentsets*

    examples:
      - mean *list*
    isFromExtension: false
    isConstant: false
