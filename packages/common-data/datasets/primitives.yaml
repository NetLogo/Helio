  - id: matrix-submatrix
    key: matrix:submatrix
    name: matrix:submatrix
    alternateNames:
      - submatrix
    source: matrix
    isFromExtension: true
    url: https://docs.netlogo.org/matrix/submatrix.html
    metadata:
      name: submatrix
      extensionName: matrix
      primitiveType:
        kind: reporter
        returns:
          kind: CustomType
          name: matrix
      syntax:
        args:
          - - type:
                kind: CustomType
                name: matrix
              kind: UnnamedType
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: r1
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: c1
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: r2
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: c2
        isInfix: false
      tags:
        - retrieval/manipulation
      fullName: matrix:submatrix
      description: >
        
        Reports a new matrix object, consisting of a rectangular subsection of
        the given matrix.

        The rectangular region is from row *r1* up to (but not including) row
        *r2*,

        and from column *c1* up to (but not including) column *c2*.

         Here is an example:
        {{! prevent interpretation of extension objects as staches}}{{= | | =}}

        ```NetLogo

        let m matrix:from-row-list [[1 2 3][4 5 6][7 8 9]]

        print matrix:submatrix m 0 1 2 3 ; matrix, row-start, col-start,
        row-end, col-end
                                         ; rows from 0 (inclusive) to 2 (exclusive),
                                         ; columns from 1 (inclusive) to 3 (exclusive)
        => {{matrix:  [ [ 2 3 ][ 5 6 ] ]}}

        ```
  - id: matrix-map
    key: matrix:map
    name: matrix:map
    alternateNames:
      - map
    source: matrix
    isFromExtension: true
    url: https://docs.netlogo.org/matrix/map.html
    metadata:
      name: map
      extensionName: matrix
      primitiveType:
        kind: reporter
        returns:
          kind: CustomType
          name: matrix
      syntax:
        args:
          - - type:
                kind: ReporterType
              kind: UnnamedType
            - type:
                kind: CustomType
                name: matrix
              kind: UnnamedType
          - - type:
                kind: ReporterType
              kind: UnnamedType
            - type:
                kind: CustomType
                name: matrix
              kind: UnnamedType
            - type:
                kind: Repeatable
                of:
                  kind: CustomType
                  name: matrix
              kind: DescribedType
              explicitName: matrices ...
        isInfix: false
      tags:
        - retrieval/manipulation
      fullName: matrix:map
      description: |
        
        Reports a new matrix which results from applying <i>reporter</i>
        (an anonymous reporter or the name of a reporter)
        to each of the elements of the given matrix. For example,

        ```NetLogo
        matrix:map sqrt matrix
        ```

        would take the square root of each
        element of *matrix*. If more than one matrix argument is provided,
        the reporter is given the elements of each matrix as arguments. Thus,

        ```NetLogo
        (matrix:map + matrix1 matrix2)
        ```

        would add *matrix1* and *matrix2*.

        This reporter is meant to be the same as `map`, but for matrices
        instead of lists.
  - id: matrix-times-scalar
    key: matrix:times-scalar
    name: matrix:times-scalar
    alternateNames:
      - times-scalar
    source: matrix
    isFromExtension: true
    url: https://docs.netlogo.org/matrix/times-scalar.html
    metadata:
      name: times-scalar
      extensionName: matrix
      primitiveType:
        kind: reporter
        returns:
          kind: CustomType
          name: matrix
      syntax:
        args:
          - - type:
                kind: CustomType
                name: matrix
