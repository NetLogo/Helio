    url: https://docs.netlogo.org/dictionary.html#update-plots
    description: >+
      For each plot, runs that plot's update commands, including the
       update code for any pens in the plot.

      [[tick|tick]] has the same effect, so in models that use
       the tick counter, this primitive is not normally used. Models that
       use fractional ticks may need `update-plots`, since [[tick-advance|tick-advance]] does not update the plots.

      See the [Plotting section](/programming#plotting) of
       the Programming Guide for more details.

      See also [[setup-plots|setup-plots]].

