  - id: resize-world-resize-world
    key: resize-world
    name: resize-world
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#resize-world
    description: >+
      Changes the size of the patch grid.


      If the given patch grid coordinates are different than the ones
       in use, all turtles and links die, and the existing patch grid is
       discarded and new patches created. Otherwise, existing turtles
       and links will live if the grid coordinates are unchanged.

      Retaining references to old patches or patch sets is inadvisable
       and may subsequently cause runtime errors or other unexpected
       behavior.

      If any coordinate is fractional, it will be rounded to
       the nearest integer towards zero (4.5 becomes 4, 10.9 becomes 10, -2.9 becomes -2).

      See also [[set-patch-size|set-patch-size]].

    examples:
      - resize-world *min-pxcor* *max-pxcor* *min-pycor* *max-pycor*
    isFromExtension: false
    isConstant: false
    metadata:
      id: resize-world
      entry_categories:
        - title: World
          id: worldgroup
      data:
        syntax:
          - name: resize-world
            since: "4.1"
        description: >+
          Changes the size of the patch grid.


          If the given patch grid coordinates are different than the ones
           in use, all turtles and links die, and the existing patch grid is
           discarded and new patches created. Otherwise, existing turtles
           and links will live if the grid coordinates are unchanged.

          Retaining references to old patches or patch sets is inadvisable
           and may subsequently cause runtime errors or other unexpected
           behavior.

          If any coordinate is fractional, it will be rounded to
           the nearest integer towards zero (4.5 becomes 4, 10.9 becomes 10, -2.9 becomes -2).

          See also [[set-patch-size|set-patch-size]].

        examples:
          - code: resize-world *min-pxcor* *max-pxcor* *min-pycor* *max-pycor*
