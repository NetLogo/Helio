          - code: heading
      icons:
        - alt: Turtle Command
          url: images/turtle.png
  - id: hidden-hidden?
    key: hidden
    name: hidden?
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#hidden
    description: >+
      This is a built-in turtle or link variable. It holds a boolean
       (true or false) value indicating whether the turtle or link is
       currently hidden (i.e., invisible). You can set this variable to
       make a turtle or link disappear or reappear.

      See also [[hide-turtle|hide-turtle]], [[show-turtle|show-turtle]],
      [[hide-link|hide-link]], [[show-link|show-link]]


      Example:


      ```

      set hidden? not hidden?

      ;; if turtle was showing, it hides, and if it was hiding,

      ;; it reappears

      ```

    examples:
      - hidden?
    isFromExtension: false
    isConstant: false
    metadata:
      id: hidden
      entry_categories:
        - title: Built-in Variables
          id: variables
          subcategory:
            title: Link Variable
            id: link-variables
        - title: Built-in Variables
          id: variables
          subcategory:
            title: Turtle Variable
            id: turtle-variables
      data:
