  - id: ls-create-models
    key: ls:create-models
    name: ls:create-models
    alternateNames:
      - create-models
    source: ls
    isFromExtension: true
    url: https://docs.netlogo.org/ls/create-models.html
    metadata:
      name: create-models
      extensionName: ls
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoNumber
              kind: UnnamedType
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: path
          - - type:
                kind: NetLogoNumber
              kind: UnnamedType
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: path
            - type:
                kind: CommandType
              kind: UnnamedType
        isInfix: false
      tags:
        - opening-closing
      fullName: ls:create-models
      description: >
        
        Create the specified number of instances of the given model.  The path
        can be absolute, or relative to the main model. Compared with
        `ls:create-interactive-models`, this primitive creates lightweight
        models that are hidden by default. You should use this primitive if you
        plan on having many instances of the given model. The models may be
        shown using `ls:show`; when visible, they will have a view and command
        center, but no other widgets, e.g. plots or monitors.


        If given a command, LevelSpace will call the command after loading each
        instance of the model with the `model-id` as the argument. This allows
        you to easily store model ids in a variable or list when loading models,
        or do other initialization. For example, to store a model id in a
        variable, you can do:


        ```NetLogo

        let model-id 0

        (ls:create-models "My-Model.nlogox" [ [id] -> set model-id id ])

        ```


        Child model RNGs are seeded from the parent models RNG when they are
        created.

        Thus, if you seed the parent's model RNG before child model before child
        models are created, the simulation as a whole will be reproducible.

        Use the `ls:random-seed` primitive to seed the model system's RNGs after
        child models have been created.
  - id: ls-create-interactive-models
    key: ls:create-interactive-models
    name: ls:create-interactive-models
    alternateNames:
      - create-interactive-models
    source: ls
    isFromExtension: true
    url: https://docs.netlogo.org/ls/create-interactive-models.html
    metadata:
      name: create-interactive-models
      extensionName: ls
      primitiveType:
