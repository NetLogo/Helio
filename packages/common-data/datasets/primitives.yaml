  - id: max-pcor-max-pxcor
    key: max-pcor
    name: max-pxcor
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#max-pcor
    description: >+
      These reporters give the maximum x-coordinate and maximum
       y-coordinate, (respectively) for patches, which determines the
       size of the world.

      Unlike in older versions of NetLogo the origin does not have to
       be at the center of the world. However, the maximum x- and y-
       coordinates must be greater than or equal to zero.

      Note: You can set the size of the world by editing the view or using
      [[resize-world|resize-world]].


      ```

      crt 100 [ setxy random-float max-pxcor
                      random-float max-pycor ]
      ;; distributes 100 turtles randomly in the

      ;; first quadrant

      ```


      See also [[min-pxcor|min-pcor]], [[min-pycor|min-pcor]],
      [[world-width|world-dim]], and [[world-height|world-dim]]

    examples:
      - max-pxcor
      - max-pycor
    isFromExtension: false
    isConstant: false
    metadata: &a27
      id: max-pcor
      entry_categories:
        - title: World
          id: worldgroup
      data:
        syntax:
          - name: max-pxcor
            since: "3.1"
          - name: max-pycor
            since: "3.1"
        description: >+
          These reporters give the maximum x-coordinate and maximum
           y-coordinate, (respectively) for patches, which determines the
           size of the world.

          Unlike in older versions of NetLogo the origin does not have to
