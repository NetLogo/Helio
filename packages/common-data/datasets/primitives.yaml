  - id: position-position
    key: position
    name: position
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#position
    description: >+
      On a list, reports the first position of *item* in *list*, or false if it
      does not appear.


      On strings, reports the position of the first appearance *string1* as a
      substring of *string2*, or false if it
       does not appear.

      Note: The positions are numbered beginning with 0, not with 1.


      ```

      ;; suppose mylist is [2 7 4 7 "Bob"]

      show position 7 mylist

      => 1

      show position 10 mylist

      => false

      show position "in" "string"

      => 3

      ```


      See also [[member?|member]].

    examples:
      - position *item* *list*
      - position *string1* *string2*
    isFromExtension: false
    isConstant: false
    metadata:
      id: position
      entry_categories:
        - title: String
          id: stringgroup
      data:
        syntax:
          - name: position
            since: "1.0"
        description: >+
          On a list, reports the first position of *item* in *list*, or false if
          it does not appear.


          On strings, reports the position of the first appearance *string1* as
          a substring of *string2*, or false if it
           does not appear.

          Note: The positions are numbered beginning with 0, not with 1.


          ```

          ;; suppose mylist is [2 7 4 7 "Bob"]

          show position 7 mylist

          => 1

          show position 10 mylist

          => false

          show position "in" "string"

          => 3

          ```


          See also [[member?|member]].

        examples:
          - code: position *item* *list*
          - code: position *string1* *string2*
    urlHome: https://docs.netlogo.org/dictionary.html
    sourceIcon: netlogo-netlogo-desktop
