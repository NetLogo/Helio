  - id: towards-pitch-cmd-towards-pitch
    key: towards-pitch-cmd
    name: towards-pitch
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#towards-pitch-cmd
    description: >+
      Reports the pitch from this agent to the given agent.


      If the wrapped distance (around the edges of the screen) is shorter than
      the on-screen distance,
       towards-pitch will report the pitch of the wrapped path. towards-pitch-nowrap never uses the wrapped path.

      Note: In order to get one turtle to face another you need to use both
      towards-pitch and towards.


      Note: asking for the pitch from an agent to itself, or an agent on the
      same location, will cause a runtime
       error.

      See also [[towards|towards]]

    examples:
      - towards-pitch *agent*
      - towards-pitch-nowrap *agent*
    isFromExtension: false
    isConstant: false
    metadata: &a65
