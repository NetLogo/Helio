  - id: gis-maximum-of
    key: gis:maximum-of
    name: gis:maximum-of
    alternateNames:
      - maximum-of
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/maximum-of.html
    metadata:
      name: maximum-of
      extensionName: gis
