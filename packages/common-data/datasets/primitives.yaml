  - id: dz-dz
    key: dz
    name: dz
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#dz
    description: >+
      Reports the z-increment (the amount by which the turtle's zcor would
      change) if the turtle were to take one
       step forward at its current heading and pitch.

      NOTE: dz is simply the sine of the turtle's pitch. Both dx and dy have
      changed in this case. So, dx =
       cos(pitch) * sin(heading) and dy = cos(pitch) * cos(heading).

      See also [[dx|dx]], [[dy|dy]].

    examples:
      - dz
    isFromExtension: false
    isConstant: false
    metadata:
      id: dz
      entry_categories:
