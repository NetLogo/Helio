  - id: or-or
    key: or
    name: or
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#or
    description: >+
      Reports true if *boolean1* is true, *boolean2* is true, or both
       are true. Otherwise returns false if both *boolean*s are false.

      Note that if *boolean1* is true, then *boolean2* will not be run (since it
      can't affect the result).
       See [the programming guide for more information on logical
       operator precedence](/programming#commands-and-reporters).

      ```

      if (pxcor > 0) or (pycor > 0) [ set pcolor red ]

      ;; patches turn red except in lower-left quadrant

      ```

    examples:
      - "*boolean1* or *boolean2*"
    isFromExtension: false
    isConstant: false
    metadata:
      id: or
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
      data:
