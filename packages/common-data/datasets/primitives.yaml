  - id: layout-radial-layout-radial
    key: layout-radial
    name: layout-radial
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#layout-radial
    description: >+
      Arranges the turtles in *turtle-set* connected by links in *link-set*, in
      a radial tree layout, centered around the *root-agent* which is moved to
      the center of the world view.


      Only links in the *link-set* will be used to determine the
       layout. If links connect turtles that are not in *turtle-set*those turtles will remain stationary.

      Even if the network does contain cycles, and is not a true tree
       structure, this layout will still work, although the results will
       not always be pretty.

      ```

      to make-a-tree
        set-default-shape turtles "circle"
        crt 6
        ask turtle 0 [
          create-link-with turtle 1
          create-link-with turtle 2
          create-link-with turtle 3
        ]
        ask turtle 1 [
          create-link-with turtle 4
          create-link-with turtle 5
        ]
        ; do a radial tree layout, centered on turtle 0
        layout-radial turtles links (turtle 0)
      end

      ```

    examples:
      - layout-radial *turtle-set* *link-set* *root-agent*
    isFromExtension: false
    isConstant: false
    metadata:
      id: layout-radial
      entry_categories:
        - title: Link-related
          id: linkgroup
      data:
        syntax:
          - name: layout-radial
            since: "4.0"
        description: >+
          Arranges the turtles in *turtle-set* connected by links in *link-set*,
