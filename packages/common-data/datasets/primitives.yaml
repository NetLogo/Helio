      tags: []
      fullName: vid:reset-recorder
      description: Stops the current recording, discards any recorded frames without
        saving them, and forgets the currently set recording resolution.
  - id: vid-start-recorder
    key: vid:start-recorder
    name: vid:start-recorder
    alternateNames:
      - start-recorder
    source: vid
    isFromExtension: true
    url: https://docs.netlogo.org/vid/start-recorder.html
    metadata:
      name: start-recorder
      extensionName: vid
      primitiveType:
        kind: command
      syntax:
        args:
          - []
        isInfix: false
      tags: []
      fullName: vid:start-recorder
      description: >
        
        Starts the recorder.

        If the recorder is already running this will cause an error to be
        raised.

        If desired, a recording width and height can be supplied.

        If width and height are not supplied, they will be determined from the
        first frame recorded.


        Example:


        ```NetLogo

        vid:start-recorder

        (vid:start-recorder 640 480)

        ```


        Errors:


        * Message `"vid: recorder already started"`: The recorder has already
        been started. The existing recording should be saved or reset before
        starting the recording.

        * Message `"vid: invalid dimensions"`: The selected dimensions are
        invalid (one of the dimensions is zero or negative).
  - id: vid-save-recording
    key: vid:save-recording
    name: vid:save-recording
    alternateNames:
      - save-recording
    source: vid
    isFromExtension: true
    url: https://docs.netlogo.org/vid/save-recording.html
    metadata:
      name: save-recording
      extensionName: vid
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: filename
        isInfix: false
      tags: []
      fullName: vid:save-recording
      description: >
        
        Saves the recording to the specified path.

        If the recorder is not running this will cause an error to be raised.

        Note that at present the recording will always be saved in the "mp4"
        format.

        If the supplied filename does not end in ".mp4", the ".mp4" suffix will
        be added.

        Note that `vid:save-recording` *will* overwrite existing files of the
        same name.

        `vid:save-recording` will error if the recorder has not been started or
        if the file cannot be written since the containing directory does not
        exist.


        Example:


        ```NetLogo

        vid:save-recording "foo.mp4"      ; Saves to foo.mp4 in the directory
        containing the model

        vid:save-recording user-new-file  ; Opens a dialog for the user to
        select a save path

        vid:save-recording "/tmp/foo.mp4" ; Saves the recording to the "/tmp"
        directory

        ```


        Errors:


        * Message `"vid: recorder not started"`: The recorder has not been
        started. Start the recorder with `vid:start-recorder`.

        * Message `"vid: no such directory"`: The directory containing the
        specified save file does not exist.

        * Message `"vid: no frames recorded"`: You tried to save a recording
        with no frames recorded. Check that you are recording properly or use
        `vid:reset-recording` to to change the recording format without saving.
