          show extract-hsb [255 0 0]

          => [0 100 100]

          ```


          See also [[approximate-hsb|approximate-hsb]],
          [[approximate-rgb|approximate-rgb]], [[extract-rgb|extract-rgb]].

        examples:
          - code: extract-hsb *color*
  - id: extract-rgb-extract-rgb
    key: extract-rgb
    name: extract-rgb
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#extract-rgb
    description: >+
      Reports a list of three values in the range 0 to 255 representing
       the levels of red, green, and blue, respectively, of the given
       NetLogo or RGB(A) color.

