  - id: set-set
    key: set
    name: set
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#set
    description: >+
      Sets *variable* to the given value.


      Variable can be any of the following:


      * A global variable declared using "globals"

      * The global variable associated with a slider, switch, chooser,
       or input box.
      * A variable belonging to this agent

      * If this agent is a turtle, a variable belonging to the patch
       under the turtle.
      * A local variable created by the [[let|let]] command.

      * An input to the current procedure.


      Example:


      ```

      ask turtles [
        set color red
        set size 2
        set shape "arrow"
      ]

      ```


      You can also give a list of variable names as the first argument for `set`
      and they will be assigned the values from a list given as the second
      argument. This can be particular useful when you want to calculate
      multiple values in a reporter procedure, as you can easily set multiple
      variables with the results. A runtime error will occur if the second
      argument is not a list value or if there are not enough values in the list
      for all the variables specified.


      ```

      ask turtles [
        set [color size shape] [red 2 "arrow"]
        show color ; prints 15
        show size ; prints 2
        show shape ; prints "arrow"
      ]

      ask turtles [
        set [color size shape] [red] ; causes a runtime error as we need at least 3 values in the list
      ]

      ```

    examples:
      - set *variable* *value*
    isFromExtension: false
    isConstant: false
    metadata:
      id: set
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
      data:
        syntax:
          - name: set
            since: "1.0"
        description: >+
          Sets *variable* to the given value.


          Variable can be any of the following:


          * A global variable declared using "globals"

          * The global variable associated with a slider, switch, chooser,
           or input box.
          * A variable belonging to this agent

          * If this agent is a turtle, a variable belonging to the patch
           under the turtle.
          * A local variable created by the [[let|let]] command.

          * An input to the current procedure.


          Example:


          ```

          ask turtles [
            set color red
            set size 2
            set shape "arrow"
          ]

          ```


          You can also give a list of variable names as the first argument for
          `set` and they will be assigned the values from a list given as the
          second argument. This can be particular useful when you want to
          calculate multiple values in a reporter procedure, as you can easily
          set multiple variables with the results. A runtime error will occur if
          the second argument is not a list value or if there are not enough
          values in the list for all the variables specified.


          ```

          ask turtles [
            set [color size shape] [red 2 "arrow"]
            show color ; prints 15
            show size ; prints 2
            show shape ; prints "arrow"
          ]

          ask turtles [
            set [color size shape] [red] ; causes a runtime error as we need at least 3 values in the list
          ]

          ```

        examples:
          - code: set *variable* *value*
  - id: set-current-directory-set-current-directory
    key: set-current-directory
    name: set-current-directory
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#set-current-directory
    description: >+
      Sets the current directory that is used by the primitives
      [[file-delete|file-delete]], [[file-exists?|file-exists]], and
      [[file-open|file-open]].


      The current directory is not used if the above commands are given
       an absolute file path. This is defaulted to the user's home
       directory for new models, and is changed to the model's
       directory when a model is opened.

      Note that in Windows file paths the backslash needs to be escaped
       within a string by using another backslash "C:\"

      The change is temporary and is not saved with the model.


      ```

      set-current-directory "C:\NetLogo"

      ;; Assume it is a Windows Machine

      file-open "my-file.txt"

      ;; Opens file "C:\NetLogo\my-file.txt"

      ```

    examples:
      - set-current-directory *string*
    isFromExtension: false
    isConstant: false
    metadata:
      id: set-current-directory
      entry_categories:
        - title: Input/Output
          id: iogroup
      data:
        syntax:
