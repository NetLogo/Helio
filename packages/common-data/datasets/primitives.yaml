          url: images/turtle.png
  - id: in-link-neighbor-in-<breed>-neighbor?
    key: in-link-neighbor
    name: in-<breed>-neighbor?
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#in-link-neighbor
    description: >+
      Reports true if there is a directed link going from *turtle*to the caller
      or an undirected link connecting *turtle* to the
       caller. You can think of this as "is there a link I can use to get from *turtle* to the caller?"

      ```

      crt 2

      ask turtle 0 [
        create-link-to turtle 1
        show in-link-neighbor? turtle 1  ;; prints false
        show out-link-neighbor? turtle 1 ;; prints true
      ]

      ask turtle 1 [
        show in-link-neighbor? turtle 0  ;; prints true
        show out-link-neighbor? turtle 0 ;; prints false
      ]

      ```

    examples:
      - in-<breed>-neighbor? *agent*
      - in-link-neighbor? *turtle*
    isFromExtension: false
    isConstant: false
    metadata: &a22
      id: in-link-neighbor
      entry_categories:
        - title: Link-related
          id: linkgroup
      data:
        syntax:
