  - id: matrix-solve
    key: matrix:solve
    name: matrix:solve
    alternateNames:
      - solve
    source: matrix
    isFromExtension: true
    url: https://docs.netlogo.org/matrix/solve.html
    metadata:
      name: solve
      extensionName: matrix
      primitiveType:
        kind: reporter
        returns:
          kind: CustomType
          name: matrix
      syntax:
        args:
          - - type:
                kind: CustomType
                name: matrix
              kind: DescribedType
              explicitName: A
            - type:
                kind: CustomType
                name: matrix
              kind: DescribedType
              explicitName: C
        isInfix: false
      tags:
        - advanced
      fullName: matrix:solve
      description: >-
        
        Reports the solution to a linear system of equations, specified by

        the *A* and *C* matrices. In general, solving a set of

        linear equations is akin to matrix division. That is, the goal is

        to find a matrix B such that *A* * B = *C*. (For simple

        linear systems, *C* and B can both be 1-dimensional matrices

        -- i.e. vectors). If A is not a square matrix, then a "least squares"
        solution is returned.

        {{! prevent interpretation of extension objects as staches}}{{= | | =}}

        ```NetLogo

        ;; To solve the set of equations x + 3y = 10 and 7x - 4y = 20

        ;; We make our A matrix [[1 3][7 -4]], and our C matrix [[10][20]]

        let A matrix:from-row-list [[1 3][7 -4]]

        let C matrix:from-row-list [[10][20]]

        print matrix:solve A C

        => {{matrix:  [ [ 4 ][ 2.0000000000000004 ] ]}}

        ;; NOTE: as you can see, the results may be only approximate

        ;; (In this case, the true solution should be x=4 and y=2.)

        ```
  - id: matrix-forecast-linear-growth
    key: matrix:forecast-linear-growth
    name: matrix:forecast-linear-growth
    alternateNames:
      - forecast-linear-growth
    source: matrix
    isFromExtension: true
    url: https://docs.netlogo.org/matrix/forecast-linear-growth.html
    metadata:
      name: forecast-linear-growth
      extensionName: matrix
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: data-list
        isInfix: false
      tags:
        - advanced
      fullName: matrix:forecast-linear-growth
      description: >-
        

        Reports a four-element list of the form:


        <tt>[ forecast constant slope R<sup>2</sup> ]</tt>


        The *forecast* is the predicted next value that would

        follow in the sequence given by the *data-list* input, based

        on a linear trend-line. Normally *data-list* will contain

        observations on some variable, Y, from time t = 0 to time t = (n-1)

        where n is the number of observations. The *forecast* is the

        predicted value of Y at t = n. The *constant* and *slope*

        are the parameters of the trend-line


        ```

        Y = *constant* + *slope* * t.

        ```


        The *R<sup>2</sup>* value measures the goodness of fit of the

        trend-line to the data, with an R<sup>2</sup> = 1 being a perfect

        fit and an R<sup>2</sup> of 0 indicating no discernible trend.

        Linear growth assumes that the variable Y grows by a constant

        absolute amount each period.


        ```NetLogo

        ;; a linear extrapolation of the next item in the list.

        print matrix:forecast-linear-growth [20 25 28 32 35 39]

        => [42.733333333333334 20.619047619047638 3.6857142857142824
        0.9953743395474031]

        ;; These results tell us:

        ;; * the next predicted value is roughly 42.7333

        ;; * the linear trend line is given by Y = 20.6190 + 3.6857 * t

        ;; * Y grows by approximately 3.6857 units each period

        ;; * the R^2 value is roughly 0.9954 (a good fit)

        ```
  - id: matrix-forecast-compound-growth
    key: matrix:forecast-compound-growth
    name: matrix:forecast-compound-growth
    alternateNames:
      - forecast-compound-growth
    source: matrix
    isFromExtension: true
    url: https://docs.netlogo.org/matrix/forecast-compound-growth.html
    metadata:
      name: forecast-compound-growth
      extensionName: matrix
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: data-list
        isInfix: false
      tags:
        - advanced
      fullName: matrix:forecast-compound-growth
      description: >-
        
        Reports a four-element list of the form:


        <tt>[ forecast constant growth-proportion R<sup>2</sup> ]</tt>


        Whereas [[matrix:forecast-linear-growth|/matrix/forecast-linear-growth]]

        assumes growth by a constant absolute amount each period,
        [[matrix:forecast-compound-growth|/matrix/forecast-compound-growth]]

        assumes that Y grows by a constant **proportion** each period.

        The *constant* and *growth-proportion* are the parameters

        of the trend-line


        <tt>Y = *constant* * *growth-proportion*<sup>t</sup>.</tt>


        Note that the growth proportion is typically interpreted as

        *growth-proportion* = *(1.0 + growth-rate)*. Therefore,

        if [[matrix:forecast-compound-growth|/matrix/forecast-compound-growth]]

        returns a *growth-proportion* of 1.10, that implies that Y

        grows by (1.10 - 1.0) = 10% each period. Note that if growth is

        negative,
        [[matrix:forecast-compound-growth|/matrix/forecast-compound-growth]]

        will return a *growth-proportion* of less than one. E.g., a

        *growth-proportion* of 0.90 implies a growth rate of -10%.


        **NOTE:** The compound growth forecast is achieved by taking the

        ln of Y. (See [[matrix:regress|/matrix/regress]], below.)

        Because it is impossible to take the natural log of zero or a

        negative number,
        [[matrix:forecast-compound-growth|/matrix/forecast-compound-growth]]

        will result in an error if it finds a zero or negative number in

        *data-list*.


        ```NetLogo

        ;; a compound growth extrapolation of the next item in the list.

        print matrix:forecast-compound-growth [20 25 28 32 35 39]

        => [45.60964465307147 21.15254147944863 1.136621034423892
        0.9760867518334806]

        ;; These results tell us:

        ;; * the next predicted value is approximately 45.610

        ;; * the compound growth trend line is given by Y = 21.1525 * 1.1366 ^ t

        ;; * Y grows by approximately 13.66% each period

        ;; * the R^2 value is roughly 0.9761 (a good fit)

        ```
  - id: matrix-forecast-continuous-growth
    key: matrix:forecast-continuous-growth
    name: matrix:forecast-continuous-growth
    alternateNames:
      - forecast-continuous-growth
    source: matrix
    isFromExtension: true
    url: https://docs.netlogo.org/matrix/forecast-continuous-growth.html
    metadata:
      name: forecast-continuous-growth
      extensionName: matrix
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: data-list
        isInfix: false
      tags:
        - advanced
      fullName: matrix:forecast-continuous-growth
      description: >-
        
        Reports a four-element list of the form:


        <tt>[ *forecast* *constant* &nbsp;*growth-rate* &nbsp;*R<sup>2</sup>*
        ]</tt>.
         Whereas [[matrix:forecast-compound-growth|/matrix/forecast-compound-growth]]
        assumes discrete time with Y growing by a given proportion each

        finite period of time (e.g., a month or a year),
        [[matrix:forecast-continuous-growth|/matrix/forecast-continuous-growth]]

        assumes that Y is compounded **continuously** (e.g., each second

        or fraction of a second). The *constant* and

        *growth-rate* are the parameters of the trend-line


        <tt>Y = *constant* * e<sup>(growth-rate * t)</sup></tt>


        [[matrix:forecast-continuous-growth|/matrix/forecast-continuous-growth]]

        is the "calculus" analog of
        [[matrix:forecast-compound-growth|/matrix/forecast-compound-growth]].

        The two will normally yield similar (but not identical) results, as

        shown in the example below. *growth-rate* may, of course, be

        negative.

        >

        *NOTE:* The continuous growth forecast is achieved by taking

        the ln of Y. (See [[matrix:regress|/matrix/regress]],

        below.) Because it is impossible to take the natural log of zero or

        a negative number,
        [[matrix:forecast-continuous-growth|/matrix/forecast-continuous-growth]]

        will result in an error if it finds a zero or negative number in

        *data-list*.


        ```NetLogo

        ;; a continuous growth extrapolation of the next item in the list.

        print matrix:forecast-continuous-growth [20 25 28 32 35 39]

        => [45.60964465307146 21.15254147944863 0.12805985615332668
        0.9760867518334806]

        ;; These results tell us:

        ;; * the next predicted value is approximately 45.610

        ;; * the compound growth trend line is given by Y = 21.1525 * e ^
        (0.1281 * t)

        ;; * Y grows by approximately 12.81% each period if compounding takes
        place continuously

        ;; * the R^2 value is roughly 0.9761 (a good fit)

        ```
  - id: matrix-regress
    key: matrix:regress
    name: matrix:regress
    alternateNames:
      - regress
    source: matrix
    isFromExtension: true
    url: https://docs.netlogo.org/matrix/regress.html
    metadata:
      name: regress
      extensionName: matrix
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - - type:
                kind: CustomType
                name: matrix
              kind: DescribedType
              explicitName: data-matrix
        isInfix: false
      tags:
        - advanced
      fullName: matrix:regress
      description: >-
        
        All three of the forecast primitives above are just special cases

        of performing an OLS (ordinary-least-squares) linear regression --

        the matrix:regress primitive provides a flexible/general-purpose

        approach. The input is a matrix *data-matrix*, with the first

        column being the observations on the dependent variable and each

        subsequent column being the observations on the (1 or more)

        independent variables. Thus each row consists of an observation of

        the dependent variable followed by the corresponding observations

        for each independent variable.


        The output is a Logo nested list composed of two elements. The

        first element is a list containing the regression constant followed

        by the coefficients on each of the independent variables. The

        second element is a 3-element list containing the R<sup>2</sup>

        statistic, the total sum of squares, and the residual sum of

        squares. The following code example shows how the
        [[matrix:regress|/matrix/regress]] primitive can be used to

        perform the same function as the code examples shown in the

        matrix:forecast-*-growth primitives above. (However, keep in mind

        that the [[matrix:regress|/matrix/regress]] primitive is

        more powerful than this, and can have many more independent

        variables in the regression, as indicated in the fourth example

        below.)


        ```NetLogo

        ;; this is equivalent to what the matrix:forecast-linear-growth does

        let data-list [20 25 28 32 35 39]

        let indep-var (n-values length data-list [ x -> x ]) ; 0,1,2...,5

        let lin-output matrix:regress matrix:from-column-list (list data-list
        indep-var)

        let lincnst item 0 (item 0 lin-output)

        let linslpe item 1 (item 0 lin-output)

        let linR2   item 0 (item 1 lin-output)

        ;;Note the "6" here is because we want to forecast the value at time
        t=6.

        print (list (lincnst + linslpe * 6) (lincnst) (linslpe) (linR2))


        ;; this is equivalent to what the matrix:forecast-compound-growth does

        let com-log-data-list  (map ln [20 25 28 32 35 39])

        let com-indep-var2 (n-values length com-log-data-list [ x -> x ]) ;
        0,1,2...,5

        let com-output matrix:regress matrix:from-column-list (list
        com-log-data-list com-indep-var2)

        let comcnst exp item 0 (item 0 com-output)

        let comprop exp item 1 (item 0 com-output)

        let comR2       item 0 (item 1 com-output)

        ;;Note the "6" here is because we want to forecast the value at time
        t=6.

        print (list (comcnst * comprop ^ 6) (comcnst) (comprop) (comR2))


        ;; this is equivalent to what the matrix:forecast-continuous-growth does

        let con-log-data-list  (map ln [20 25 28 32 35 39])

        let con-indep-var2 (n-values length con-log-data-list [ x -> x ]) ;
        0,1,2...,5

        let con-output matrix:regress matrix:from-column-list (list
        con-log-data-list con-indep-var2)

        let concnst exp item 0 (item 0 con-output)

        let conrate     item 1 (item 0 con-output)

        let conR2       item 0 (item 1 con-output)

        print (list (concnst * exp (conrate * 6)) (concnst) (conrate) (conR2))


        ;; example of a regression with two independent variables:

        ;; Pretend we have a dataset, and we want to know how well happiness

        ;; is correlated to snack-food consumption and accomplishing goals.

        let happiness [2 4 5 8 10]

        let snack-food-consumed [3 4 3 7 8]

        let goals-accomplished [2 3 5 8 9]

        print matrix:regress matrix:from-column-list (list happiness
        snack-food-consumed goals-accomplished)

        => [[-0.14606741573033788 0.3033707865168543 0.8202247191011234]
        [0.9801718440185063 40.8 0.8089887640449439]]

        ;; linear regression: happiness = -0.146 + 0.303*snack-food-consumed +
        0.820*goals-accomplished

        ;; (Since the 0.820 coefficient is higher than the 0.303 coefficient, it
        appears that each goal

        ;; accomplished yields more happiness than does each snack consumed,
        although both are positively

        ;; correlated with happiness.)

        ;; Also, we see that R^2 = 0.98, so the two factors together provide a
        good fit.

        ```
  - id: nw-set-context
    key: nw:set-context
    name: nw:set-context
    alternateNames:
      - set-context
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/set-context.html
    metadata:
      name: set-context
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtleset
            - type:
                kind: Agentset
                of: Link
              kind: DescribedType
              explicitName: linkset
        isInfix: false
      tags:
        - context
      fullName: nw:set-context
      description: >
        
        Specifies the set of turtles and the set of links that the extension
        will consider to be the current graph. All the turtles from _turtleset_
        and all the links from _linkset_ that connect two turtles from
        _turtleset_ will be included.


        This context is used by all other primitives (unless specified
        otherwise) until a new context is specified. (At the moment, only the
        generator primitives and the file input primitives are exceptions to
        this rule.)


        See [the usage section](#usage) for a much more detailed explanation of
        `nw:set-context`.
  - id: nw-get-context
    key: nw:get-context
    name: nw:get-context
    alternateNames:
      - get-context
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/get-context.html
    metadata:
      name: get-context
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - context
      fullName: nw:get-context
      description: >
        
        Reports the content of the current graph context as a list containing
        two agentsets: the agentset of turtles that are part of the context and
        the agentset of links that are part of the context.


        Let's say we start with a blank slate and the default context consisting
        of `turtles` and `links`, `nw:get-context` will report a list the
        special `turtles` and `links` breed agentsets:


        ```NetLogo

        observer> clear-all

        observer> show nw:get-context

        observer: [turtles links]

        ```


        If we add some turtles and links to our context, we'll still see the
        same thing, even though `turtles` and `links` have internally grown:


        ```NetLogo

        observer> crt 2 [ create-links-with other turtles ]

        observer> show nw:get-context

        observer: [turtles links]

        ```


        If you had set your context to normal agentsets instead (built with
        `turtle-set`, `link-set` or `with`) here is what you would see:


        ```NetLogo

        observer> clear-all

        observer> nw:set-context turtle-set turtles link-set links

        observer> show nw:get-context

        observer: [(agentset, 0 turtles) (agentset, 0 links)]

        ```


        If you then create new turtles and links, they are not added to the
        context because normal agentsets don't grow (see [Special agentsets vs
        normal agentsets](#special-agentsets-vs-normal-agentsets)):


        ```NetLogo

        observer> crt 2 [ create-links-with other turtles ]

        observer> show nw:get-context

        observer: [(agentset, 0 turtles) (agentset, 0 links)]

        ```


        But if you construct new agentsets and set the context to them, your new
        agents will be there:


        ```NetLogo

        observer> nw:set-context turtle-set turtles link-set links

        observer> show nw:get-context

        observer: [(agentset, 2 turtles) (agentset, 1 link)]

        ```


        If you want to see the actual content of your context, it is easy to
        turn your agentsets into lists that can be nicely displayed. Just use a
        combination of
        [`map`](http://ccl.northwestern.edu/netlogo/docs/dictionary.html#map)
        and
        [`sort`](http://ccl.northwestern.edu/netlogo/docs/dictionary.html#sort):


        ```NetLogo

        observer> show map sort nw:get-context

        observer: [[(turtle 0) (turtle 1)] [(link 0 1)]]

        ```


        Finally, you can use `nw:get-context` to store a context that you
        eventually want to restore:


        ```NetLogo

        extensions [ nw ]

        to store-and-restore-context
          clear-all
          crt 2 [
            set color red
            create-links-with other turtles with [ color = red ] [
              set color yellow
            ]
          ]
          crt 2 [
            set color blue
            create-links-with other turtles with [ color = blue ] [
              set color green
            ]
          ]
          nw:set-context turtles with [ color = red ] links with [ color = yellow ]
          show map sort nw:get-context
          let old-turtles item 0 nw:get-context
          let old-links item 1 nw:get-context
          nw:set-context turtles with [ color = blue ] links with [ color = green ]
          show map sort nw:get-context
          nw:set-context old-turtles old-links
          show map sort nw:get-context
        end

        ```


        Here is the result:


        ```NetLogo

        observer> store-and-restore-context

        observer: [[(turtle 0) (turtle 1)] [(link 0 1)]]

        observer: [[(turtle 2) (turtle 3)] [(link 2 3)]]

        observer: [[(turtle 0) (turtle 1)] [(link 0 1)]]

        ```
  - id: nw-with-context
    key: nw:with-context
    name: nw:with-context
    alternateNames:
      - with-context
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/with-context.html
    metadata:
      name: with-context
      extensionName: nw
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Agentset
                of: Turtle
              kind: DescribedType
              explicitName: turtleset
            - type:
                kind: Agentset
                of: Link
              kind: DescribedType
              explicitName: linkset
            - type:
                kind: CommandBlock
              kind: DescribedType
              explicitName: command-block
        isInfix: false
      tags:
        - context
      fullName: nw:with-context
      description: >
        
        Executes the _command-block_ with the context temporarily set to
        _turtleset_ and _linkset_.

        After _command-block_ finishes running, the previous context will be
        restored.


        For example:


        ```NetLogo

        observer> create-turtles 3 [ create-links-with other turtles ]

        observer> nw:with-context (turtle-set turtle 0 turtle 1) (link-set link
        0 1) [ show nw:get-context ]

        observer: [(agentset, 2 turtles) (agentset, 1 link)

        observer> show nw:get-context

        observer: [turtles links]

        ```


        If you have NW extension code running in two forever buttons or `loop`
        blocks that each need to use different contexts, you should use
        `nw:with-context` in each to make sure they are operating in the correct
        context.
  - id: nw-turtles-in-radius
    key: nw:turtles-in-radius
    name: nw:turtles-in-radius
    alternateNames:
      - turtles-in-radius
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/turtles-in-radius.html
    metadata:
      name: turtles-in-radius
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: Agentset
          of: Turtle
      syntax:
        args:
          - - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: radius
        isInfix: false
      tags:
        - path
      fullName: nw:turtles-in-radius
      description: |
        
        Returns the set of turtles within the given distance (number of links followed) of the calling turtle in the current context, including the calling turtle.

        `nw:turtles-in-radius` form will follow both undirected links and directed **out** links. You can think of `turtles-in-radius` as "turtles **who I can get to** in _radius_ steps".

        If you want the primitive to follow only undirected links or only directed links, you can do it by setting the context appropriately. For example: `nw:set-context turtles undir-links` (assuming `undir-links` is an undirected link breed) or `nw:set-context turtles dir-links` (assuming `dir-links` is a directed link breed).

        Example:

        ```NetLogo
        clear-all
        create-turtles 5
        ask turtle 0 [ create-link-with turtle 1 ]
        ask turtle 0 [ create-link-with turtle 2 ]
        ask turtle 1 [ create-link-with turtle 3 ]
        ask turtle 2 [ create-link-with turtle 4 ]
        ask turtle 0 [
          show sort nw:turtles-in-radius 1
        ]
        ```

        Will output:

        ```NetLogo
        (turtle 0): [(turtle 0) (turtle 1) (turtle 2)]
        ```

        As you may have noticed, the result includes the calling turtle. This mimics the behavior of the regular NetLogo [`in-radius`](http://ccl.northwestern.edu/netlogo/docs/dictionary.html#in-radius) primitive.
