          ;; chemical to its neighboring 8 patches. Thus,
          ;; each patch gets 1/8 of 50% of the chemical
          ;; from each neighboring patch.)
          ```

        examples:
          - code: diffuse *patch-variable* *number*
  - id: diffuse4-diffuse4
