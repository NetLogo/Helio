  - id: gis-sampling-method-of
    key: gis:sampling-method-of
    name: gis:sampling-method-of
    alternateNames:
      - sampling-method-of
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/sampling-method-of.html
    metadata:
      name: sampling-method-of
      extensionName: gis
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoString
      syntax:
        args:
          - - type:
                kind: CustomType
                name: dataset
              kind: DescribedType
              explicitName: RasterDataset
        isInfix: false
      tags:
        - raster
      fullName: gis:sampling-method-of
      description: >
        
        Reports the sampling method used to compute the value of the given

        raster dataset at a single point, or over an area smaller than a

        single raster cell. Sampling is performed by the GIS extension

        primitives [[raster-sample|/gis/raster-sample]],
        [[resample|/gis/resample]], [[convolve|/gis/convolve]],

        and [[apply-raster|/gis/apply-raster]]. The sampling

        method will be one of the following:


        * `"NEAREST_NEIGHBOR"`: the value of the cell
          nearest the sampling location is used.
        * `"BILINEAR"`: the value of the four nearest
          cells are sampled by linear weighting, according to their
          proximity to the sampling site.
        * `"BICUBIC"`: the value of the sixteen nearest
          cells are sampled, and their values are combined by weight
          according to a piecewise cubic polynomial recommended by Rifman
          (see *Digital Image Warping*, George Wolberg, 1990, pp
          129-131, IEEE Computer Society Press).
        * `"BICUBIC_2"`: the value is sampled using the
          same procedure and the same polynomial as with `BICUBIC`
          above, but using a different coefficient. This method may produce
          somewhat sharper results than `BICUBIC`, but that result
          is data dependent.

        For more information on these sampling methods and on raster

        sampling in general, see <a
        href="https://en.wikipedia.org/wiki/Image_scaling" target="_blank">this
        wikipedia

        article</a>.
  - id: gis-set-sampling-method
    key: gis:set-sampling-method
    name: gis:set-sampling-method
    alternateNames:
      - set-sampling-method
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/set-sampling-method.html
    metadata:
      name: set-sampling-method
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: CustomType
                name: dataset
              kind: DescribedType
              explicitName: RasterDataset
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: sampling-method
        isInfix: false
      tags:
        - raster
      fullName: gis:set-sampling-method
      description: >
        
        Sets the sampling method used by the given raster dataset at a

        single point, or over an area smaller than a single raster cell.

        Sampling is performed by the GIS extension primitives
        [[raster-sample|/gis/raster-sample]], [[resample|/gis/resample]],
        [[convolve|/gis/convolve]],

        and [[apply-raster|/gis/apply-raster]]. The sampling

        method must be one of the following:


        *  `"NEAREST_NEIGHBOR"`

        *  `"BILINEAR"`

        *  `"BICUBIC"`

        *  `"BICUBIC_2"`


        See [[sampling-method-of|/gis/sampling-method-of]] above

        for a more specific description of each sampling method.
  - id: gis-raster-sample
    key: gis:raster-sample
    name: gis:raster-sample
    alternateNames:
      - raster-sample
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/raster-sample.html
    metadata:
      name: raster-sample
      extensionName: gis
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - - type:
                kind: CustomType
                name: dataset
              kind: DescribedType
              explicitName: RasterDataset
            - type:
                kind: WildcardType
              kind: DescribedType
              explicitName: sample-location
        isInfix: false
      tags:
        - raster
      fullName: gis:raster-sample
      description: >
        
        Reports the value of the given raster over the given location. The

        location may be any of the following:


        * A list of length 2, which is taken to represent a point in
          netlogo space (`[xcor ycor]`) of the sort reported by
          [[location-of|/gis/location-of]] Vertex. The raster
          dataset is sampled at the point of that location.
        * A list of length 4, which is taken to represent an envelope in
          GIS space, of the sort reported by [[envelope-of|/gis/envelope-of]]. The raster dataset is sampled
          over the area of that envelope.
        * A patch, in which case the raster dataset is sampled over the
          area of the patch.
        * A turtle, in which case the raster dataset is sampled at the
          location of that turtle.
        * A Vertex, in which case the raster dataset is sampled at the
          location of that Vertex.

        If the requested location is outside the area covered by the raster

        dataset, this primitive reports the special value representing

        "not a number", which is printed by NetLogo as

        "NaN". Using the special "not a number" value

        as an argument to primitives that expect a number may cause an

        error, but you can test the value reported by this primitive to

        filter out "not a number" values. A value that is not a

        number will be neither less than nor greater than a number value,

        so you can detect "not a number" values using the

        following:


        ```

        let value gis:raster-sample dataset turtle 0

        ; set color to blue if value is a number, red if value is "not a number"

        ifelse (value <= 0) or (value >= 0)

        [ set color blue ]

        [ set color red ]

        ```


        If the requested location is a point, the sample is always computed

        using the method set by
        [[set-sampling-method|/gis/set-sampling-method]]. If the

        requested location is an area (i.e., an envelope or patch), the

        sample is computed by taking the average of all raster cells

        covered by the requested area.
  - id: gis-raster-world-envelope
    key: gis:raster-world-envelope
    name: gis:raster-world-envelope
    alternateNames:
      - raster-world-envelope
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/raster-world-envelope.html
    metadata:
      name: raster-world-envelope
      extensionName: gis
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - - type:
                kind: CustomType
                name: dataset
              kind: DescribedType
              explicitName: RasterDataset
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: x
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: y
        isInfix: false
      tags:
        - raster
      fullName: gis:raster-world-envelope
      description: >
        
        Reports the GIS envelope needed to match the boundaries of NetLogo

        patches with the boundaries of cells in the given raster dataset.

        This envelope could then be used as an argument to
        [[set-transformation-ds|/gis/set-transformation-ds]].


        There may be more cells in the dataset than there are patches in

        the NetLogo world. In that case, you will need to select a subset

        of cells in the dataset by specifying which cell in the dataset you

        want to match with the upper-left corner of the NetLogo world.

        Cells are numbered from left to right, and from top to bottom,

        beginning with zero. So the upper left cell is (0, 0), and the

        bottom right cell is (`gis:width-of dataset` - 1, `gis:height-of
        dataset` - 1).
  - id: gis-create-raster
    key: gis:create-raster
    name: gis:create-raster
    alternateNames:
      - create-raster
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/create-raster.html
    metadata:
      name: create-raster
      extensionName: gis
      primitiveType:
        kind: reporter
        returns:
          kind: CustomType
          name: dataset
      syntax:
        args:
          - - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: width
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: height
            - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: envelope
        isInfix: false
      tags:
        - raster
      fullName: gis:create-raster
      description: |
        
        Creates and reports a new, empty raster dataset with the given
        number of columns and rows, covering the given envelope.
  - id: gis-resample
    key: gis:resample
    name: gis:resample
    alternateNames:
      - resample
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/resample.html
    metadata:
      name: resample
      extensionName: gis
      primitiveType:
        kind: reporter
        returns:
          kind: CustomType
          name: dataset
      syntax:
        args:
          - - type:
                kind: CustomType
                name: dataset
              kind: DescribedType
              explicitName: RasterDataset
            - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: envelope
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: width
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: height
        isInfix: false
      tags:
        - raster
      fullName: gis:resample
      description: >
        
        Reports a new dataset that consists of the given RasterDataset

        resampled to cover the given envelope and to contain the given

        number of columns and rows. If the new raster's cells are

        smaller than the existing raster's cells, they will be

        resampled using the method set by
        [[set-sampling-method|/gis/set-sampling-method]]. If the new

        cells are larger than the original cells, they will be sampled

        using the `"NEAREST_NEIGHBOR"` method.
  - id: gis-convolve
    key: gis:convolve
    name: gis:convolve
    alternateNames:
      - convolve
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/convolve.html
    metadata:
      name: convolve
      extensionName: gis
      primitiveType:
        kind: reporter
        returns:
          kind: CustomType
          name: dataset
      syntax:
        args:
          - - type:
                kind: CustomType
                name: dataset
              kind: DescribedType
              explicitName: RasterDataset
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: kernel-rows
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: kernel-columns
            - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: kernel
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: key-column
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: key-row
        isInfix: false
      tags:
        - raster
      fullName: gis:convolve
      description: >
        
        Reports a new raster whose data consists of the given raster

        convolved with the given kernel.


        A convolution is a mathematical operation that computes each output

        cell by multiplying elements of a kernel with the cell values

        surrounding a particular source cell. A kernel is a matrix of

        values, with one particular value defined as the "key

        element", the value that is centered over the source cell

        corresponding to the destination cell whose value is being

        computed.


        The values of the kernel matrix are given as a list, which

        enumerates the elements of the matrix from left to right, top to

        bottom. So the elements of a 3-by-3 matrix would be listed in the

        following order:
              <table width="25%" border="1" style="text-align: center; margin: 0 auto;" align="center">
        <tr>
          <td> 1 <td> 2 <td> 3 <tr>
          <td> 4 <td> 5 <td> 6 <tr>
          <td> 7 <td> 8 <td> 9 </table>

        The key element is specified by column and row within the matrix.

        Columns are numbered from left to right, beginning with zero. Rows

        are numbered from top to bottom, also beginning with zero. So, for

        example, the kernel for the horizontal <a
        href="https://en.wikipedia.org/wiki/Sobel_operator"
        target="_blank">Sobel operator</a>,

        which looks like this:
              <table width="25%" border="1" style="text-align: center; margin: 0 auto;" align="center">
        <tr>
          <td> 1 <td> 0 <td> -1 <tr>
          <td> 2 <td> 0 <br> <small>(key)</small> <td> -2 <tr>
          <td> 1 <td> 0 <td> -1 </table>

        would be specified as follows:


        ```

        let horizontal-gradient gis:convolve dataset 3 3 [1 0 -1 2 0 -2 1 0 -1]
        1 1

        ```
  - id: gis-apply-raster
    key: gis:apply-raster
    name: gis:apply-raster
    alternateNames:
      - apply-raster
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/apply-raster.html
    metadata:
      name: apply-raster
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: CustomType
                name: dataset
              kind: DescribedType
              explicitName: RasterDataset
            - type:
                kind: ReferenceType
              kind: DescribedType
              explicitName: patch-variable
        isInfix: false
      tags:
        - raster
      fullName: gis:apply-raster
      description: |
        

        Copies values from the given raster dataset to the given patch
        variable, resampling the raster as necessary so that its cell
        boundaries match up with NetLogo patch boundaries. This resampling
        is done as if using [[resample|/gis/resample]] rather
        than [[raster-sample|/gis/raster-sample]], for the sake
        of efficiency. However, patches not covered by the raster are
        assigned values of "not a number" in the same way that
        [[raster-sample|/gis/raster-sample]] reports values for
        locations outside the raster.
  - id: gis-drawing-color
    key: gis:drawing-color
    name: gis:drawing-color
    alternateNames:
      - drawing-color
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/drawing-color.html
    metadata:
      name: drawing-color
      extensionName: gis
      primitiveType:
        kind: reporter
        returns:
          kind: CustomType
          name: list or number
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - drawing
      fullName: gis:drawing-color
      description: >
        
        Reports the color used by the GIS extension to draw vector features

        into the NetLogo drawing layer. Color can be represented either as

        a NetLogo color (a single number between zero and 140) or an RGB

        color (a list of 3 numbers). See details in the
        [Colors](/programming#colors) section of the

        Programming Guide.
  - id: gis-set-drawing-color
    key: gis:set-drawing-color
    name: gis:set-drawing-color
    alternateNames:
      - set-drawing-color
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/set-drawing-color.html
    metadata:
      name: set-drawing-color
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: CustomType
                name: list or number
              kind: DescribedType
              explicitName: color
        isInfix: false
      tags:
        - drawing
      fullName: gis:set-drawing-color
      description: >
        
        Sets the color used by the GIS extension to draw vector features

        into the NetLogo drawing layer. *Color* can be represented

        either as a NetLogo color (a single number between zero and 140) or

        an RGB color (a list of 3 numbers). See details in the
        [Colors](/programming#colors) section of the Programming Guide.
  - id: gis-draw
    key: gis:draw
    name: gis:draw
    alternateNames:
      - draw
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/draw.html
    metadata:
      name: draw
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: WildcardType
              kind: DescribedType
              explicitName: vector-data
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: line-thickness
        isInfix: false
      tags:
        - drawing
      fullName: gis:draw
      description: |
        
        Draws the given vector data to the NetLogo drawing layer, using the
        current GIS drawing color, with the given line thickness. The data
        may consist either of an entire VectorDataset, or a single
        VectorFeature. This primitive draws only the boundary of polygon
        data, and for point data, it fills a circle with a radius equal to
        the line thickness.
  - id: gis-fill
    key: gis:fill
    name: gis:fill
    alternateNames:
      - fill
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/fill.html
    metadata:
      name: fill
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: WildcardType
              kind: DescribedType
              explicitName: vector-data
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: line-thickness
        isInfix: false
      tags:
        - drawing
      fullName: gis:fill
      description: |
        
        Fills the given vector data in the NetLogo drawing layer using the
        current GIS drawing color, using the given line thickness around
        the edges. The data may consist either of an entire VectorDataset,
        or a single VectorFeature. For point data, it fills a circle with a
        radius equal to the line thickness.
  - id: gis-paint
    key: gis:paint
    name: gis:paint
    alternateNames:
      - paint
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/paint.html
    metadata:
      name: paint
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: CustomType
                name: dataset
              kind: DescribedType
              explicitName: RasterDataset
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: transparency
        isInfix: false
      tags:
        - drawing
      fullName: gis:paint
      description: |
        
        Paints the given raster data to the NetLogo drawing layer. The
        highest value in the dataset is painted white, the lowest is
        painted in black, and the other values are painted in shades of
        gray scaled linearly between white and black.

        The *transparency* input determines how transparent the new
        image in the drawing will be. Valid inputs range from 0 (completely
        opaque) to 255 (completely transparent).
  - id: gis-import-wms-drawing
    key: gis:import-wms-drawing
    name: gis:import-wms-drawing
    alternateNames:
      - import-wms-drawing
    source: gis
    isFromExtension: true
    url: https://docs.netlogo.org/gis/import-wms-drawing.html
    metadata:
      name: import-wms-drawing
      extensionName: gis
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: server-url
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: spatial-reference
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: layers
            - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: transparency
        isInfix: false
      tags:
        - drawing
      fullName: gis:import-wms-drawing
      description: >
        
        Imports an image into the NetLogo drawing layer using the

        <a href="http://www.opengeospatial.org/standards/wms"
        target="_blank">Web Mapping Service</a>
         protocol, as defined by the <a href="http://www.opengeospatial.org/" target="_blank">
        Open Geospatial Consortium</a>.


        The *spatial reference* and *layers* inputs should be

        given as strings. The *spatial reference* input corresponds to

        the **SRS** parameter to the **GetMap** request as defined in

        section 7.2.3.5 of version 1.1.1 of the WMS standard. The

        *layers* input corresponds to the **LAYERS** parameter to

        the as defined in 7.2.3.3 of version 1.1.1 of the WMS standard.


        You can find the list of valid spatial reference codes and layer

        names by examining the response to a **GetCapabilities** request

        to the WMS server. Consult the relevant standard for instructions

        on how to issue a **GetCapabilities** request to the server and

        how to interpret the results.


        The *transparency* input determines how transparent the new

        image in the drawing will be. Valid inputs range from 0 (completely

        opaque) to 255 (completely transparent).
  - id: gogo-primitives
    key: gogo:primitives
    name: gogo:primitives
    alternateNames:
      - primitives
    source: gogo
    isFromExtension: true
    url: https://docs.netlogo.org/gogo/primitives.html
    metadata:
      name: primitives
      extensionName: gogo
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoList
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - general
      fullName: gogo:primitives
      description: Returns a list of the primitives of this extension.
  - id: gogo-howmany-gogos
    key: gogo:howmany-gogos
    name: gogo:howmany-gogos
    alternateNames:
      - howmany-gogos
    source: gogo
    isFromExtension: true
    url: https://docs.netlogo.org/gogo/howmany-gogos.html
    metadata:
      name: howmany-gogos
      extensionName: gogo
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - general
      fullName: gogo:howmany-gogos
      description: >
        
        Reports the number of USB HID devices visible to the computer and having
        the correct vendor and product ID to be a GoGo board.  A board will only
        be detected if it is both connected and powered on.  Using this
        primitive is one way to determine quickly whether a GoGo board has the
        HID firmware loaded. (A USB-Serial version of the board will not be
        detected.).
  - id: gogo-init
    key: gogo:init
    name: gogo:init
    alternateNames:
      - init
    source: gogo
    isFromExtension: true
    url: https://docs.netlogo.org/gogo/init.html
    metadata:
      name: init
      extensionName: gogo
      primitiveType:
        kind: command
      syntax:
        args:
          - []
        isInfix: false
      tags:
        - general
      fullName: gogo:init
      description: >
        
        Initialize the extension. The parameter `name` is a string representing
        the name of the backend to initialize.  There are currently 2 backends.
        One is the `"gogo"` backend that supports GoGo board 5 and earlier
        versions. Another is the `"gogo6"` backend that supports GoGo board
        6.  You only need to use this primitive if you are using a GoGo board
        6.  The extension will automatically initialize itself with the `"gogo"`
        backend if this primitive is not called.
  - id: gogo-talk-to-output-ports
    key: gogo:talk-to-output-ports
    name: gogo:talk-to-output-ports
    alternateNames:
      - talk-to-output-ports
    source: gogo
    isFromExtension: true
    url: https://docs.netlogo.org/gogo/talk-to-output-ports.html
    metadata:
      name: talk-to-output-ports
      extensionName: gogo
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoList
              kind: DescribedType
              explicitName: list-of-portnames
        isInfix: false
