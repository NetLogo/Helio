  - id: orbit-cmds-orbit-down
    key: orbit-cmds
    name: orbit-down
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#orbit-cmds
    description: >+
      Rotate the observer around the last point faced. Imagine the observer is
      on the surface of a sphere, the
       last point face is the center of that sphere. Up and down orbit along the lines of longitude and right and
       left orbit along the lines of latitude. The observer will remain facing the last point faced so the heading
       and pitch may change as result of orbiting. However, because we assume an absolute north pole (parallel to
       the positive z-axis) the roll will never change.

      See also [[setxyz|3d#setxyz]], [[face|face]] and [[zoom|3d#zoom]]

    examples:
      - orbit-down *number*
      - orbit-left *number*
      - orbit-right *number*
      - orbit-up *number*
    isFromExtension: false
    isConstant: false
    metadata: &a62
