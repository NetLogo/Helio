  - id: xor-xor
    key: xor
    name: xor
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#xor
    description: >+
      Reports true if either *boolean1* or *boolean2* is true, but not when both
      are true. Otherwise
       returns false. See [the programming guide for more
       information on logical operator precedence](/programming#commands-and-reporters).

      ```

      if (pxcor > 0) xor (pycor > 0)
        [ set pcolor blue ]
      ;; upper-left and lower-right quadrants turn blue

      ```

    examples:
