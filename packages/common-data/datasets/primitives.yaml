  - id: without-interruption-without-interruption
    key: without-interruption
    name: without-interruption
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#without-interruption
    description: |+
      This primitive exists only for backwards compatibility. We
       don't recommend using it in new models.

      The agent runs all the commands in the block without allowing other
       agents using `ask-concurrent` to "interrupt". That
       is, other agents are put "on hold" and do not run any
       commands until the commands in the block are finished.

      Note: This command is only useful in conjunction with `ask-concurrent`.

      See also [[ask-concurrent|ask-concurrent]].

    examples:
      - without-interruption [ *commands* ]
    isFromExtension: false
    isConstant: false
    metadata:
      id: without-interruption
      entry_categories:
        - title: Control Flow and Logic
          id: controlgroup
      data:
        syntax:
          - name: without-interruption
            since: "1.1"
        description: >+
          This primitive exists only for backwards compatibility. We
           don't recommend using it in new models.

          The agent runs all the commands in the block without allowing other
           agents using `ask-concurrent` to "interrupt". That
           is, other agents are put "on hold" and do not run any
           commands until the commands in the block are finished.

          Note: This command is only useful in conjunction with
          `ask-concurrent`.


          See also [[ask-concurrent|ask-concurrent]].

        examples:
          - code: without-interruption [ *commands* ]
