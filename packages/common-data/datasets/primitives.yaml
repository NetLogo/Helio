  - id: remainder-remainder
    key: remainder
    name: remainder
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#remainder
    description: >+
      Reports the remainder when *number1* is divided by *number2*. This is
      equivalent to the following NetLogo code:


      ```
                number1 - (int (number1 / number2)) * number2
      ```



      ```

      show remainder 62 5

      => 2

      show remainder -8 3

      => -2

      ```


      See also [[mod|mod]]. mod and remainder behave the same
       for positive numbers, but differently for negative numbers.

    examples:
      - remainder *number1* *number2*
    isFromExtension: false
    isConstant: false
    metadata:
      id: remainder
      entry_categories:
        - title: Mathematical
          id: mathematicalgroup
      data:
        syntax:
          - name: remainder
            since: 1.2.1
        description: >+
          Reports the remainder when *number1* is divided by *number2*. This is
          equivalent to the following NetLogo code:


          ```
                    number1 - (int (number1 / number2)) * number2
          ```



          ```

          show remainder 62 5

          => 2

          show remainder -8 3

          => -2

          ```


          See also [[mod|mod]]. mod and remainder behave the same
           for positive numbers, but differently for negative numbers.

        examples:
          - code: remainder *number1* *number2*
