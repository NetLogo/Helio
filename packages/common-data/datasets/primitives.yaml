  - id: hubnet-send-hubnet-send
    key: hubnet-send
    name: hubnet-send
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#hubnet-send
    description: >+
      #### hubnet-send *list-of-strings tag-name value*


      For a *string*, this sends *value* from NetLogo to the
       tag *tag-name* on the client that has *string* for its
       user name.

      For a *list-of-strings*, this sends *value* from NetLogo
       to the tag *tag-name* on all the clients that have a user name
       that is in the *list-of-strings*.

      Sending a message to a non-existent client, using `hubnet-send`, generates
      a `hubnet-exit-message`.


      See the [HubNet Authoring Guide](/hubnet-authoring)for details.

    examples:
      - hubnet-send *string tag-name value*
    isFromExtension: false
    isConstant: false
    metadata:
      id: hubnet-send
      entry_categories:
        - title: HubNet
          id: hubnetgroup
      data:
        syntax:
          - name: hubnet-send
            since: "1.1"
        description: >+
          #### hubnet-send *list-of-strings tag-name value*


          For a *string*, this sends *value* from NetLogo to the
           tag *tag-name* on the client that has *string* for its
           user name.

          For a *list-of-strings*, this sends *value* from NetLogo
           to the tag *tag-name* on all the clients that have a user name
           that is in the *list-of-strings*.

          Sending a message to a non-existent client, using `hubnet-send`,
          generates a `hubnet-exit-message`.


          See the [HubNet Authoring Guide](/hubnet-authoring)for details.

        examples:
          - code: hubnet-send *string tag-name value*
