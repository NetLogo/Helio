          ask turtle 3 [ create-link-with turtle 4 [ set weight 0.5 ] ]
          ask turtle 4 [ create-link-with turtle 2 [ set weight 0.5 ] ]
          ask turtle 0 [ show nw:weighted-distance-to turtle 2 weight ]
