        * Message `"vid: invalid time"`: The currently active video does not
        contain the specified second. The second may be negative, or greater
        than the length of the video.
  - id: vid-show-player
    key: vid:show-player
    name: vid:show-player
    alternateNames:
      - show-player
    source: vid
    isFromExtension: true
    url: https://docs.netlogo.org/vid/show-player.html
    metadata:
      name: show-player
      extensionName: vid
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: width
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: height
        isInfix: false
      tags: []
      fullName: vid:show-player
      description: >
        
        Shows a player in a separate window.

        If there is no video source, the window will be an empty black frame.

        If there is an active video source, it will be displayed in the window
        with the specified width and height.

        If there is a playing video source, it will be displayed in the window
        at its specified width and height.

        If width and height are omitted, the video will be displayed in its
        native resolution.


        Example with native resolution:


        ```NetLogo

        vid:show-player

        ```


        Example with custom resolution:


        ```NetLogo

        (vid:show-player 640 480)

        ```


        Errors:


        * Message `"vid: invalid dimensions"`: The selected dimensions are
        invalid (one of the dimensions is zero or negative).
  - id: vid-hide-player
