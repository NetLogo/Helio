  - id: extract-hsb-extract-hsb
    key: extract-hsb
    name: extract-hsb
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#extract-hsb
    description: >+
      Reports a list of three values, the first (hue) in the range of
       0 to 360, the second and third (brightness and saturation) in
       the range of 0 to 100.

      The given *color* can either be a NetLogo color in the
       range 0 to 140, not including 140 itself, or an RGB list of
       three values in the range 0 to 255 representing the levels
       of red, green, and blue.

      ```

      show extract-hsb cyan

      => [180 57.143 76.863]

      show extract-hsb red

      => [3.103 80.93 84.314]

      show extract-hsb [255 0 0]

      => [0 100 100]

      ```


      See also [[approximate-hsb|approximate-hsb]],
      [[approximate-rgb|approximate-rgb]], [[extract-rgb|extract-rgb]].

    examples:
      - extract-hsb *color*
    isFromExtension: false
    isConstant: false
    metadata:
      id: extract-hsb
      entry_categories:
        - title: Color
          id: colorgroup
      data:
        syntax:
          - name: extract-hsb
            since: "1.0"
        description: >+
          Reports a list of three values, the first (hue) in the range of
           0 to 360, the second and third (brightness and saturation) in
           the range of 0 to 100.

          The given *color* can either be a NetLogo color in the
           range 0 to 140, not including 140 itself, or an RGB list of
           three values in the range 0 to 255 representing the levels
           of red, green, and blue.

          ```

          show extract-hsb cyan

          => [180 57.143 76.863]

          show extract-hsb red

          => [3.103 80.93 84.314]

          show extract-hsb [255 0 0]

          => [0 100 100]

          ```


          See also [[approximate-hsb|approximate-hsb]],
          [[approximate-rgb|approximate-rgb]], [[extract-rgb|extract-rgb]].

        examples:
          - code: extract-hsb *color*
