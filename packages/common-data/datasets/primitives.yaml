  - id: who-who
    key: who
    name: who
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#who
    description: >+
      This is a built-in turtle variable. It holds the turtle's
       "who number" or ID number, an integer greater than or
       equal to zero. You cannot set this variable; a turtle's who
       number never changes.

      Who numbers start at 0. A dead turtle's number will not be
       reassigned to a new turtle until you use the [[clear-turtles|clear-turtles]] or [[clear-all|clear-all]] commands, at which time who numbering
       starts over again at 0.

      Example:


      ```

      show [who] of turtles with [color = red]

      ;; prints a list of the who numbers of all red turtles

      ;; in the Command Center, in random order

      crt 100
        [ ifelse who < 50
            [ set color red ]
            [ set color blue ] ]
      ;; turtles 0 through 49 are red, turtles 50

      ;; through 99 are blue

      ```


      You can use the turtle reporter to retrieve a turtle with a given
       who number. See also [[turtle|turtle]].

      Note that who numbers aren't breed-specific. No two turtles can
       have the same who number, even if they are different breeds:

      ```

      clear-turtles

      create-frogs 1

      create-mice 1

      ask turtles [ print who ]

      ;; prints (in some random order):

      ;; (frog 0): 0

      ;; (mouse 1): 1

      ```


      Even though we only have one mouse, it is `mouse 1` not `mouse 0`, because
      the who number 0 was already taken by the
       frog.

    examples:
      - who
    isFromExtension: false
    isConstant: false
    metadata:
      id: who
      entry_categories:
        - title: Built-in Variables
          id: variables
          subcategory:
            title: Turtle Variable
            id: turtle-variables
      data:
        syntax:
          - name: who
        description: >+
          This is a built-in turtle variable. It holds the turtle's
           "who number" or ID number, an integer greater than or
           equal to zero. You cannot set this variable; a turtle's who
           number never changes.

          Who numbers start at 0. A dead turtle's number will not be
           reassigned to a new turtle until you use the [[clear-turtles|clear-turtles]] or [[clear-all|clear-all]] commands, at which time who numbering
           starts over again at 0.

          Example:


          ```

          show [who] of turtles with [color = red]

          ;; prints a list of the who numbers of all red turtles

          ;; in the Command Center, in random order

          crt 100
            [ ifelse who < 50
                [ set color red ]
                [ set color blue ] ]
          ;; turtles 0 through 49 are red, turtles 50

          ;; through 99 are blue

          ```


          You can use the turtle reporter to retrieve a turtle with a given
           who number. See also [[turtle|turtle]].

          Note that who numbers aren't breed-specific. No two turtles can
           have the same who number, even if they are different breeds:

          ```

          clear-turtles

          create-frogs 1

          create-mice 1

          ask turtles [ print who ]

          ;; prints (in some random order):

          ;; (frog 0): 0

          ;; (mouse 1): 1

          ```


          Even though we only have one mouse, it is `mouse 1` not `mouse 0`,
          because the who number 0 was already taken by the
           frog.

        examples:
          - code: who
      icons:
        - alt: Turtle Command
          url: images/turtle.png
  - id: who-are-not-who-are-not
    key: who-are-not
    name: who-are-not
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#who-are-not
    description: >+
      Takes an agentset on the left and an agentset or an agent on the right.
      Reports
       a new agentset containing all agents from the left-hand agentset that are not in
       the right-hand agentset (or are not the right-hand agent).

      ```

      breed [frogs frog]

      breed [mice mouse]


      create-frogs 10

      create-mice 10

      create-turtles 10


      ; contains all the turtles who are not frogs

      ask turtles who-are-not frogs [
        forward 1
      ]```


      Another example:


      ```

      ask turtles [
        ; contains all the turtles this turtle is not linked to
        let targets (other turtles who-are-not link-neighbors)
        if count targets > 0 [
          create-link-with one-of targets
        ]
      ]```

    examples:
      - "*agentset* who-are-not *agentset*"
      - "*agentset* who-are-not *agent*"
    isFromExtension: false
    isConstant: false
    metadata:
