  - id: create-ordered-turtles-create-ordered-turtles
    key: create-ordered-turtles
    name: create-ordered-turtles
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#create-ordered-turtles
    description: |+
      Creates *number* new turtles. New turtles start at position
       (0, 0), are created with the 14 primary colors, and have headings
       from 0 to 360, evenly spaced.

      If the create-ordered-&lt;breeds&gt; form is used, the new
       turtles are created as members of the given breed.

      If *commands* are supplied, the new turtles immediately run
       them. This is useful for giving the new turtles a different color,
       heading, or whatever. (The new turtles are created all at once then
       run one at a time, in random order.)

      If *number* is fractional, it will be rounded down to
       the nearest integer (4.5 becomes 4, 10.9 becomes 10).

      ```
      cro 100 [ fd 10 ]  ;; makes an evenly spaced circle
      ```

    examples:
      - create-ordered-turtles *number*
      - create-ordered-turtles *number* [ *commands* ]
      - create-ordered<breeds> *number*
      - create-ordered<breeds> *number* [ *commands* ]
