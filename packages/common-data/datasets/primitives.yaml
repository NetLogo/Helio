        `calls`, `inclusive_time` and

        `exclusive_time`. This is followed by one sublist containing the
        profiler data for each user-defined

        procedure. The reported times are in milliseconds.
  - id: py-setup
    key: py:setup
    name: py:setup
    alternateNames:
      - setup
    source: py
    isFromExtension: true
    url: https://docs.netlogo.org/py/setup.html
    metadata:
      name: setup
      extensionName: py
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: python-executable
        isInfix: false
      tags: []
      fullName: py:setup
      description: >
        
        Create the Python session that this extension will use to execute code.
        The session will be started with the given Python executable. This
        command *must* be run before running any other Python extension
        primitive. Running this command again will shutdown the current Python
        environment and start a new one.

         The executable may be specified as a relative path, absolute path, or just the executable name if it is on your PATH.
         Furthermore, this extension offers a few helper primitives for getting particular versions of Python in system
         independent ways.

         In general, unless working with a virtual environment or a specific system setup, you should do:

         ```NetLogo
         py:setup py:python  ; if your code works with either Python 2 or 3
         py:setup py:python3 ; for Python 3
         py:setup py:python2 ; for Python 2
         ```

        `py:setup` may be invoked by directly referring to different Pythons as
        well. For instance:


        ```NetLogo

        py:setup "python3" ; if `python3` is on your PATH

        py:setup "python"  ; if `python` is on your PATH

        ```


        If you use virtualenv or Conda, simply specify the path of the Python
        executable in the environment you wish to use:


        ```NetLogo

        py:setup "/path/to/myenv/bin/python"

        ```


        The path may be relative or absolute. So, if you have a virtual
        environment in the same folder as your model, you can do:


        ```NetLogo

        py:setup "myenv/bin/python"

        ```
  - id: py-python
    key: py:python
    name: py:python
    alternateNames:
      - python
    source: py
    isFromExtension: true
    url: https://docs.netlogo.org/py/python.html
    metadata:
      name: python
