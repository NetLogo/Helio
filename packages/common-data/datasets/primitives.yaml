  - id: py-run
    key: py:run
    name: py:run
    alternateNames:
      - run
    source: py
    isFromExtension: true
    url: https://docs.netlogo.org/py/run.html
    metadata:
      name: run
      extensionName: py
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: Repeatable
                of:
                  kind: NetLogoString
              kind: DescribedType
              explicitName: python-statement
        isInfix: false
      tags: []
      fullName: py:run
      description: >
        
        Runs the given Python statements in the current Python session. To make
        multi-line Python code easier to run, this command will take multiple
        strings, each of which will be interpreted as a separate line of Python
        code. For instance:


        ```NetLogo

        (py:run
          "import matplotlib"
          "matplotlib.use('TkAgg')"
          "import numpy as np"
          "import matplotlib.pyplot as plt"
          "for i in range(10):"
          "    plt.plot([ x ** i for x in np.arange(-1, 1, 0.1) ])"
          "plt.show()"
        )

        ```


        `py:run` will wait for the statements to finish running before
        continuing. Thus, if you have long running Python code, NetLogo will
        pause while it runs.
  - id: py-runresult
    key: py:runresult
    name: py:runresult
    alternateNames:
      - runresult
    source: py
    isFromExtension: true
    url: https://docs.netlogo.org/py/runresult.html
    metadata:
      name: runresult
      extensionName: py
      primitiveType:
        kind: reporter
        returns:
          kind: WildcardType
      syntax:
        args:
          - - type:
                kind: Repeatable
                of:
                  kind: NetLogoString
              kind: DescribedType
              explicitName: python-expression
        isInfix: false
      tags: []
      fullName: py:runresult
      description: >
        
        Evaluates the given Python expression and reports the result.

        `py:runresult` attempts to convert from Python data types to NetLogo
        data types.

        Numbers, strings, and booleans convert as you would expect.

        Any list-like object in Python (that is, anything with a length that you
        can iterate through) will be converted to a NetLogo list.

        For instance, Python lists and NumPy arrays will convert to NetLogo
        lists.

        Python dicts (and dict-like objects) will convert to a NetLogo list of
        key-value pairs (where each pair is represented as a list).

        `None` will be converted to `nobody`.

        Other objects will simply be converted to a string representation.


        Note that due a [current
        issue](https://github.com/qiemem/PythonExtension/issues/6), dict keys
        will always be reported as strings.

        If you need to report non-string keys, report the `.items()` of the dict
        instead of the dict itself.
  - id: py-set
    key: py:set
    name: py:set
    alternateNames:
      - set
    source: py
    isFromExtension: true
    url: https://docs.netlogo.org/py/set.html
    metadata:
      name: set
      extensionName: py
      primitiveType:
        kind: command
      syntax:
        args:
          - - type:
                kind: NetLogoString
              kind: DescribedType
              explicitName: variable-name
            - type:
                kind: WildcardType
              kind: DescribedType
              explicitName: value
        isInfix: false
      tags: []
      fullName: py:set
      description: >+
        
        Sets a variable in the Python session with the given name to the given
        NetLogo value. NetLogo objects will be converted to Python objects as
        expected.


        All vanilla NetLogo objects are supported, but objects from other
        extensions, even other bundled extensions, are not supported.


        ```NetLogo

        py:set "x" [1 2 3]

        show py:runresult "x" ;; Shows [1 2 3]

        ```


        Agents are converted into dictionaries with elements for each agent
        variable. Agentsets are converted into lists of agent dictionaries.


        ```NetLogo

        breed [goats goat]

        goats-own [energy ]

        create-goats 1 [ set heading 0 set color 75 ]

        ask goat 0 [ set energy 42 ]

        py:set "goat" goat 0

        py:runresult "str(goat)" ;; Should output: "{'WHO': 0, 'COLOR': 75,
        'HEADING': 0, 'XCOR': 0, 'YCOR': 0, 'SHAPE': 'default', 'LABEL': '',
        'LABEL-COLOR': 9.9, 'BREED': 'GOATS', 'HIDDEN?': False, 'SIZE': 1,
        'PEN-SIZE': 1, 'PEN-MODE': 'up', 'ENERGY': 42}"

        ```


        Agents with variables containing references to agentsets will have those
        variables converted into the string representation of that agentset.

  - id: resource-get
    key: resource:get
    name: resource:get
    alternateNames:
      - get
    source: resource
    isFromExtension: true
    url: https://docs.netlogo.org/resource/get.html
    metadata:
      name: get
