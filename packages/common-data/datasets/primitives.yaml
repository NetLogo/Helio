  - id: min-n-of-min-n-of
    key: min-n-of
    name: min-n-of
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#min-n-of
    description: >+
      Reports an agentset containing *number* agents from *agentset* with the
      lowest values of *reporter*. The
       agentset is built by finding all the agents with the lowest value
       of *reporter*, if there are not *number* agents with
       that value then the agents with the second lowest value are
       found, and so on. At the end, if there is a tie that would make
       the resulting agentset too large, the tie is broken randomly.

      ```

      ;; assume the world is 11 x 11

      show min-n-of 5 patches [pxcor]

      ;; shows 5 patches with pxcor = min-pxcor

      show min-n-of 5 patches with [pycor = 0] [pxcor]

      ;; shows an agentset containing:

      ;; (patch -5 0) (patch -4 0) (patch -3 0) (patch -2 0) (patch -1 0)

      ```


      See also [[min-one-of|min-one-of]], [[with-min|with-min]].

    examples:
      - min-n-of *number* *agentset* [*reporter*]
    isFromExtension: false
    isConstant: false
    metadata:
      id: min-n-of
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: min-n-of
            since: "4.0"
        description: >+
          Reports an agentset containing *number* agents from *agentset* with
          the lowest values of *reporter*. The
           agentset is built by finding all the agents with the lowest value
           of *reporter*, if there are not *number* agents with
           that value then the agents with the second lowest value are
           found, and so on. At the end, if there is a tie that would make
           the resulting agentset too large, the tie is broken randomly.

          ```

          ;; assume the world is 11 x 11

          show min-n-of 5 patches [pxcor]

          ;; shows 5 patches with pxcor = min-pxcor

          show min-n-of 5 patches with [pycor = 0] [pxcor]

          ;; shows an agentset containing:

          ;; (patch -5 0) (patch -4 0) (patch -3 0) (patch -2 0) (patch -1 0)

          ```


          See also [[min-one-of|min-one-of]], [[with-min|with-min]].

        examples:
          - code: min-n-of *number* *agentset* [*reporter*]
  - id: min-one-of-min-one-of
    key: min-one-of
    name: min-one-of
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#min-one-of
    description: |+
      Reports a random agent in the agentset that reports the lowest
       value for the given reporter. If there is a tie, this command
       reports one random agent that meets the condition. If you want
       all such agents use with-min instead.

      ```
      show min-one-of turtles [xcor + ycor]
      ;; reports the first turtle with the smallest sum of
      ;; coordinates
      ```

      See also [[with-min|with-min]], [[min-n-of|min-n-of]].

    examples:
      - min-one-of *agentset* [*reporter*]
    isFromExtension: false
    isConstant: false
    metadata:
      id: min-one-of
      entry_categories:
        - title: Agentset
          id: agentsetgroup
      data:
        syntax:
          - name: min-one-of
            since: "1.0"
        description: |+
          Reports a random agent in the agentset that reports the lowest
           value for the given reporter. If there is a tie, this command
           reports one random agent that meets the condition. If you want
           all such agents use with-min instead.

          ```
          show min-one-of turtles [xcor + ycor]
          ;; reports the first turtle with the smallest sum of
          ;; coordinates
          ```

          See also [[with-min|with-min]], [[min-n-of|min-n-of]].

        examples:
          - code: min-one-of *agentset* [*reporter*]
