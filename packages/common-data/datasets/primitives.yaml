  - id: at-points-3d-at-points
    key: at-points-3d
    name: at-points
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#at-points-3d
    description: >
      Reports a subset of the given agentset that includes only the agents on
      the patches the given distances away
       from this agent. The distances are specified as a list of three-item lists, where the three items are the x,
       y, and z offsets.

      If the caller is the observer, then the points are measured relative to
      the origin, in other words, the
       points are taken as absolute patch coordinates.

      If the caller is a turtle, the points are measured relative to the
      turtle's exact location, and not from the
       center of the patch under the turtle.

      ```

      ask turtles at-points [[2 4 0] [1 2 1] [10 15 10]]

      [ fd 1 ]  ;; only the turtles on the patches at the
                ;; distances (2,4,0), (1,2,1) and (10,15,10),
                ;; relative to the caller, move

      ```
    examples:
      - "*agentset* at-points [[*x1 y1 z1*] [*x2 y2 z2*] ...]"
    isFromExtension: false
    isConstant: false
    metadata:
      id: at-points-3d
      entry_categories:
        - title: Commands and Reporters
          id: commands-and-reporters
          subcategory:
            title: Agentset primitives
            id: agentset-primitives
      data:
        syntax:
          - name: at-points
            since: "4.1"
        description: >
          Reports a subset of the given agentset that includes only the agents
          on the patches the given distances away
           from this agent. The distances are specified as a list of three-item lists, where the three items are the x,
           y, and z offsets.

          If the caller is the observer, then the points are measured relative
          to the origin, in other words, the
           points are taken as absolute patch coordinates.

          If the caller is a turtle, the points are measured relative to the
          turtle's exact location, and not from the
           center of the patch under the turtle.

          ```

          ask turtles at-points [[2 4 0] [1 2 1] [10 15 10]]

          [ fd 1 ]  ;; only the turtles on the patches at the
                    ;; distances (2,4,0), (1,2,1) and (10,15,10),
                    ;; relative to the caller, move

          ```
        examples:
          - code: "*agentset* at-points [[*x1 y1 z1*] [*x2 y2 z2*] ...]"
    urlHome: https://docs.netlogo.org/3d.html
    sourceIcon: netlogo-netlogo-3d
  - id: distance-3d-distancexyz
    key: distance-3d
    name: distancexyz
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#distance-3d
    description: >
      3D versions of [[distancexy|distancexy]].


      Reports the distance from this agent to the point (*xcor*, *ycor*,
      *zcor*).


      The distance from a patch is measured from the center of the patch.


      distancexyz-nowrap always reports the in world distance, never a distance
      that would require wrapping around
       the edges of the world. With distancexyz the wrapped distance (around the edges of the world) is used if
       that distance is shorter than the in world distance.

      ```

      if (distancexyz 0 0 0) < 10
        [ set color green ]
      ;; all turtles less than 10 units from

      ;; the center of the screen turn green.


      ```
    examples:
      - distancexyz *xcor* *ycor* *zcor*
      - distancexyz-nowrap *xcor* *ycor* *zcor*
    isFromExtension: false
    isConstant: false
    metadata: &a58
      id: distance-3d
      entry_categories:
