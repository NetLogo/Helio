        in _radius_ steps".
  - id: nw-distance-to
    key: nw:distance-to
    name: nw:distance-to
    alternateNames:
      - distance-to
    source: nw
    isFromExtension: true
    url: https://docs.netlogo.org/nw/distance-to.html
    metadata:
      name: distance-to
      extensionName: nw
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoNumber
      syntax:
        args:
          - - type:
                kind: Agent
                of: Turtle
              kind: DescribedType
              explicitName: target-turtle
        isInfix: false
      tags:
        - path
      fullName: nw:distance-to
      description: >
        
        Finds the shortest path to the target turtle and reports the total
        distance for this path, or false if no path exists in the current
        context. Each link counts for a distance of one.


        Example:


        ```NetLogo

        to go
          clear-all
          create-turtles 5
          ask turtle 0 [ create-link-with turtle 1 ]
          ask turtle 1 [ create-link-with turtle 2 ]
          ask turtle 0 [ create-link-with turtle 3 ]
          ask turtle 3 [ create-link-with turtle 4 ]
          ask turtle 4 [ create-link-with turtle 2 ]
          ask turtle 0 [ show nw:distance-to turtle 2 ]
        end

        ```


        Will output:


        ```NetLogo

        (turtle 0): 2

        ```
  - id: nw-weighted-distance-to
