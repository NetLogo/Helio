            )
          ```


          See also [[if|if]], [[ifelse|ifelse]].

        examples:
          - code: ifelse-value *boolean1* [ *reporter1* ] [ *elsereporter* ]
          - code: (ifelse-value *boolean1* [ *reporter1* ] *boolean2* [ *reporter2* ] ... [
