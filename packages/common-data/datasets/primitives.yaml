        `vid:camera-open`, or `vid:camera-select`.
  - id: vid-recorder-status
    key: vid:recorder-status
    name: vid:recorder-status
    alternateNames:
      - recorder-status
    source: vid
    isFromExtension: true
    url: https://docs.netlogo.org/vid/recorder-status.html
    metadata:
      name: recorder-status
      extensionName: vid
      primitiveType:
        kind: reporter
        returns:
          kind: NetLogoString
      syntax:
        args:
          - []
        isInfix: false
      tags: []
      fullName: vid:recorder-status
      description: >
        
        Reports the current status of the recorder.

        Initially and after the recorder is saved (via `vid:save-recording`) or
        reset (via `vid:reset-recorder`) the recorder status is "inactive".

        After calling `vid:start-recorder` the status will be "recording".


        Example:


        ```NetLogo

        vid:recorder-status ; => "inactive"


        vid:start-recorder

        vid:recorder-status ; => "recording"


        vid:reset-recorder

        vid:recorder-status ; => "inactive"

        ```
  - id: vid-reset-recorder
    key: vid:reset-recorder
    name: vid:reset-recorder
    alternateNames:
      - reset-recorder
    source: vid
    isFromExtension: true
    url: https://docs.netlogo.org/vid/reset-recorder.html
