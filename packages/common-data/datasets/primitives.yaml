  - id: but-first-and-last-but-first
    key: but-first-and-last
    name: but-first
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#but-first-and-last
    description: >+
      When used on a list, but-first reports all of the list items of *list*
      except the first, and but-last reports all of the list
       items of *list* except the last.

      On strings, but-first and but-last report a shorter string omitting
       the first or last character of the original string.

      ```

      ;; mylist is [2 4 6 5 8 12]

      set mylist but-first mylist

      ;; mylist is now [4 6 5 8 12]

      set mylist but-last mylist

      ;; mylist is now [4 6 5 8]

      show but-first "string"

      ;; prints "tring"

      show but-last "string"

      ;; prints "strin"

      ```

    examples:
      - but-first *list*
      - but-first *string*
      - but-last *list*
      - but-last *string*
    isFromExtension: false
    isConstant: false
    metadata: &a8
      id: but-first-and-last
      entry_categories:
        - title: String
          id: stringgroup
      data:
        syntax:
          - name: but-first
            since: "1.0"
          - name: butfirst
            since: "1.0"
          - name: bf
            since: "1.0"
          - name: but-last
            since: "1.0"
          - name: butlast
            since: "1.0"
          - name: bl
            since: "1.0"
        description: >+
          When used on a list, but-first reports all of the list items of *list*
          except the first, and but-last reports all of the list
           items of *list* except the last.

          On strings, but-first and but-last report a shorter string omitting
