    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#patch-3d
    description: >+
      3D version of [[patch|patch]].


      Given three integers, reports the single patch with the given pxcor, pycor
      and pzcor. *pxcor*, *pycor* and *pzcor*must be integers.


      ```

      ask (patch 3 -4 2) [ set pcolor green ]

      ;; patch with pxcor of 3 and pycor of -4 and pzcor of 2 turns green


      ```

      See also [[patch|patch]]

    examples:
