           the nearest integer (4.5 becomes 4, 10.9 becomes 10).

          ```

          ask n-of 50 patches [ set pcolor green ]

          ;; 50 randomly chosen patches turn green

          ```


          See also [[one-of|one-of]] and [[up-to-n-of|up-to-n-of]],
           a version that does not error with a *size* greater than
           the size of the input.

        examples:
          - code: n-of *size* *agentset*
          - code: n-of *size* *list*
  - id: n-values-n-values
    key: n-values
    name: n-values
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#n-values
    description: >+
      Reports a list of length *size* containing values computed
       by repeatedly running the reporter. *reporter* may be an anonymous
       reporter or the name of a reporter.

      If the reporter accepts inputs, the input will be the number of the
       item currently being computed, starting from zero.

      If *size* is fractional, it will be rounded down to
       the nearest integer (4.5 becomes 4, 10.9 becomes 10).

      ```

      show n-values 5 [1]

      => [1 1 1 1 1]

      show n-values 5 [ i -> i ]

      => [0 1 2 3 4]

      show n-values 3 turtle

      => [(turtle 0) (turtle 1) (turtle 2)]

      show n-values 5 [ x -> x * x ]

      => [0 1 4 9 16]

      ```


      See also [[reduce|reduce]], [[filter|filter]], [[-> (anonymous
      procedure)|arrow]], [[range|range]].

    examples:
      - n-values *size* *reporter*
    isFromExtension: false
    isConstant: false
    metadata:
      id: n-values
      entry_categories:
        - title: Anonymous Procedures
          id: anonproceduresgroup
      data:
        syntax:
          - name: n-values
            since: "2.0"
        description: >+
