  - id: matrix-set-and-report
    key: matrix:set-and-report
    name: matrix:set-and-report
    alternateNames:
      - set-and-report
    source: matrix
    isFromExtension: true
    url: https://docs.netlogo.org/matrix/set-and-report.html
    metadata:
      name: set-and-report
      extensionName: matrix
      primitiveType:
        kind: reporter
        returns:
          kind: CustomType
          name: matrix
      syntax:
        args:
          - - type:
                kind: CustomType
                name: matrix
              kind: UnnamedType
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: row-i
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: col-j
            - type:
                kind: NetLogoNumber
              kind: DescribedType
              explicitName: new-value
        isInfix: false
      tags:
        - retrieval/manipulation
      fullName: matrix:set-and-report
      description: >
        
        Reports a new matrix, which is a copy of the given matrix except

        that the value at *row-i*,*col-j* has been changed to

        *new-value*. A NetLogo statement such as
         `set mat matrix:set-and-report mat 2 3 10` will result in `mat` pointing
        to this new matrix, a copy of the old version of mat with the

        element at row 2, column 3 being set to 10. The old version of `mat`

        will be "lost".
