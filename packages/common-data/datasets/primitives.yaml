  - id: reset-perspective-reset-perspective
    key: reset-perspective
    name: reset-perspective
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#reset-perspective
    description: >+
      The observer stops watching, following, or riding any turtles (or
       patches or links). (If it wasn't watching, following, or riding anybody,
       nothing happens.) In the 3D view, the observer also returns to its
       default position (above the origin, looking straight down). Note: following and riding are valid for turtles only.

      See also [[follow|follow]], [[ride|ride]], [[watch|watch]].

    examples:
      - reset-perspective
    isFromExtension: false
    isConstant: false
    metadata: &a48
