  - id: turtles-at-3d-turtles-at
    key: turtles-at-3d
    name: turtles-at
    source: netlogo3D
    url: https://docs.netlogo.org/3d.html#turtles-at-3d
    description: >
      3D versions of [[turtles-at|turtles-at]] and [[breeds-at|turtles-at]].


      Reports an agentset containing the turtles on the patch (dx, dy, dz) from
      the caller (including the caller
       itself if it's a turtle).

      ```

      ;; suppose I have 40 turtles at the origin

      show [count turtles-at 0 0 0] of turtle 0

      => 40


      ```
    examples:
      - turtles-at *dx* *dy* *dz*
      - <breeds>-at *dx* *dy* *dz*
    isFromExtension: false
    isConstant: false
