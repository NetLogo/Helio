  - id: in-link-from-in-<breed>-from
    key: in-link-from
    name: in-<breed>-from
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#in-link-from
    description: |+
      Reports a directed link from *turtle* to the caller or an
       undirected link connecting the two. If no link exists then it
       reports nobody. If more than one such link exists, reports a
       random one. You can think of this as "give me a link that I can use
       to travel from *turtle* to the caller."

      ```
      crt 2
      ask turtle 0 [ create-link-to turtle 1 ]
      ask turtle 1 [ show in-link-from turtle 0 ] ;; shows link 0 1
      ask turtle 0 [ show in-link-from turtle 1 ] ;; shows nobody
      ```

      See also: [[out-link-to|out-link-to]] [[link-with|link-with]]

    examples:
      - in-<breed>-from *turtle*
      - in-link-from *turtle*
