    key: plot-pen-reset
    name: plot-pen-reset
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#plot-pen-reset
    description: >+
      Clears everything the current plot pen has drawn, moves it to
       (0,0), and puts it down. If the pen is a permanent pen, the color,
       mode, and interval are reset to the default values from the plot
       Edit dialog.

      This command will produce a runtime error if either the current plot or
      the current
       pen has not been set.

    examples:
      - plot-pen-reset
    isFromExtension: false
    isConstant: false
    metadata:
