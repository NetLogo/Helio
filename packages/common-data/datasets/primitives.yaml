          * If the dead agent was a turtle, every link connected to it also
           dies.
          * If the observer was watching or following the agent, the
           observer's perspective resets, as if `reset-perspective`had been run.

          See also: [[clear-turtles|clear-turtles]] [[clear-links|clear-links]]

        examples:
          - code: die
