  - id: variance-variance
    key: variance
    name: variance
    source: netlogo
    url: https://docs.netlogo.org/dictionary.html#variance
    description: |+
      Reports the sample variance of a *list* of numbers. Ignores
       other types of items.

      (Note that this computes an unbiased estimate of the variance for a *sample*, rather than for a whole *population*, using
       Bessel's correction.)

      The sample variance is the sum of the squares of the deviations of
       the numbers from their mean, divided by one less than the number of
       numbers in the list.

      ```
      show variance [2 7 4 3 5]
      => 3.7
      ```

      See [this FAQ question](/faq#why-is-the-number-value-in-my-monitor-widget-changing-even-though-nothing-is-happening-in-my-model) for information on possible issues using *variance* with *agentsets*

    examples:
      - variance *list*
    isFromExtension: false
    isConstant: false
    metadata:
      id: variance
      entry_categories:
        - title: Mathematical
          id: mathematicalgroup
      data:
